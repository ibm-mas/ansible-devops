---
# Action to perform: install or uninstall
eso_action: "{{ lookup('env', 'ESO_ACTION') | default('install', true) }}"

# Namespace for External Secrets Operator
eso_namespace: "{{ lookup('env', 'ESO_NAMESPACE') | default('external-secrets-system', true) }}"

# Helm chart configuration
eso_release_name: "{{ lookup('env', 'ESO_RELEASE_NAME') | default('external-secrets', true) }}"
eso_repo_url: "{{ lookup('env', 'ESO_REPO_URL') | default('https://charts.external-secrets.io', true) }}"
eso_chart_version: "{{ lookup('env', 'ESO_CHART_VERSION') | default('', true) }}"

# Cleanup flags for uninstallation
eso_cleanup_crds: "{{ lookup('env', 'ESO_CLEANUP_CRDS') | default('false', true) | bool }}"
eso_cleanup_namespace: "{{ lookup('env', 'ESO_CLEANUP_NAMESPACE') | default('false', true) | bool }}"

# Custom Helm values override
eso_values: {}

# SecretStore/ClusterSecretStore name
eso_provider: "{{ lookup('env', 'ESO_PROVIDER') | default('ibm', true) }}"
eso_store_name: "{{ lookup('env', 'ESO_STORE_NAME') | default('ibm-secrets-manager', true) }}"

# IBM Provider
ibm_sm_store_namespace: "{{ lookup('env', 'IBM_SM_STORE_NAMESPACE') }}"
ibmcloud_apikey: "{{ lookup('env', 'IBMCLOUD_APIKEY') }}"
ibm_sm_api_key: "{{ lookup('env', 'IBM_SM_API_KEY') | default(ibmcloud_apikey, true) }}"
ibm_sm_instance_url: "{{ lookup('env', 'IBM_SM_INSTANCE_URL') }}"
