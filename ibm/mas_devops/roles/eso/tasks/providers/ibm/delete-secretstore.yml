---
- name: "Delete SecretStore for IBM Secrets Manager"
  block:
    - name: "Validate required variables"
      ansible.builtin.assert:
        that:
          - ibm_sm_store_namespace is defined
          - ibm_sm_store_namespace | length > 0
        fail_msg: "ibm_sm_store_namespace must be set to delete a SecretStore"

    - name: "Check if SecretStore exists"
      kubernetes.core.k8s_info:
        api_version: external-secrets.io/v1
        kind: SecretStore
        name: "{{ eso_store_name }}"
        namespace: "{{ ibm_sm_store_namespace }}"
      register: ss_check

    - name: "Display SecretStore status"
      when: ss_check.resources | length > 0
      ansible.builtin.debug:
        msg:
          - "Found SecretStore '{{ eso_store_name }}' in namespace '{{ ibm_sm_store_namespace }}'"
          - "This will remove the connection to IBM Secrets Manager"
          - "Note: ExternalSecrets in this namespace will fail to sync after deletion"

    - name: "Delete SecretStore"
      when: ss_check.resources | length > 0
      kubernetes.core.k8s:
        state: absent
        api_version: external-secrets.io/v1
        kind: SecretStore
        name: "{{ eso_store_name }}"
        namespace: "{{ ibm_sm_store_namespace }}"
        wait: yes
        wait_timeout: 60

    - name: "Check if IBM Secrets Manager credentials secret exists"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: "{{ eso_store_name }}-apikey"
        namespace: "{{ ibm_sm_store_namespace }}"
      register: secret_check

    - name: "Delete IBM Secrets Manager credentials secret"
      when: secret_check.resources | length > 0
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Secret
        name: "{{ eso_store_name }}-apikey"
        namespace: "{{ ibm_sm_store_namespace }}"
        wait: yes
        wait_timeout: 30

    - name: "SecretStore deletion complete"
      ansible.builtin.debug:
        msg:
          - "SecretStore '{{ eso_store_name }}' deleted from namespace '{{ ibm_sm_store_namespace }}'"
          - "IBM Secrets Manager credentials secret removed"
          - ""
          - "WARNING: ExternalSecrets in '{{ ibm_sm_store_namespace }}' referencing this SecretStore will no longer sync"

    - name: "SecretStore not found"
      when: ss_check.resources | length == 0
      ansible.builtin.debug:
        msg:
          - "SecretStore '{{ eso_store_name }}' not found in namespace '{{ ibm_sm_store_namespace }}'"
          - "Nothing to delete"


