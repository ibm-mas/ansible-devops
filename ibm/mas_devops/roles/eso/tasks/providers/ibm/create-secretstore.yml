---
- name: "Create SecretStore for IBM Secrets Manager"
  block:
    - name: "Validate required variables"
      ansible.builtin.assert:
        that:
          - ibm_sm_store_namespace is defined
          - ibm_sm_store_namespace | length > 0
          - ibm_sm_instance_url is defined
          - ibm_sm_instance_url | length > 0
          - ibm_sm_api_key is defined
          - ibm_sm_api_key | length > 0
        fail_msg: "Required variables missing: ibm_sm_store_namespace, ibm_sm_instance_url, and ibm_sm_api_key must be set"

    - name: "Create namespace if it doesn't exist"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ ibm_sm_store_namespace }}"

    - name: "Create IBM Secrets Manager credentials secret"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ eso_store_name }}-apikey"
            namespace: "{{ ibm_sm_store_namespace }}"
          type: Opaque
          stringData:
            apikey: "{{ ibm_sm_api_key }}"
      no_log: true

    - name: "Create SecretStore for IBM Secrets Manager"
      kubernetes.core.k8s:
        template: templates/providers/ibm/secret-store.yml.j2
        wait: true
        wait_timeout: 60

    - name: "Wait for SecretStore to be ready"
      kubernetes.core.k8s_info:
        api_version: external-secrets.io/v1
        kind: SecretStore
        name: "{{ eso_store_name }}"
        namespace: "{{ ibm_sm_store_namespace }}"
      register: ss_status
      retries: 10
      delay: 6
      until:
        - ss_status.resources is defined
        - ss_status.resources | length > 0
        - ss_status.resources[0].status is defined
        - ss_status.resources[0].status.conditions is defined
        - ss_status.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | list | length > 0
        - (ss_status.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | first).status == 'True'

    - name: "SecretStore creation complete"
      ansible.builtin.debug:
        msg:
          - "SecretStore '{{ eso_store_name }}' created in namespace '{{ ibm_sm_store_namespace }}'"
          - "IBM Secrets Manager URL: {{ ibm_sm_instance_url }}"
          - "Authentication secret: {{ eso_store_name }}-apikey in {{ ibm_sm_store_namespace }}"
          - "Status: Ready"
          - ""
          - "ExternalSecrets in '{{ ibm_sm_store_namespace }}' can now reference this SecretStore"
