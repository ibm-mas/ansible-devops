---
# Delete ClusterSecretStore for IBM Secrets Manager
# -----------------------------------------------------------------------------
- name: "Delete ClusterSecretStore for IBM Secrets Manager"
  block:
    - name: "Check if ClusterSecretStore exists"
      kubernetes.core.k8s_info:
        api_version: external-secrets.io/v1
        kind: ClusterSecretStore
        name: "{{ eso_store_name }}"
      register: css_check

    - name: "Display ClusterSecretStore status"
      when: css_check.resources | length > 0
      ansible.builtin.debug:
        msg:
          - "Found ClusterSecretStore '{{ eso_store_name }}' to delete"
          - "This will remove the connection to IBM Secrets Manager"
          - "Note: Existing ExternalSecret resources will fail to sync after deletion"

    - name: "Delete ClusterSecretStore"
      when: css_check.resources | length > 0
      kubernetes.core.k8s:
        state: absent
        api_version: external-secrets.io/v1
        kind: ClusterSecretStore
        name: "{{ eso_store_name }}"
        wait: yes
        wait_timeout: 60

    - name: "Check if IBM Secrets Manager credentials secret exists"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: "{{ eso_store_name }}-apikey"
        namespace: "{{ eso_namespace }}"
      register: secret_check

    - name: "Delete IBM Secrets Manager credentials secret"
      when: secret_check.resources | length > 0
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Secret
        name: "{{ eso_store_name }}-apikey"
        namespace: "{{ eso_namespace }}"
        wait: yes
        wait_timeout: 30

    - name: "ClusterSecretStore deletion complete"
      ansible.builtin.debug:
        msg:
          - "ClusterSecretStore '{{ eso_store_name }}' has been successfully deleted"
          - "IBM Secrets Manager credentials secret removed from {{ eso_namespace }}"
          - ""
          - "WARNING: Any ExternalSecret resources referencing this ClusterSecretStore will no longer sync"
          - "You may need to delete or update those ExternalSecret resources manually"

    - name: "ClusterSecretStore not found"
      when: css_check.resources | length == 0
      ansible.builtin.debug:
        msg:
          - "ClusterSecretStore '{{ eso_store_name }}' does not exist"
          - "Nothing to delete"
