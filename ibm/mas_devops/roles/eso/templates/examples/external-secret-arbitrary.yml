---
# Example ExternalSecret for arbitrary secrets (simple text secrets)
# This syncs an arbitrary secret from IBM Secrets Manager into a Kubernetes secret
#
# Arbitrary secrets in IBM Secrets Manager contain a single text value in the 'payload' field.
#
# Usage:
# 1. Replace 'YOUR-SECRET-ID-OR-NAME' with your actual secret ID or name
# 2. Update namespace if needed (default: default)
# 3. Update secretKey name if needed (default: API_KEY)
# 4. Apply: oc apply -f external-secret-arbitrary.yml

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: example-arbitrary-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ibm-secrets-manager
    kind: ClusterSecretStore  # Use 'SecretStore' for namespace-specific store
  # Target Kubernetes Secret configuration
  target:
    name: my-arbitrary-secret
    creationPolicy: Owner
  # Data to fetch from IBM Secrets Manager
  data:
    - secretKey: API_KEY  # Key name in the Kubernetes Secret
      remoteRef:
        # For arbitrary secrets, use the secret ID or name directly
        # If using secret ID (recommended): key: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
        # If using secret name: key: "my-secret-name"
        key: YOUR-SECRET-ID-OR-NAME
