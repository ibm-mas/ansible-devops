---
# Example ExternalSecret for arbitrary secrets (key-value pairs)
# This syncs a secret from IBM Secrets Manager into a Kubernetes secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: example-arbitrary-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ibm-secrets-manager
    kind: ClusterSecretStore
  target:
    name: my-secrets
    creationPolicy: Owner
  data:
    - secretKey: IBMCLOUD_APIKEY
      remoteRef:
        key: ibmcloud-apikey  # IBM Secrets Manager secret ID
