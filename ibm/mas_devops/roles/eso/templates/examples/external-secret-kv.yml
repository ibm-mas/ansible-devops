#     name: my-kv-secret-all
#     creationPolicy: Owner
#   # Use dataFrom.extract to fetch all key-value pairs
#   dataFrom:
#     - extract:
#         # IMPORTANT: Prefix with 'kv/' for key-value secrets
#         key: "kv/YOUR-SECRET-ID"
#   # This will create a Kubernetes Secret with all keys from your IBM key-value secret
#   # The key names will be preserved as-is from IBM Secrets Manager

