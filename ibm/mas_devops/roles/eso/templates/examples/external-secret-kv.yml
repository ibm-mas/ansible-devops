# Example: Using SecretStore (namespace-specific) instead of ClusterSecretStore
# ---
# apiVersion: external-secrets.io/v1
# kind: ExternalSecret
# metadata:
#   name: example-kv-secretstore
#   namespace: mas-inst1-core
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: ibm-secrets-manager
#     kind: SecretStore  # Must be in the same namespace as this ExternalSecret
#   target:
#     name: my-kv-secret
#     creationPolicy: Owner
#   dataFrom:
#     - extract:
#         key: "kv/YOUR-SECRET-ID"

# Notes:
# - Always prefix key-value secret IDs with 'kv/' (e.g., "kv/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx")
# - Use 'data' with 'property' to fetch specific keys
# - Use 'dataFrom.extract' to fetch all keys at once
# - Secret IDs (UUIDs) are more reliable than secret names
# - The 'property' field specifies which key to fetch from the key-value secret
# - The 'secretKey' field specifies the key name in the resulting Kubernetes Secret

