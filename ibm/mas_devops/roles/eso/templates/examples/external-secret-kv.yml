---
# Example ExternalSecret for key-value secrets
# This syncs a key-value secret from IBM Secrets Manager into a Kubernetes secret
#
# Key-value secrets in IBM Secrets Manager contain multiple key-value pairs.
#
# Usage:
# 1. Replace 'YOUR-SECRET-ID' with your actual secret ID (UUID format)
# 2. Update namespace if needed (default: default)
# 3. Update property names to match your actual keys in IBM Secrets Manager
# 4. Apply: oc apply -f external-secret-kv.yml

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: example-kv-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ibm-secrets-manager
    kind: ClusterSecretStore  # Use 'SecretStore' for namespace-specific store
  # Target Kubernetes Secret configuration
  target:
    name: my-kv-secret
    creationPolicy: Owner
  data:
    - secretKey: USERNAME  # Key name in the Kubernetes Secret
      remoteRef:
        # IMPORTANT: Prefix the secret ID with 'kv/' for key-value secrets
        key: "kv/YOUR-SECRET-ID"
        property: "username"  # The key name in your IBM key-value secret
    - secretKey: PASSWORD
      remoteRef:
        key: "kv/YOUR-SECRET-ID"
        property: "password"
    - secretKey: DATABASE_HOST
      remoteRef:
        key: "kv/YOUR-SECRET-ID"
        property: "host"
    - secretKey: DATABASE_PORT
      remoteRef:
        key: "kv/YOUR-SECRET-ID"
        property: "port"

# Example: Fetch ALL keys from a key-value secret
