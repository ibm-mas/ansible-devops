---
# Apply namespace-scoped essential Roles that must be created by the CLI
# for external platform/operator namespaces such as cert-manager and ingress

- name: "Find CLI-managed namespace-scoped essential Role files for {{ current_operator }}"
  find:
    paths: "{{ operator_rbac_path }}"
    patterns: "role-essential-*.yaml,role-essential-*.yml,role-essential-external-*.yaml,role-essential-external-*.yml"
  register: essential_external_files
  failed_when: false
  when:
    - operator_source in ['redhat-operator-catalog', 'openshift-platform']

- name: "Apply CLI-managed namespace-scoped essential Roles for {{ current_operator }}"
  when:
    - operator_source in ['redhat-operator-catalog', 'openshift-platform']
    - essential_external_files.matched > 0
  block:
    - name: "Apply each CLI-managed namespace-scoped essential Role"
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', item.path) }}"
      loop: "{{ essential_external_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      ignore_errors: true  # Target namespace may not exist yet

    - name: "CLI-managed namespace-scoped essential Roles applied"
      debug:
        msg: "Applied {{ essential_external_files.matched }} CLI-managed namespace-scoped essential Role(s) for {{ operator_source }}/{{ current_operator }}"
