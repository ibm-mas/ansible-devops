---
# Apply namespace-scoped essential external Roles for a specific operator

- name: "Find namespace-scoped essential external Role files for {{ current_operator }}"
  find:
    paths: "{{ operator_rbac_path }}"
    patterns: "role-essential-external-*.yaml,role-essential-external-*.yml"
  register: essential_external_files
  failed_when: false

- name: "Apply namespace-scoped essential external Roles for {{ current_operator }}"
  when: essential_external_files.matched > 0
  block:
    - name: "Apply each namespace-scoped essential external Role"
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', item.path) }}"
      loop: "{{ essential_external_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      ignore_errors: true  # Target namespace may not exist yet

    - name: "Namespace-scoped essential external Roles applied"
      debug:
        msg: "Applied {{ essential_external_files.matched }} namespace-scoped essential external Role(s) for {{ current_operator }}"
