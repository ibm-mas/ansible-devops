---
# Discover all available operators in the flattened RBAC directory structure:
# operators/<operator>/rbac/<mas_version>/*.yml

- name: "Set operators RBAC root path"
  set_fact:
    operators_rbac_root_dir: "{{ rbac_files_dir }}"

- name: "Check if operators RBAC root exists"
  stat:
    path: "{{ operators_rbac_root_dir }}"
  register: operators_rbac_root_check

- name: "Fail if operators RBAC root not found"
  fail:
    msg: "RBAC directory not found at {{ operators_rbac_root_dir }}. Ensure pre-install RBAC files are included in CLI image."
  when: not operators_rbac_root_check.stat.exists

- name: "Find operator RBAC version directories for MAS {{ mas_rbac_version }}"
  find:
    paths: "{{ operators_rbac_root_dir }}"
    file_type: directory
    recurse: true
    patterns: "{{ mas_rbac_version }}"
  register: operator_version_dirs

- name: "Extract operator names from version directory paths"
  set_fact:
    discovered_operators: >-
      {{
        operator_version_dirs.files
        | map(attribute='path')
        | map('regex_replace', '^' ~ (operators_rbac_root_dir | regex_escape) ~ '/', '')
        | map('split', '/')
        | map('first')
        | unique
        | list
      }}

- name: "Validate at least one operator was discovered"
  assert:
    that:
      - discovered_operators is defined
      - discovered_operators | length > 0
    fail_msg: "No operators discovered with RBAC version {{ mas_rbac_version }} under {{ operators_rbac_root_dir }}"

- name: "Debug - Discovered operators"
  debug:
    msg:
      - "MAS RBAC Version ............ {{ mas_rbac_version }}"
      - "Operators RBAC Root ......... {{ operators_rbac_root_dir }}"
      - "Discovered Operators ........ {{ discovered_operators | join(', ') }}"
      - "Total Operators ............. {{ discovered_operators | length }}"
