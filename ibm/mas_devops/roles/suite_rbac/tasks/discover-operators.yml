---
# Discover all available operators in the RBAC directory for the specified MAS version
# This allows us to apply RBAC for all operators without knowing which apps will be installed

- name: "Set versioned RBAC directory path"
  set_fact:
    versioned_rbac_dir: "{{ rbac_files_dir }}/{{ mas_rbac_version }}"

- name: "Check if versioned RBAC directory exists"
  stat:
    path: "{{ versioned_rbac_dir }}"
  register: versioned_dir_check

- name: "Fail if versioned RBAC directory not found"
  fail:
    msg: "RBAC directory not found at {{ versioned_rbac_dir }}. Ensure pre-install RBAC files for MAS {{ mas_rbac_version }} are included in CLI image."
  when: not versioned_dir_check.stat.exists

- name: "Find all operator directories in MAS {{ mas_rbac_version }}"
  find:
    paths: "{{ versioned_rbac_dir }}"
    file_type: directory
    recurse: no
  register: operator_dirs

- name: "Extract operator names from directories"
  set_fact:
    discovered_operators: "{{ operator_dirs.files | map(attribute='path') | map('basename') | list }}"

- name: "Validate at least one operator was discovered"
  assert:
    that:
      - discovered_operators is defined
      - discovered_operators | length > 0
    fail_msg: "No operators discovered in {{ versioned_rbac_dir }}"

- name: "Debug - Discovered operators"
  debug:
    msg:
      - "MAS RBAC Version ............ {{ mas_rbac_version }}"
      - "Versioned RBAC Directory .... {{ versioned_rbac_dir }}"
      - "Discovered Operators ........ {{ discovered_operators | join(', ') }}"
      - "Total Operators ............. {{ discovered_operators | length }}"
