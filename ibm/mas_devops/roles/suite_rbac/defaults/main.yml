---
# Permission mode from environment (cluster, nonEssential, essential)
mas_permission_mode: "{{ lookup('env', 'MAS_PERMISSION_MODE') }}"

# MAS instance ID
mas_instance_id: "{{ lookup('env', 'MAS_INSTANCE_ID') }}"

# MAS channel from environment (e.g., 9.2.x, 9.3.x)
mas_channel: "{{ lookup('env', 'MAS_CHANNEL') }}"

# MAS version for RBAC files (e.g., 9.2, 9.3)
# Use MAS_RBAC_VERSION from environment if set (passed by CLI for upgrades)
# Extract from mas_channel if MAS_RBAC_VERSION is not set
mas_rbac_version: "{{ lookup('env', 'MAS_RBAC_VERSION') if lookup('env', 'MAS_RBAC_VERSION') != '' else (mas_channel | regex_replace('^([0-9]+\\.[0-9]+).*', '\\1') if mas_channel is defined and mas_channel != '' else '') }}"

# RBAC files location in CLI image /opt/app-root/rbac/operators/<mas_version>/<operator>/rbac/
rbac_files_dir: "/opt/app-root/rbac/operators"

# Cross-namespace scoped essential RBAC location in CLI image /opt/app-root/rbac/operators/<mas_version>/cross-namespace-scoped-essential-roles/
cross_namespace_scoped_essential_roles_dir: "/opt/app-root/rbac/operators"

# List of discovered operators (populated by discover-operators.yml)
discovered_operators: []
