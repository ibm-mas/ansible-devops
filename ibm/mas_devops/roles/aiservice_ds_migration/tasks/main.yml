---
# aiservice_ds_migration/tasks/main.yml
# =============================================================================
# Main task file for ODH to RHOAI migration
# This role can be run standalone or as part of mas_update

- name: "Fail if required parameters are not provided"
  assert:
    that:
      - aiservice_instance_id is defined and aiservice_instance_id != ""
    fail_msg: "AISERVICE_INSTANCE_ID must be provided"

- name: "Migration : Display role information"
  debug:
    msg:
      - "=============================================="
      - "AI Service DataScienceCluster Migration"
      - "=============================================="
      - "AI Service Instance ID .... {{ aiservice_instance_id }}"
      - "AI Service Namespace ...... {{ aiservice_ns }}"
      - "Skip Migration ............ {{ skip_migration }}"

# 1. Detect current platform
# -----------------------------------------------------------------------------
- name: "Migration : Get operator subscriptions"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    namespace: openshift-operators
  register: operator_subscriptions

- name: "Migration : Check platform status"
  set_fact:
    odh_installed: "{{ operator_subscriptions.resources | selectattr('metadata.name', 'equalto', 'opendatahub-operator') | list | length > 0 }}"
    rhoai_installed: "{{ operator_subscriptions.resources | selectattr('metadata.name', 'equalto', 'rhods-operator') | list | length > 0 }}"

- name: "Migration : Display platform detection"
  debug:
    msg:
      - "Platform Detection:"
      - "  ODH installed: {{ odh_installed }}"
      - "  RHOAI installed: {{ rhoai_installed }}"

# 2. Determine if migration is needed
# -----------------------------------------------------------------------------
- name: "Migration : Set migration needed flag"
  set_fact:
    migration_needed: "{{ odh_installed and not rhoai_installed and not skip_migration }}"

- name: "Migration : Display migration decision"
  debug:
    msg:
      - "Migration Decision:"
      - "  Migration needed: {{ migration_needed }}"
      - "  Reason: {% if skip_migration %}Migration skipped by user{% elif rhoai_installed %}RHOAI already installed{% elif not odh_installed %}ODH not installed{% elif migration_needed %}ODH detected, migrating to RHOAI{% else %}Unknown{% endif %}"

# 3. Skip if migration not needed
# -----------------------------------------------------------------------------
- name: "Migration : Skip - RHOAI already installed"
  debug:
    msg: "RHOAI is already installed. Skipping migration."
  when: rhoai_installed

- name: "Migration : Skip - ODH not installed"
  debug:
    msg: "ODH is not installed. Skipping migration."
  when: not odh_installed

- name: "Migration : Skip - Migration disabled by user"
  debug:
    msg: "Migration skipped by user (skip_migration=true)."
  when: skip_migration

# 4. Perform migration if needed
# -----------------------------------------------------------------------------
- name: "Migration : Perform ODH to RHOAI migration"
  block:
    - name: "Migration : Display migration notice"
      debug:
        msg:
          - "=============================================="
          - "ODH to RHOAI Migration Required"
          - "=============================================="
          - "Open Data Hub (ODH) has been detected and must"
          - "be migrated to Red Hat OpenShift AI (RHOAI)."
          - ""
          - "Migration Details:"
          - "  - Expected time: 5-10 minutes"
          - "  - Deployed models will be preserved"
          - "  - Model downtime: 8-16 minutes"
          - ""
          - "This migration is MANDATORY to continue"
          - "receiving updates."
          - "=============================================="

    - name: "Migration : Confirm migration"
      pause:
        prompt: |

          Do you want to proceed with the ODH to RHOAI migration? (yes/no)

          Note: This is required to continue using AI Service with updated catalogs.
      register: migration_confirmation
      when:
        - not skip_migration
        - not force_migration
        - not no_confirm

    - name: "Migration : Check user confirmation"
      fail:
        msg: "Migration cancelled by user. Update cannot proceed without migrating to RHOAI."
      when:
        - not skip_migration
        - not no_confirm
        - migration_confirmation.user_input | lower not in ['yes', 'y']

    # Get ODH CSV name
    - name: "Migration : Get ODH CSV"
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: openshift-operators
      register: csv_list

    - name: "Migration : Extract ODH CSV name"
      set_fact:
        odh_csv_name: "{{ csv_list.resources | selectattr('metadata.name', 'match', '^opendatahub-operator\\..*') | map(attribute='metadata.name') | first }}"
      when: csv_list.resources | selectattr('metadata.name', 'match', '^opendatahub-operator\\..*') | list | length > 0

    - name: "Migration : Debug - ODH CSV name"
      debug:
        msg: "ODH CSV to remove: {{ odh_csv_name | default('Not found') }}"

    # Scale down DataScienceCluster
    - name: "Migration : Scale down DataScienceCluster"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: datasciencecluster.opendatahub.io/v1
          kind: DataScienceCluster
          metadata:
            name: default-dsc
          spec:
            components:
              kserve:
                managementState: Removed
      ignore_errors: true

    - name: "Migration : Debug - DataScienceCluster scaled down"
      debug:
        msg: "DataScienceCluster kserve component set to Removed"

    - name: "Migration : Wait for pods to terminate (60s)"
      pause:
        seconds: 60

    # Delete ODH operator
    - name: "Migration : Delete ODH subscription"
      kubernetes.core.k8s:
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        name: opendatahub-operator
        namespace: openshift-operators
        state: absent
      when: odh_csv_name is defined

    - name: "Migration : Delete ODH CSV"
      kubernetes.core.k8s:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        name: "{{ odh_csv_name }}"
        namespace: openshift-operators
        state: absent
      when: odh_csv_name is defined

    - name: "Migration : Debug - ODH operator deleted"
      debug:
        msg: "ODH subscription and CSV deleted from openshift-operators"

    - name: "Migration : Wait for ODH cleanup (60s)"
      pause:
        seconds: 60

    # Delete DSCInitialization and DataScienceCluster
    # CRITICAL: These must be deleted because the ODH operator has cached
    # the opendatahub namespace and won't discover new namespaces.
    # RHOAI will recreate them automatically.
    - name: "Migration : Delete DataScienceCluster"
      kubernetes.core.k8s:
        api_version: datasciencecluster.opendatahub.io/v1
        kind: DataScienceCluster
        name: default-dsc
        state: absent
      ignore_errors: true

    - name: "Migration : Delete DSCInitialization"
      kubernetes.core.k8s:
        api_version: dscinitialization.opendatahub.io/v1
        kind: DSCInitialization
        name: default-dsci
        state: absent
      ignore_errors: true

    - name: "Migration : Debug - DSC resources deleted"
      debug:
        msg: "DSCInitialization and DataScienceCluster deleted"

    - name: "Migration : Wait for cleanup (30s)"
      pause:
        seconds: 30

    - name: "Migration : ODH cleanup complete"
      debug:
        msg:
          - "=============================================="
          - "ODH Migration - Phase 1 Complete"
          - "=============================================="
          - "ODH operator removed successfully"
          - "Starting RHOAI installation..."
          - "=============================================="

    - name: "Migration : Set migration performed flag"
      set_fact:
        odh_migration_performed: true

  when: migration_needed

# 5. Install RHOAI (Complete the migration)
# -----------------------------------------------------------------------------
# This section installs RHOAI operator and creates DataScienceCluster
# It runs after ODH removal OR if RHOAI needs to be installed/updated

- name: "RHOAI Installation : Check if RHOAI installation needed"
  set_fact:
    rhoai_installation_needed: "{{ migration_needed or (not rhoai_installed and not skip_migration) }}"

- name: "RHOAI Installation : Display installation decision"
  debug:
    msg:
      - "RHOAI Installation Decision:"
      - "  Installation needed: {{ rhoai_installation_needed }}"
      - "  Reason: {% if migration_needed %}Post-migration installation{% elif not rhoai_installed %}Fresh RHOAI installation{% else %}RHOAI already installed{% endif %}"

- name: "RHOAI Installation : Install RHOAI components"
  block:
    - name: "RHOAI Installation : Starting RHOAI installation"
      debug:
        msg:
          - "=============================================="
          - "Installing Red Hat OpenShift AI (RHOAI)"
          - "=============================================="
          - "This will install RHOAI operator and create"
          - "DataScienceCluster with KServe components"
          - "=============================================="

    # Include RHOAI installation tasks from aiservice_rhoai role
    - name: "RHOAI Installation : Include RHOAI role"
      include_role:
        name: ibm.mas_devops.aiservice_rhoai
      vars:
        # Pass through required variables
        mas_instance_id: "{{ aiservice_instance_id }}"
        aiservice_namespace: "{{ aiservice_ns }}"

    - name: "RHOAI Installation : Complete"
      debug:
        msg:
          - "=============================================="
          - "Migration Complete!"
          - "=============================================="
          - "ODH removed: {{ odh_migration_performed | default(false) }}"
          - "RHOAI installed: true"
          - "DataScienceCluster ready for model deployment"
          - "=============================================="

  when: rhoai_installation_needed

# 6. Set migration flag for downstream roles (if any)
# -----------------------------------------------------------------------------
- name: "Migration : Set migration flag (not performed)"
  set_fact:
    odh_migration_performed: false
  when: not migration_needed
