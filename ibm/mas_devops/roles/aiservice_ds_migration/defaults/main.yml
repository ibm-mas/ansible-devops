---
# aiservice_ds_migration
# =============================================================================
# This role handles the migration from Open Data Hub (ODH) to Red Hat OpenShift AI (RHOAI)

# AI Service Instance ID (REQUIRED)
# -----------------------------------------------------------------------------
# This is the primary identifier for the AI Service instance
aiservice_instance_id: "{{ lookup('env', 'AISERVICE_INSTANCE_ID') }}"

# AI Service Namespace
# -----------------------------------------------------------------------------
aiservice_ns: "aiservice-{{ aiservice_instance_id }}"
