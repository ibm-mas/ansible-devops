---
# Generic Settings
# -----------------------------------------------------------------------------
cluster_type: "{{ lookup('env', 'CLUSTER_TYPE') }}"
cluster_name: "{{ lookup('env', 'CLUSTER_NAME') }}"

# ROSA
rosa_token: "{{ lookup('env', 'ROSA_TOKEN') }}"


# Configuration Settings
# -----------------------------------------------------------------------------
ocp_ingress_update_timeouts: "{{ lookup('env', 'OCP_INGRESS_UPDATE_TIMEOUTS') | default('False', true) | bool }}"
ocp_update_ciphers_for_semeru: "{{ lookup('env', 'OCP_UPDATE_CIPHERS_FOR_SEMERU') | default('False', true) | bool }}"

# Ingress Controller Settings
# -----------------------------------------------------------------------------
ocp_ingress_client_timeout: "{{ lookup('env', 'OCP_INGRESS_CLIENT_TIMEOUT') | default('30s', true) }}"
ocp_ingress_server_timeout: "{{ lookup('env', 'OCP_INGRESS_SERVER_TIMEOUT') | default('30s', true) }}"
ocp_ingress_controller_name: "{{ lookup('env', 'OCP_INGRESS_CONTROLLER_NAME') | default('default', true) }}"
ocp_ingress_namespace_ownership: "{{ lookup('env', 'OCP_INGRESS_NAMESPACE_OWNERSHIP') }}"

# OperatorHub Settings
# -----------------------------------------------------------------------------
ocp_operatorhub_disable_redhat_sources: "{{ lookup('env', 'OCP_OPERATORHUB_DISABLE_REDHAT_SOURCES') | default('False', true) | bool }}"


# Allowed Registries Settings
# -----------------------------------------------------------------------------
ocp_update_allowed_registries: "{{ lookup('env', 'OCP_UPDATE_ALLOWED_REGISTRIES') | default('False', true) | bool }}"
ocp_allowed_registries: "{{ lookup('env', 'OCP_ALLOWED_REGISTRIES') | default([], true) }}"
ocp_allowed_mas_registries: ["icr.io", "cp.icr.io", "quay.io", "gcr.io"]
ocp_allowed_rh_registries: ["icr.io", "registry.redhat.io", "registry.connect.redhat.com", "ghcr.io", "docker.io", "nvcr.io", "gcr.io"]
ocp_add_mas_registries: "{{ lookup('env', 'OCP_ADD_MAS_REGISTRIES') | default('True', true) | bool }}"
ocp_add_rh_registries: "{{ lookup('env', 'OCP_ADD_RH_REGISTRIES') | default('True', true) | bool }}"


# Additional Trusted CA Settings
# -----------------------------------------------------------------------------
ocp_update_additional_trusted_ca: "{{ lookup('env', 'OCP_UPDATE_ADDITIONAL_TRUSTED_CA') | default('False', true) | bool }}"
ocp_additional_trusted_ca_dir: "{{ lookup('env', 'OCP_ADDITIONAL_TRUSTED_CA_DIR') | default('/tmp', true) }}"


# Enable ipv6?
ocp_enable_ipv6: "{{ lookup('env', 'OCP_ENABLE_IPV6') | default('false', true) | bool }}"
