---
# 1. Debug Info
# -----------------------------------------------------------------------------
- name: "Debug configuration actions"
  debug:
    msg:
      - "ocp_update_ciphers_for_semeru ........... {{ ocp_update_ciphers_for_semeru }}"
      - "ocp_ingress_update_timeouts ............. {{ ocp_ingress_update_timeouts }}"
      - "ocp_ingress_namespace_ownership ......... {{ ocp_ingress_namespace_ownership if ocp_ingress_namespace_ownership != '' else 'Not set' }}"
      - "ocp_ingress_controller_name ............. {{ ocp_ingress_controller_name }}"
      - "ocp_operatorhub_disable_redhat_sources .. {{ ocp_operatorhub_disable_redhat_sources }}"
      - "ocp_update_allowed_registries ........... {{ ocp_update_allowed_registries }}"
      - "ocp_update_additional_trusted_ca ........ {{ ocp_update_additional_trusted_ca }}"

# 2. Update API Server
# -----------------------------------------------------------------------------
- include_tasks: update-ciphers-for-semeru.yml
  when: ocp_update_ciphers_for_semeru

# 3. Update Ingress Controller (timeouts and/or namespace ownership)
# -----------------------------------------------------------------------------
- include_tasks: update-ingress-controller.yml
  when: ocp_ingress_update_timeouts or ocp_ingress_namespace_ownership != ''

# 4. Update OperatorHub
# -----------------------------------------------------------------------------
- include_tasks: update-operatorhub.yml
  when: ocp_operatorhub_disable_redhat_sources

# 5. For enable dual stack networking and IPv6 configuration checks
- include_tasks: ipv6-config.yml
  when: ocp_enable_ipv6

- name: Check if cluster proxy is set
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: Proxy
    name: cluster
  register: proxy_info

- name: Set proxy configured fact
  ansible.builtin.set_fact:
    proxy_configured: >-
      {{
        proxy_info.resources | length > 0 and (
          (proxy_info.resources[0].spec.httpProxy  | default('')) != '' or
          (proxy_info.resources[0].spec.httpsProxy | default('')) != ''
        )
      }}

# 6. To enable proxy for testing in FVT environment
- include_tasks: proxy-config.yml
  when: ocp_enable_proxy and not proxy_configured

- include_tasks: prereq-check.yml
  when:
    - ocp_enable_ipv6 or ocp_enable_proxy
    - not proxy_configured

# 7. Update allowed registries
# -----------------------------------------------------------------------------
- include_tasks: update-allowed-registries.yml
  when: ocp_update_allowed_registries

# 8. Update additional trusted CA
# -----------------------------------------------------------------------------
- include_tasks: update-additional-trusted-ca.yml
  when: ocp_update_additional_trusted_ca
#ocp_enable_ipv6
