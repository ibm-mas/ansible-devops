---
# 1. For IPv6 testing, enable dual stack networking
- name: Lookup network for IPv6 testing
  kubernetes.core.k8s:
    api_version: config.openshift.io/v1
    kind: Network
    name: "cluster"
  register: _network

- name: "Enable dual stack networking"
  kubernetes.core.k8s_json_patch:
    kind: Network
    name: "cluster"
    api_version: config.openshift.io/v1
    patch:
      - op: add
        path: /spec/clusterNetwork/-
        value:
          cidr: fd01::/48
          hostPrefix: 64
      - op: add
        path: /spec/serviceNetwork/-
        value: fd02::/112
  register: _dualstackNetworkAddr
  when:
    - "'fd01::/48' not in (_network.result.spec.clusterNetwork | map(attribute='cidr') | list)"

# 2. Wait for network operator to reconcile after dual-stack changes
- name: "Wait for network operator to complete dual-stack reconciliation"
  kubernetes.core.k8s_info:
    api_version: operator.openshift.io/v1
    kind: Network
    name: cluster
  register: _network_status
  until:
    - _network_status.resources[0].status.conditions is defined
    - _network_status.resources[0].status.conditions | selectattr('type', 'equalto', 'Progressing') | map(attribute='status') | first == 'False'
    - _network_status.resources[0].status.conditions | selectattr('type', 'equalto', 'Available') | map(attribute='status') | first == 'True'
  retries: 60
  delay: 20

- name: "Debug network operator status"
  debug:
    msg: "Network operator - Progressing: {{ _network_status.resources[0].status.conditions | selectattr('type', 'equalto', 'Progressing') | map(attribute='status') | first }}, Available: {{ _network_status.resources[0].status.conditions | selectattr('type', 'equalto', 'Available') | map(attribute='status') | first }}"
  when:
    - _network_status is defined
    - _network_status is failed
    
# 3. Wait for all nodes to report network ready
- name: "Wait for all nodes to report network ready"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
  register: _nodes
  until:
    - _nodes is succeeded
    - _nodes.resources is defined
    - _nodes.resources | selectattr('status.conditions', 'defined') | map(attribute='status.conditions') | flatten | selectattr('type', 'equalto', 'NetworkUnavailable') | map(attribute='status') | select('equalto', 'True') | list | length == 0
  retries: 60
  delay: 10

# 4. Approve pending node CSRs
- name: Get pending node CSRs
  ansible.builtin.shell: |
    oc get csr -o json | jq -r '
      .items[]
      | select(.status.conditions == null)
      | select(.spec.username | startswith("system:node:"))
      | .metadata.name'
  register: pending_node_csrs
  changed_when: false

- name: Approve pending node CSRs
  ansible.builtin.command:
    cmd: "oc adm certificate approve {{ item }}"
  loop: "{{ pending_node_csrs.stdout_lines }}"
  when: pending_node_csrs.stdout_lines | length > 0
  
# 5. Verify all workers have IPv6 configured
    
- name: Get worker nodes
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
    label_selectors:
      - node-role.kubernetes.io/worker
  register: worker_nodes

- name: Initialize missing IPv6 node list
  ansible.builtin.set_fact:
    workers_missing_ipv6: []

- name: Find workers missing IPv6
  ansible.builtin.set_fact:
    workers_missing_ipv6: "{{ workers_missing_ipv6 + [item.metadata.name] }}"
  loop: "{{ worker_nodes.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  when: >
    (
      item.metadata.annotations['k8s.ovn.org/node-primary-ifaddr']
      | default('{}')
      | from_json
    ).ipv6 is not defined
    
- name: Verify all workers have IPv6 configured
  ansible.builtin.assert:
    that:
      - workers_missing_ipv6 | length == 0
    fail_msg: >-
      IPv6 is missing on worker nodes:
      {{ workers_missing_ipv6 | join(', ') }}
  register: ipv6_check
  until: ipv6_check is succeeded
  retries: 20
  delay: 20
