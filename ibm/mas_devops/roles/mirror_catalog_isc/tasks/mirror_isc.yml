- name: "{{ image_name }} : Debug registry type"
  debug:
    msg:
      - "ISC Registry ........................... {{ isc_registry }}"
      - "ISC File Path ......................... {{ isc_public_path }}"
      - "Is Artifactory ........................ {{ is_artifactory }}"
      - "Is GitHub ............................. {{ is_github }}"

# 1A. Download ISC file from Artifactory
- name: "{{ image_name }} : Download ISC file from Artifactory with token"
  when: is_artifactory | bool
  get_url:
    url: "{{ isc_public_path }}"
    dest: "{{ isc_file }}"
    mode: '755'
    headers:
      Authorization: "Bearer {{ artifactory_token }}"
  register: download_result_artifactory
  ignore_errors: true
  #no_log: true

# 1B. Download ISC file from GITHUB
- name: "{{ image_name }} : Download ISC file from GitHub"
  when: is_github | bool
  get_url:
    url: "{{ isc_public_path }}"
    dest: "{{ isc_file }}"
    mode: '0755'
    headers:
      Authorization: "token {{ github_token_isc }}"
      Accept: "application/vnd.github.v3.raw"
    validate_certs: yes
  register: download_result_github
  ignore_errors: true
  no_log: true

- name: Debug download result
  debug:
    msg: "{{ download_result_github }}"

# 1C. Check if download failed with 404
- name: "{{ image_name }} : Check if download failed with 404"
  set_fact:
    download_failed_404: "{{
      (is_artifactory | bool and download_result_artifactory.failed | default(false) and ('404' in download_result_artifactory.msg | default('') or 'Not Found' in download_result_artifactory.msg | default(''))) or
      (is_github | bool and download_result_github.failed | default(false) and ('404' in download_result_github.response | default('') or 'Not Found' in download_result_github.response | default('')))
      }}"

- name: "{{ image_name }} : Log 404 error and skip"
  when: download_failed_404 | bool
  debug:
    msg: "ISC file not found (404): {{ isc_public_path }}. Skipping mirror for this architecture."

# 1D. Check for other download errors
- name: "{{ image_name }} : Check for other download errors"
  when:
    - not (download_failed_404 | bool)
    - (is_artifactory | bool and download_result_artifactory.failed | default(false)) or (is_github | bool and download_result_github.failed | default(false))
  fail:
    msg: "Failed to download ISC file: {{ isc_public_path }}"

# 1E. Verify ISC file was downloaded
- name: "{{ image_name }} : Verify ISC file was downloaded"
  when: not (download_failed_404 | bool)
  stat:
    path: "{{ isc_file }}"
  register: isc_file_stat
  failed_when: not isc_file_stat.stat.exists

# 2. Execute the mirror (to filesystem)
# -----------------------------------------------------------------------------
- name: "{{ image_name }} : Mirror Images to local filesystem"
  when:
    - mirror_mode == "to-filesystem"
    - not (download_failed_404 | default(false) | bool)
  block:
    - name: "{{ image_name }}: Run mirror command"
      shell: |
        oc mirror \
          -c "{{ isc_file }}" \
          --authfile "{{ auth_file }}" \
          file://{{ mirror_working_dir }} --v2
      register: ocimagemirror_result
      ignore_errors: true

    - name: "{{ image_name }} : Debug mirror command"
      debug:
        msg:
          - "Source: {{ isc_file }}"
          - "Auth: {{ auth_file }}"
          - "{{ (ocimagemirror_result.rc == 0) | ternary(ocimagemirror_result.stdout_lines, ocimagemirror_result.stderr_lines) }}"

    - name: "{{ image_name }} : Fail if mirror is not successful"
      assert:
        that: ocimagemirror_result.rc == 0
        fail_msg: "Image mirroring failed (see debug information above)."

# 3. Create AWS ECR Repositories if required
# -----------------------------------------------------------------------------
- name: "Create AWS ECR Repositories - direct mode"
  when:
    - mirror_mode == "direct"
    - registry_is_ecr == true
    - not (download_failed_404 | default(false) | bool)
  block:
    - name: "{{ image_name }} : dry mode mirror command - direct"
      shell: |
        oc mirror \
          -c "{{ isc_file }}" \
          --authfile "{{ auth_file }}" \
          --workspace file://{{ ansible_env.HOME }}/.ibm-mas \
          docker://{{ registry_public_url_with_path }} \
          --dest-tls-verify false \
          --src-tls-verify false \
          --dry-run --v2
      register: ocimagemirror_dryrun_result
      ignore_errors: true
      when: mirror_mode == "direct"

    - name: "{{ image_name }} : Debug dry mode mirror command - direct"
      debug:
        msg: "{{ (ocimagemirror_dryrun_result.rc == 0) | ternary(ocimagemirror_dryrun_result.stdout_lines, ocimagemirror_dryrun_result.stderr_lines) }}"

    - name: "{{ image_name }} : Fail if dry mode mirror is not successful - direct"
      assert:
        that: ocimagemirror_dryrun_result.rc == 0
        fail_msg: "mirror command in dry mode failed."


    - name: Set image mapping file path
      set_fact:
        image_map_file: "{{ ansible_env.HOME }}/.ibm-mas/working-dir/dry-run/mapping.txt"

    - name: Debug image mapping file path
      debug:
        msg: "Image mapping file: {{ image_map_file }}"

    - name: Filter out repository names that must be created in ECR - direct
      set_fact:
        repos_to_add: "{{ image_map_file | ibm.mas_devops.get_ecr_repositories_v2('051826726580.dkr.ecr.us-east-1.amazonaws.com') }}"

    - name: Repositories that will be created in ECR - direct
      debug:
        msg: "{{ repos_to_add }}"

    - name: Create ECR Repositories - direct
      ansible.builtin.shell: "aws ecr create-repository --repository-name {{ item }} --region {{ registry_ecr_aws_region }}"
      ignore_errors: true
      loop: "{{ repos_to_add }}"

# 4C. Execute the mirror (from filesystem)
# -----------------------------------------------------------------------------
- name: "{{ image_name }} : Mirror Images from local filesystem"
  when: mirror_mode == "from-filesystem"
  block:
    - name: "{{ image_name }} : Run mirror command"
      shell: |
        oc mirror \
            -c "{{ isc_file }}" \
            --from file://{{ mirror_working_dir }} \
            --dest-tls-verify=false \
            --authfile "{{ auth_file }}" \
            docker://{{ registry_public_url_with_path }}  --v2
      register: ocimagemirror_result
      ignore_errors: true

    - name: "{{ image_name }} : Debug mirror command"
      debug:
        msg:
          - "Source:  {{ isc_file }}"
          - "Auth: {{ auth_file }}"
          - "{{ (ocimagemirror_result.rc == 0) | ternary(ocimagemirror_result.stdout_lines, ocimagemirror_result.stderr_lines) }}"

    - name: "{{ image_name }} : Fail if mirror is not successful"
      assert:
        that: ocimagemirror_result.rc == 0
        fail_msg: "Image mirroring failed (see debug information above)."

# 4D. Execute the mirror (direct)
# -----------------------------------------------------------------------------
- name: "Mirror Images directly"
  when: mirror_mode == "direct"
  block:
    - name: "{{ image_name }} : Run mirror command"
      shell: |
        oc mirror \
          -c "{{ isc_file }}" \
          --dest-tls-verify=false \
          --workspace file://{{ ansible_env.HOME }}/.ibm-mas \
          --authfile "{{ auth_file }}" \
          docker://{{ registry_public_url_with_path }} --v2
      register: ocimagemirror_result
      ignore_errors: true

    - name: "{{ image_name }} : Debug mirror command"
      debug:
        msg:
          - "Source: {{ isc_file }}"
          - "Auth:{{ auth_file }}"
          - "{{ (ocimagemirror_result.rc == 0) | ternary(ocimagemirror_result.stdout_lines, ocimagemirror_result.stderr_lines) }}"

    - name: "{{ image_name }} : Fail if mirror is not successful"
      assert:
        that: ocimagemirror_result.rc == 0
        fail_msg: "Image mirroring failed (see debug information above).
