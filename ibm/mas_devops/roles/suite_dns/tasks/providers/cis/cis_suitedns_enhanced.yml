---
- ansible.builtin.include_tasks: tasks/providers/cis/cis_dns_mgmt.yml

- name: "cis : login to IBM Cloud"
  ansible.builtin.shell: |
    ibmcloud login --apikey "{{ cis_apikey }}" -q --no-region
  retries: 10
  delay: 60 # 1 minute
  no_log: true

- include_tasks: tasks/providers/cis/cis_edge_certificate.yml

- name: "cis: use managed_rulesets"
  ansible.builtin.shell: |
    ibmcloud cis waf-packages {{ (_cis_domains_result.stdout | from_json)[0].id}} \
    -i "{{ cis_service_name }}"
  failed_when: false
  register: error_output


- name: "cis: configure WAF rules"
  when: error_output.rc == 0
  block:
  # Load the WAF rules to disable

    - name: "cis : WAF rules to disable"
      include_vars: vars/waf_rules_to_disable.yml

    - include_tasks: tasks/providers/cis/cis_waf_rule.yml
      loop: "{{ waf_rules_to_disable }}"

- name: "cis: Configure WAF managed rulesets"
  when: error_output.rc != 0
  block:

    - name: "cis: list of managed ruleset rules to disable"
      ansible.builtin.include_vars: vars/managed_ruleset_rules_to_disable.yml

    - name: "cis: get CIS Managed Ruleset ruleset_id"
      ansible.builtin.shell: |
        ibmcloud cis managed-waf rulesets {{ (_cis_domains_result.stdout | from_json)[0].id }} \
        -i "{{ cis_service_name }}" --output json | jq -r '.[] | select(.name == "CIS Managed Ruleset") | .id'
      register: _cis_ruleset_result

    - name: "cis: validate CIS Managed Ruleset ID was found"
      ansible.builtin.fail:
        msg: "CIS Managed Ruleset ID not found. Ensure the ruleset exists in the CIS instance."
      when: _cis_ruleset_result.stdout | trim | length == 0

    - name: "cis: get deployed rule id and enabled status for CIS Managed Ruleset"
      ansible.builtin.shell: |
        ibmcloud cis managed-waf deployments {{ (_cis_domains_result.stdout | from_json)[0].id }} \
        -i "{{ cis_service_name }}" --output json | jq -r --arg target_id {{ _cis_ruleset_result.stdout }} \
        '(.rules // [])[] | select(.action_parameters.id == $target_id) | "\(.id) \(.enabled)"'
      register: _cis_rule_status_result

    - name: "cis: set deployed rule facts"
      ansible.builtin.set_fact:
        _cis_rule_id: "{{ _cis_rule_status_result.stdout.split(' ')[0] | default('') }}"
        _cis_rule_enabled: "{{ _cis_rule_status_result.stdout.split(' ')[1] | default('false') }}"

    - name: "cis: get IAM token for CIS API"
      ansible.builtin.shell: |
        ibmcloud iam oauth-tokens --output json | jq -r '.iam_token'
      register: _cis_iam_token_result
      when: _cis_rule_id | trim | length == 0
      no_log: true

    - name: "cis: check if http_request_firewall_managed entry point ruleset exists"
      ansible.builtin.shell: |
        curl -s -X GET \
          "https://api.cis.cloud.ibm.com/v1/{{ cis_crn }}/zones/{{ (_cis_domains_result.stdout | from_json)[0].id }}/rulesets/phases/http_request_firewall_managed/entrypoint" \
          -H "X-Auth-User-Token: {{ _cis_iam_token_result.stdout }}" \
          -H "Content-Type: application/json"
      register: _cis_entrypoint_check_result
      failed_when: false
      when: _cis_rule_id | trim | length == 0
      no_log: true

    - name: "cis: debug entry point ruleset check result"
      ansible.builtin.debug:
        msg: "{{ _cis_entrypoint_check_result.stdout | from_json }}"
      when: _cis_rule_id | trim | length == 0

    - name: "cis: create http_request_firewall_managed entry point ruleset via API"
      ansible.builtin.shell: |
        curl -s -X POST \
          "https://api.cis.cloud.ibm.com/v1/{{ cis_crn }}/zones/{{ (_cis_domains_result.stdout | from_json)[0].id }}/rulesets" \
          -H "X-Auth-User-Token: {{ _cis_iam_token_result.stdout }}" \
          -H "Content-Type: application/json" \
          -d '{"name":"Zone-level phase entry point","kind":"zone","description":"WAF managed rule entrypoint ruleset.","phase":"http_request_firewall_managed"}'
      register: _cis_entrypoint_create_result
      when:
        - _cis_rule_id | trim | length == 0
        - not (_cis_entrypoint_check_result.stdout | from_json).success
      no_log: true

    - name: "cis: debug entry point ruleset creation response"
      ansible.builtin.debug:
        msg: "{{ _cis_entrypoint_create_result.stdout | from_json }}"
      when:
        - _cis_rule_id | trim | length == 0
        - not (_cis_entrypoint_check_result.stdout | from_json).success

    - name: "cis: verify http_request_firewall_managed entry point ruleset after creation"
      ansible.builtin.shell: |
        curl -s -X GET \
          "https://api.cis.cloud.ibm.com/v1/{{ cis_crn }}/zones/{{ (_cis_domains_result.stdout | from_json)[0].id }}/rulesets/phases/http_request_firewall_managed/entrypoint" \
          -H "X-Auth-User-Token: {{ _cis_iam_token_result.stdout }}" \
          -H "Content-Type: application/json"
      register: _cis_entrypoint_verify_result
      when:
        - _cis_rule_id | trim | length == 0
        - not (_cis_entrypoint_check_result.stdout | from_json).success
      no_log: true

    - name: "cis: debug entry point ruleset verification result"
      ansible.builtin.debug:
        msg: "{{ _cis_entrypoint_verify_result.stdout | from_json }}"
      when:
        - _cis_rule_id | trim | length == 0
        - not (_cis_entrypoint_check_result.stdout | from_json).success

    - name: "cis: add CIS Managed Ruleset to WAF when WAF rule does not exist"
      ansible.builtin.shell: |
        ibmcloud cis managed-waf deployment-add-ruleset {{ (_cis_domains_result.stdout | from_json)[0].id }} {{ _cis_ruleset_result.stdout }} \
        -i "{{ cis_service_name }}" --enabled true
      when: _cis_rule_id | trim | length == 0

    - name: "cis: get deployed rule id for CIS Managed Ruleset id"
      ansible.builtin.shell: |
        ibmcloud cis managed-waf deployments {{ (_cis_domains_result.stdout | from_json)[0].id }} \
        -i "{{ cis_service_name }}" --output json | jq -r --arg target_id "{{ _cis_ruleset_result.stdout }}" '(.rules // [])[] | select(.action_parameters.id == $target_id) | .id'
      register: _cis_rule_id_result

    - name: "cis: enable CIS Managed Ruleset if deployed but disabled"
      ansible.builtin.shell: |
        ibmcloud cis managed-waf deployment-update-ruleset {{ (_cis_domains_result.stdout | from_json)[0].id }} {{ _cis_rule_id_result.stdout }} \
        --enabled true --reset-all -i "{{ cis_service_name }}"
      when:
        - _cis_rule_id | trim | length > 0
        - _cis_rule_enabled == 'false'

    - ansible.builtin.include_tasks: tasks/providers/cis/cis_managed_ruleset.yml
      loop: "{{ managed_ruleset_rules_to_disable }}"
- ansible.builtin.include_tasks: tasks/providers/cis/cis_domain_setting.yml
