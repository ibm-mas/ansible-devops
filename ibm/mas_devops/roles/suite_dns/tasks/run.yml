---
# 1. Parse MAS version from channel and set defaults for MAS 9.2+
# -----------------------------------------------------------------------------
- name: "Set default for mas_version_lt_92"
  when: mas_version_lt_92 is not defined
  set_fact:
    mas_version_lt_92: true

- name: "Override mas_version_lt_92 based on mas_channel if provided"
  when: mas_channel is defined and mas_channel != ""
  set_fact:
    mas_version_lt_92: "{{ mas_channel.split('.')[:2] | join('.') is version('9.2', '<') }}"

- name: "Debug version comparison result"
  debug:
    msg:
      - "MAS Channel ......................... {{ mas_channel | default('not set') }}"
      - "Version < 9.2 ...................... {{ mas_version_lt_92 }}"

- name: "Set default routing mode to 'path' for MAS 9.2+ if it's not defined"
  when:
    - mas_routing_mode is not defined or mas_routing_mode == ""
    - mas_channel is defined and mas_channel != ""
    - mas_channel.split('.')[:2] | join('.') is version('9.2', '>=')
  set_fact:
    mas_routing_mode: "path"

# 2. Check cert-manager installation
# -----------------------------------------------------------------------------
# Ensure cert manager is installed prior continuing as this role will install
# v1alpha1.acme.cis.ibm.com apiservice which requires cert manager to be running
- name: Detect Certificate Manager installation
  include_tasks: "{{ role_path }}/../../common_tasks/detect_cert_manager.yml"
  when: cert_manager_namespace is not defined or cert_manager_namespace | length == 0

- debug:
    msg:
      - "Certificate Manager Namespace .......... {{ cert_manager_namespace }}"

# 3. Run provider task
# -----------------------------------------------------------------------------
- name: "Run the provider specific task"
  when: dns_provider != ""
  include_tasks: tasks/providers/{{ dns_provider }}/main.yml

# 4. Set custom cp4d route based on the custom cluster issuer
# -----------------------------------------------------------------------------
- block:
    - name: Check if custom CP4D route is already configured # if it is, then we skip it to avoid override
      kubernetes.core.k8s_info:
        api_version: v1
        name: suite-cp4d-route
        namespace: "{{ cpd_instance_namespace }}"
        kind: Route
      register: _suite_cp4d_route

    - name: "Set up CP4D route under the appsuite domain"
      include_tasks: tasks/cp4d.yml
      when: _suite_cp4d_route.resources is defined and _suite_cp4d_route.resources | length == 0

  when:
    - dns_provider != ""
    - cpd_instance_namespace is defined and cpd_instance_namespace != ""
