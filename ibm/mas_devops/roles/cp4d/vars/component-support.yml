---
# CPD Platform Component Installation Method Support Matrix
# This file defines which installation methods (OLM/Helm) are supported for platform components

component_support_matrix:
  # Cloud Pak Foundational Services
  # Supports both OLM and Helm, OLM is default for CPD 5.2.0, Helm for 5.3.1+
  cpfs:
    support_olm: true
    support_helm: true
    migration_status: "both_supported"
    description: "Cloud Pak Foundational Services - Both OLM and Helm supported"
  
  # Zen Operator (Control Plane UI)
  # Supports both OLM and Helm, OLM is default for CPD 5.2.0, Helm for 5.3.1+
  zen:
    support_olm: true
    support_helm: true
    migration_status: "both_supported"
    description: "Zen Operator - Both OLM and Helm supported"
  
  # CPD Platform Operator
  # Supports both OLM and Helm, OLM is default for CPD 5.2.0, Helm for 5.3.1+
  cpd_platform:
    support_olm: true
    support_helm: true
    migration_status: "both_supported"
    description: "CPD Platform Operator - Both OLM and Helm supported"
