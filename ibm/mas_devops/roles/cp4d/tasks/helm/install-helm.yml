---
# Helm Installation Path for CPD Platform Components
# This installs CPFS, Zen, and CPD Platform via Helm charts

- name: "Setup Helm repository"
  include_tasks: "setup-helm-repo.yml"

- name: "Create IBM entitlement secrets"
  block:
    - name: "Create IBM entitlement secret in operator namespace"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ ibm_entitlement_key_secret }}"
            namespace: "{{ cpd_operators_namespace }}"
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: "{{ dockerconfig | to_json | b64encode }}"
      vars:
        dockerconfig:
          auths:
            cp.icr.io:
              username: cp
              password: "{{ cpd_entitlement_key }}"

    - name: "Create IBM entitlement secret in instance namespace"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ ibm_entitlement_key_secret }}"
            namespace: "{{ cpd_instance_namespace }}"
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: "{{ dockerconfig | to_json | b64encode }}"
      vars:
        dockerconfig:
          auths:
            cp.icr.io:
              username: cp
              password: "{{ cpd_entitlement_key }}"

# Phase 1: Install Cloud Pak Foundational Services (CPFS)
# -----------------------------------------------------------------------------
- name: "Install Cloud Pak Foundational Services via Helm"
  include_tasks: "install-component.yml"
  vars:
    component_name: cpfs
    component_info: "{{ cpd_component_info.cpfs }}"

- name: "Wait for ibm-common-service-operator to be ready (60s delay)"
  kubernetes.core.k8s_info:
    api_version: apps/v1
    name: ibm-common-service-operator
    namespace: "{{ cpd_operators_namespace }}"
    kind: Deployment
  register: cpfs_operator_lookup
  until: cpfs_operator_lookup.resources[0].status.availableReplicas is defined
  retries: 20
  delay: 60

- name: "Wait for CommonService instance to be present in {{ cpd_operators_namespace }}"
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v3
    name: common-service
    namespace: "{{ cpd_operators_namespace }}"
    kind: CommonService
  register: commonservices_operators_lookup
  until:
    - commonservices_operators_lookup.resources is defined
    - commonservices_operators_lookup.resources | length > 0
  retries: 60
  delay: 30

- name: "Patch CommonService instance to size {{ cpfs_size }}"
  kubernetes.core.k8s:
    api_version: operator.ibm.com/v3
    name: common-service
    namespace: "{{ cpd_operators_namespace }}"
    kind: CommonService
    apply: yes
    definition:
      spec:
        size: "{{ cpfs_size }}"
  register: result
  retries: 5
  delay: 12
  until: not result.failed

# Phase 2: Install Zen Operator
# -----------------------------------------------------------------------------
- name: "Install Zen Operator via Helm"
  include_tasks: "install-component.yml"
  vars:
    component_name: zen
    component_info: "{{ cpd_component_info.zen }}"

- name: "Wait for ibm-zen-operator to be ready (60s delay)"
  kubernetes.core.k8s_info:
    api_version: apps/v1
    name: ibm-zen-operator
    namespace: "{{ cpd_operators_namespace }}"
    kind: Deployment
  register: zen_operator_lookup
  until: zen_operator_lookup.resources[0].status.availableReplicas is defined
  retries: 20
  delay: 60

# Phase 3: Install CPD Platform Operator
# -----------------------------------------------------------------------------
- name: "Install CPD Platform Operator via Helm"
  include_tasks: "install-component.yml"
  vars:
    component_name: cpd_platform
    component_info: "{{ cpd_component_info.cpd_platform }}"

- name: "Wait for cpd-platform-operator-manager to be ready (60s delay)"
  kubernetes.core.k8s_info:
    api_version: apps/v1
    name: cpd-platform-operator-manager
    namespace: "{{ cpd_operators_namespace }}"
    kind: Deployment
  register: cpd_operator_lookup
  until: cpd_operator_lookup.resources[0].status.availableReplicas is defined
  retries: 20
  delay: 60

- name: "Helm installation of platform components complete"
  debug:
    msg:
      - "✓ CPFS installed via Helm"
      - "✓ Zen operator installed via Helm"
      - "✓ CPD Platform operator installed via Helm"
      - "Installation method: Helm"
      - "CPD version: {{ cpd_product_version }}"
