apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oracle-database-operator-leader-election-role
  namespace: {{ oracle_namespace }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - configmaps/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oracle-database-operator-oracle-database-operator-leader-election-rolebinding
  namespace: {{ oracle_namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: oracle-database-operator-leader-election-role
subjects:
- kind: ServiceAccount
  name: default
  namespace: {{ oracle_namespace }}