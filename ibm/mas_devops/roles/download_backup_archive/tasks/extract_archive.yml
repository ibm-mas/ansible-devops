---
# Extract downloaded backup archives
- name: "Verify archives exist before extraction"
  ansible.builtin.stat:
    path: "{{ backup_temp_dir }}/mas-{{ mas_instance_id }}-backups/{{ item }}"
  register: archives_stat
  loop: "{{ backup_archives_to_download }}"

- name: "Check for missing archives"
  ansible.builtin.set_fact:
    missing_archives_for_extraction: "{{ archives_stat.results | selectattr('stat.exists', 'equalto', false) | map(attribute='item') | list }}"

- name: "Fail if any archive does not exist"
  ansible.builtin.fail:
    msg: "{{ missing_archives_for_extraction | length }} archive(s) do not exist: {{ missing_archives_for_extraction | join(', ') }}"
  when: missing_archives_for_extraction | length > 0

- name: "Display extraction information"
  ansible.builtin.debug:
    msg:
      - "Extracting {{ backup_archives_to_download | length }} archive(s)"
      - "Total size: {{ (archives_stat.results | map(attribute='stat.size') | sum / 1024 / 1024) | round(2) }} MB"
      - "Extract to: {{ mas_restore_dir }}"

- name: "Extract tar.gz archives to restore directory"
  ansible.builtin.command:
    cmd: "tar -xzf {{ backup_temp_dir }}/mas-{{ mas_instance_id }}-backups/{{ item }} -C {{ mas_restore_dir }}"
  register: tar_extract_results
  changed_when: tar_extract_results.rc == 0
  loop: "{{ backup_archives_to_download }}"

- name: "Check for extraction failures"
  ansible.builtin.set_fact:
    failed_extractions: "{{ tar_extract_results.results | selectattr('rc', 'ne', 0) | map(attribute='item') | list }}"

- name: "Fail if any extraction failed"
  ansible.builtin.fail:
    msg: "Failed to extract {{ failed_extractions | length }} archive(s): {{ failed_extractions | join(', ') }}"
  when: failed_extractions | length > 0

- name: "List extracted directories"
  ansible.builtin.find:
    paths: "{{ mas_restore_dir }}"
    file_type: directory
    patterns: "backup-*"
  register: extracted_dirs

- name: "Display extraction result"
  ansible.builtin.debug:
    msg:
      - "Successfully extracted {{ backup_archives_to_download | length }} archive(s)"
      - "Extracted {{ extracted_dirs.files | length }} backup directories to {{ mas_restore_dir }}"
      - "Directories: {{ extracted_dirs.files | map(attribute='path') | map('basename') | list }}"

- name: "Fail if no backup directories were extracted"
  ansible.builtin.fail:
    msg: "No backup directories found after extraction in {{ mas_restore_dir }}"
  when: extracted_dirs.files | length == 0
