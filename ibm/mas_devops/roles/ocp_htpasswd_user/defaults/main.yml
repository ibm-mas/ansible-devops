---
# Username for the htpasswd user account.
# Must be set — no default. Use a distinct value per user so multiple runs
# accumulate entries in the shared Secret without overwriting each other.
ocp_htpasswd_username: "{{ lookup('env', 'OCP_HTPASSWD_USERNAME') }}"

# Plaintext password — only used to derive the bcrypt hash; never written to the cluster.
# Must be set — no default.
ocp_htpasswd_password: "{{ lookup('env', 'OCP_HTPASSWD_PASSWORD') }}"

# Cluster role to bind to the user.  Defaults to cluster-admin.
# Any valid ClusterRole name is accepted (e.g. 'admin', 'edit', 'view').
ocp_htpasswd_clusterrole: "{{ lookup('env', 'OCP_HTPASSWD_CLUSTERROLE') | default('cluster-admin', true) }}"

# Name of the OpenShift identity provider entry in OAuth/cluster.
# Use a consistent value across all runs on the same cluster.
ocp_htpasswd_idp_name: "{{ lookup('env', 'OCP_HTPASSWD_IDP_NAME') | default('htpasswd-users', true) }}"

# Name of the Secret in openshift-config that holds the htpasswd file.
# All users managed by this role share the same secret so the htpasswd file
# accumulates entries across multiple runs without overwriting existing ones.
ocp_htpasswd_secret_name: "{{ lookup('env', 'OCP_HTPASSWD_SECRET_NAME') | default('htpasswd-users', true) }}"
