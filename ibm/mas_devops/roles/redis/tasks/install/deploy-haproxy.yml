---
# Deploy HAProxy Load Balancer for Redis
# =============================================================================

- name: "Create HAProxy ConfigMap"
  kubernetes.core.k8s:
    state: present
    template: haproxy/configmap.yml.j2

- name: "Create HAProxy Service"
  kubernetes.core.k8s:
    state: present
    template: haproxy/service.yml.j2

- name: "Create HAProxy Deployment"
  kubernetes.core.k8s:
    state: present
    template: haproxy/deployment.yml.j2

- name: "Display HAProxy deployment status"
  debug:
    msg:
      - "HAProxy deployed"
      - "  Name: {{ redis_instance_name }}-haproxy"
      - "  Service: {{ redis_haproxy_service }}"
      - "  FQDN: {{ redis_haproxy_fqdn }}"
