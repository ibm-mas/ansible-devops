---
# Create Redis Credentials Secret
# =============================================================================

- name: "Check if Redis credentials secret exists"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ redis_credentials_secret_name }}"
    namespace: "{{ redis_namespace }}"
  register: secret_info

- name: "Create Redis credentials secret"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ redis_credentials_secret_name }}"
        namespace: "{{ redis_namespace }}"
        labels:
          app: "{{ redis_instance_name }}"
          mas.ibm.com/instanceId: "{{ mas_instance_id }}"
          mas.ibm.com/component: "redis"
      type: Opaque
      stringData:
        password: "{{ redis_password }}"
  when: secret_info.resources | length == 0
  no_log: true

- name: "Display secret status"
  debug:
    msg: "Redis credentials secret '{{ redis_credentials_secret_name }}' is ready"
