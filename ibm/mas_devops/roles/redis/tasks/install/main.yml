---
# Redis Installation Tasks
# =============================================================================

- name: "Display Redis deployment configuration"
  debug:
    msg:
      - "Redis Deployment Configuration:"
      - "  Action .................... {{ redis_action }}"
      - "  Instance ID ............... {{ mas_instance_id }}"
      - "  Namespace ................. {{ redis_namespace }}"
      - "  Instance Name ............. {{ redis_instance_name }}"
      - "  Service FQDN .............. {{ redis_service_fqdn }}"
      - "  Redis Image ............... {{ redis_image }}"
      - "  HAProxy Image ............. {{ haproxy_image }}"
      - "  Storage Class ............. {{ redis_storage_class }}"
      - "  Replicas .................. {{ redis_replicas }}"
      - "  TLS Enabled ............... {{ redis_tls_enabled }}"
      - "  Sentinel Enabled .......... {{ redis_sentinel_enabled }}"

- name: "Generate Redis password if not provided"
  set_fact:
    redis_password: "{{ lookup('password', '/tmp/redis-password-{{ mas_instance_id }}.txt chars=ascii_letters,digits length=16') }}"
  when: redis_password == ""
  no_log: true

- name: "Create Redis namespace"
  include_tasks: create-namespace.yml

- name: "Create Redis credentials secret"
  include_tasks: create-secrets.yml

- name: "Create TLS certificates"
  include_tasks: create-certificates.yml
  when: redis_tls_enabled

- name: "Deploy Redis StatefulSet with Sentinel"
  include_tasks: deploy-redis.yml

- name: "Deploy HAProxy load balancer"
  include_tasks: deploy-haproxy.yml
  when: redis_haproxy_enabled

- name: "Wait for Redis pods to be ready"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ redis_namespace }}"
    label_selectors:
      - "app={{ redis_instance_name }}"
  register: redis_pods
  until:
    - redis_pods.resources | length == redis_replicas
    - redis_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length == redis_replicas
  retries: 30
  delay: 10

- name: "Wait for HAProxy to be ready"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ redis_namespace }}"
    label_selectors:
      - "app={{ redis_instance_name }}-haproxy"
  register: haproxy_pods
  until:
    - haproxy_pods.resources | length > 0
    - haproxy_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
  retries: 20
  delay: 10
  when: redis_haproxy_enabled

- name: "Display Redis deployment status"
  debug:
    msg:
      - "Redis deployment completed:"
      - "  Namespace: {{ redis_namespace }}"
      - "  Redis Pods: {{ redis_pods.resources | length }}/{{ redis_replicas }}"
      - "  HAProxy Pods: {{ haproxy_pods.resources | length if redis_haproxy_enabled else 'N/A' }}"

- name: "Include config generation tasks"
  include_tasks: ../generate-config/main.yml

- name: "Display final deployment summary"
  debug:
    msg:
      - "Redis deployment completed successfully!"
      - "  Master Service: {{ redis_master_service }}"
      - "  Service FQDN: {{ redis_service_fqdn }}"
      - "  HAProxy Service: {{ redis_haproxy_service }}"
      - "  Credentials Secret: {{ redis_credentials_secret_name }}"
      - "  RedisCfg Output: {{ rediscfg_output_file }}"
