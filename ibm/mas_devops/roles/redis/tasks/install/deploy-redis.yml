---
# Deploy Redis StatefulSet with Sentinel
# =============================================================================

- name: "Create Redis ConfigMap"
  kubernetes.core.k8s:
    state: present
    template: redis/configmap.yml.j2

- name: "Create Redis Master Service"
  kubernetes.core.k8s:
    state: present
    template: redis/service-master.yml.j2

- name: "Create Redis Replica Service"
  kubernetes.core.k8s:
    state: present
    template: redis/service-replica.yml.j2

- name: "Create Redis Sentinel Service"
  kubernetes.core.k8s:
    state: present
    template: redis/service-sentinel.yml.j2

- name: "Create Redis StatefulSet"
  kubernetes.core.k8s:
    state: present
    template: redis/statefulset.yml.j2

- name: "Display Redis deployment status"
  debug:
    msg:
      - "Redis StatefulSet deployed"
      - "  Name: {{ redis_instance_name }}"
      - "  Replicas: {{ redis_replicas }}"
      - "  Image: {{ redis_image }}"
