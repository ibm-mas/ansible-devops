---
# Redis Deployment - Main Tasks
# =============================================================================

- name: "Validate required variables"
  assert:
    that:
      - mas_instance_id is defined and mas_instance_id != ""
      - redis_action is defined and redis_action != ""
    fail_msg: "Required variable not set: mas_instance_id and redis_action must be defined"

- name: "Display Redis action"
  debug:
    msg: "Redis Action: {{ redis_action }}"

# Load Redis images from catalog
# -----------------------------------------------------------------------------
- name: "Determine Version of Maximo Operator Catalog"
  include_tasks: "{{ role_path }}/../../common_tasks/determine-ibmcatalog-tag.yml"

- name: Load Catalog Metadata for Redis Images
  when:
    - redis_extras_version is not defined or redis_extras_version == ""
    - catalog_tag is defined and catalog_tag != ""
  block:
    - ibm.mas_devops.get_catalog_info:
        mas_catalog_version: "{{ catalog_tag }}"
      register: _mas_catalog

    - debug:
        var: _mas_catalog

    - name: "Set redis_extras_version from catalog"
      set_fact:
        redis_extras_version: "{{ _mas_catalog.redis_extras_version }}"

- name: "Redis Version Information"
  debug:
    msg:
      - "Maximo Operator Catalog .................. {{ catalog_tag }}"
      - "Redis Extras Version ..................... {{ redis_extras_version }}"

- name: Load Redis image definitions
  include_vars:
    file: "{{ role_path }}/../mirror_extras_prepare/vars/redis_{{ redis_extras_version }}.yml"

- name: Extract Redis image components
  set_fact:
    redis_image_name: "{{ extra_images | selectattr('name', 'match', '.*/ema-redis$') | map(attribute='name') | first }}"
    redis_image_registry: "{{ extra_images | selectattr('name', 'match', '.*/ema-redis$') | map(attribute='registry') | first }}"
    redis_image_digest: "{{ extra_images | selectattr('name', 'match', '.*/ema-redis$') | map(attribute='digest') | first }}"

    haproxy_image_name: "{{ extra_images | selectattr('name', 'match', '.*/ema-haproxy$') | map(attribute='name') | first }}"
    haproxy_image_registry: "{{ extra_images | selectattr('name', 'match', '.*/ema-haproxy$') | map(attribute='registry') | first }}"
    haproxy_image_digest: "{{ extra_images | selectattr('name', 'match', '.*/ema-haproxy$') | map(attribute='digest') | first }}"

    common_util_image_name: "{{ extra_images | selectattr('name', 'match', '.*/ema-common-util$') | map(attribute='name') | first }}"
    common_util_image_registry: "{{ extra_images | selectattr('name', 'match', '.*/ema-common-util$') | map(attribute='registry') | first }}"
    common_util_image_digest: "{{ extra_images | selectattr('name', 'match', '.*/ema-common-util$') | map(attribute='digest') | first }}"

- name: Construct full Redis image references
  set_fact:
    redis_image: "{{ redis_image_registry }}/{{ redis_image_name }}@{{ redis_image_digest }}"
    haproxy_image: "{{ haproxy_image_registry }}/{{ haproxy_image_name }}@{{ haproxy_image_digest }}"
    common_util_image: "{{ common_util_image_registry }}/{{ common_util_image_name }}@{{ common_util_image_digest }}"

- name: "Display constructed Redis images"
  debug:
    msg:
      - "Redis Image ............................ {{ redis_image }}"
      - "HAProxy Image .......................... {{ haproxy_image }}"
      - "Common Util Image ...................... {{ common_util_image }}"

- name: "Include action-specific tasks"
  include_tasks: "{{ redis_action }}/main.yml"
  when: redis_action != "none"
