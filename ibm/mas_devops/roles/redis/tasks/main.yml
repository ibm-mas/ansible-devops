---
# Redis Deployment - Main Tasks
# =============================================================================

- name: "Validate required variables"
  assert:
    that:
      - mas_instance_id is defined and mas_instance_id != ""
      - redis_action is defined and redis_action != ""
    fail_msg: "Required variable not set: mas_instance_id and redis_action must be defined"

- name: "Display Redis action"
  debug:
    msg: "Redis Action: {{ redis_action }}"

- name: "Include action-specific tasks"
  include_tasks: "{{ redis_action }}/main.yml"
  when: redis_action != "none"
