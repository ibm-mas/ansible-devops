---
# MAS Domain
# -----------------------------------------------------------------------------
mas_instance_id: "{{ lookup('env', 'MAS_INSTANCE_ID') }}"
mas_workspace_id: "{{ lookup('env', 'MAS_WORKSPACE_ID') }}"
manage_namespace: "mas-{{ mas_instance_id }}-manage"
mas_domain: "{{ lookup('env', 'MAS_DOMAIN') }}"
mas_ws_cr_name: "{{ mas_instance_id }}-{{ mas_workspace_id }}"

# Kafka Image Processor properties
# -----------------------------------------------------------------------------
kafkaimageprocessor_pvcname: "{{ lookup('env', 'KAFKAIMAGEPROCESSOR_PVCNAME') | default('manage-kafkaimageprocessor', true) }}"
kafkaimageprocessor_storage_class: "{{ lookup('env', 'KAFKAIMAGEPROCESSOR_STORAGE_CLASS') }}"
kafkaimageprocessor_storage_size: "{{ lookup('env', 'KAFKAIMAGEPROCESSOR_STORAGE_SIZE') | default('20Gi', true) }}"
kafkaimageprocessor_storage_mode: "{{ lookup('env', 'KAFKAIMAGEPROCESSOR_STORAGE_MODE') | default('ReadWriteMany', true) }}"
kafkaimageprocessor_storage_mountpath: "{{ lookup('env', 'KAFKAIMAGEPROCESSOR_STORAGE_MOUNTPATH') | default('kafkaimageprocessor', true) }}"

