---
# Step 1: Set the Kafka Image Processor flag in ManageWorkspace CR if not already set
- name: Set Kafka Image Processor flag in ManageWorkspace CR
  include_tasks: tasks/set-kafka-flag.yml

# Step 2: Retrieve the updated ManageWorkspace CR
- name: Retrieve Manage workspace CR
  kubernetes.core.k8s_info:
    api_version: apps.mas.ibm.com/v1
    name: "{{ mas_ws_cr_name }}"
    namespace: "{{ manage_namespace }}"
    kind: ManageWorkspace
  register: workspaceCR
  retries: 3
  delay: 10
  until:
    - workspaceCR.resources | length > 0

# Step 3: Extract the Kafka Image Processor enabled flag from CR
- name: Extract Kafka Image Processor enabled flag from CR
  set_fact:
    kafka_imageprocessor_enabled_from_cr: "{{ workspaceCR.resources[0].spec.settings.deployment.kafkaImageProcessor.enabled | default(kafka_imageprocessor_enabled | default(false)) }}"

- name: Check if Civil is enabled and kafka image processor is available
  set_fact:
    kafkaimageprocessorAvailable: "{{ workspaceCR.resources[0].status.components.civil is defined and workspaceCR.resources[0].status.components.civil.enabled and workspaceCR.resources[0].status.components.civil.deploykafkaimageprocessor is defined }}"

- name: Debug Kafka Image Processor installation status
  debug:
    msg:
      - "Kafka Image Processor Enabled (from CR): {{ kafka_imageprocessor_enabled_from_cr }}"
      - "Kafka Image Processor Enabled (from env): {{ kafka_imageprocessor_enabled }}"
      - "Kafka Image Processor Available (from status): {{ kafkaimageprocessorAvailable }}"
      - "Will {{ 'INSTALL' if (kafka_imageprocessor_enabled_from_cr | bool) and kafkaimageprocessorAvailable else 'SKIP' }} Kafka Image Processor"

- name: Configure kafka image processor
  include_tasks: tasks/configure-kafkaimageprocessor.yml
  when:
    - kafkaimageprocessorAvailable
    - kafka_imageprocessor_enabled_from_cr | bool

- name: Skip Kafka Image Processor configuration
  debug:
    msg: "Kafka Image Processor is disabled. Skipping installation. To enable, set spec.settings.deployment.kafkaImageProcessor.enabled=true in ManageWorkspace CR or set KAFKA_IMAGEPROCESSOR_ENABLED=true environment variable."
  when: not (kafka_imageprocessor_enabled_from_cr | bool) or not kafkaimageprocessorAvailable

