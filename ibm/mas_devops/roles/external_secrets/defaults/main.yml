---
# General variables
eso_action: "{{ lookup('env', 'ESO_ACTION') | default('install', true) }}"
eso_namespace: "{{ lookup('env', 'ESO_NAMESPACE') | default('external-secrets-operator', true) }}"
eso_operator_name: "{{ lookup('env', 'ESO_OPERATOR_NAME') | default('openshift-external-secrets-operator', true) }}"

# Installation variables
eso_catalog_source: "{{ lookup('env', 'ESO_CATALOG_SOURCE') | default('redhat-operators', true) }}"
eso_channel: "{{ lookup('env', 'ESO_CHANNEL') | default('stable-v1', true) }}"
eso_install_plan_approval: "{{ lookup('env', 'ESO_INSTALL_PLAN_APPROVAL') | default('Automatic', true) }}"

# IBM Secrets Manager configuration
ibm_sm_instance_url: "{{ lookup('env', 'IBM_SM_INSTANCE_URL') }}"
# SecretStore/ClusterSecretStore name
eso_store_name: "{{ lookup('env', 'ESO_STORE_NAME') | default('ibm-secrets-manager', true) }}"
ibm_sm_store_namespace: "{{ lookup('env', 'IBM_SM_STORE_NAMESPACE') }}"

# API key with fallback to IBMCLOUD_APIKEY (following collection pattern)
ibmcloud_apikey: "{{ lookup('env', 'IBMCLOUD_APIKEY') }}"
ibm_sm_api_key: "{{ lookup('env', 'IBM_SM_API_KEY') | default(ibmcloud_apikey, true) }}"

