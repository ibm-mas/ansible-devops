---
# Action to perform: install or uninstall
external_secrets_action: "{{ lookup('env', 'EXTERNAL_SECRETS_ACTION') | default('install', true) }}"

# Namespace for External Secrets Operator
external_secrets_namespace: "{{ lookup('env', 'EXTERNAL_SECRETS_NAMESPACE') | default('external-secrets-system', true) }}"

# Helm chart configuration
external_secrets_release_name: "{{ lookup('env', 'EXTERNAL_SECRETS_RELEASE_NAME') | default('external-secrets', true) }}"
external_secrets_repo_url: "{{ lookup('env', 'EXTERNAL_SECRETS_REPO_URL') | default('https://charts.external-secrets.io', true) }}"
external_secrets_chart_version: "{{ lookup('env', 'EXTERNAL_SECRETS_CHART_VERSION') | default('', true) }}"

# Cleanup flags for uninstallation
external_secrets_cleanup_crds: "{{ lookup('env', 'EXTERNAL_SECRETS_CLEANUP_CRDS') | default('false', true) | bool }}"
external_secrets_cleanup_namespace: "{{ lookup('env', 'EXTERNAL_SECRETS_CLEANUP_NAMESPACE') | default('false', true) | bool }}"

# Custom Helm values override
external_secrets_values: {}

