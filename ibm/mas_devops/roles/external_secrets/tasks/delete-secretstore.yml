---
- name: "Delete SecretStore for IBM Secrets Manager"
  block:
    - name: "Validate required variables"
      assert:
        that:
          - ibm_sm_store_namespace is defined
          - ibm_sm_store_namespace | length > 0
        fail_msg: "Required variable ibm_sm_store_namespace must be set to specify which namespace to delete the SecretStore from."

    - name: "Check if SecretStore exists"
      kubernetes.core.k8s_info:
        api_version: external-secrets.io/v1beta1
        kind: SecretStore
        name: "{{ eso_store_name }}"
        namespace: "{{ ibm_sm_store_namespace }}"
      register: ss_check

    - name: "Delete SecretStore"
      when: ss_check.resources | length > 0
      kubernetes.core.k8s:
        api_version: external-secrets.io/v1beta1
        kind: SecretStore
        name: "{{ eso_store_name }}"
        namespace: "{{ ibm_sm_store_namespace }}"
        state: absent
        wait: yes
        wait_timeout: 60

    - name: "Delete IBM Secrets Manager credentials secret"
      kubernetes.core.k8s:
        api_version: v1
        kind: Secret
        name: "{{ eso_store_name }}-apikey"
        namespace: "{{ ibm_sm_store_namespace }}"
        state: absent
        wait: yes
        wait_timeout: 60

    - name: "SecretStore deletion complete"
      debug:
        msg:
          - "SecretStore '{{ eso_store_name }}' has been deleted from {{ ibm_sm_store_namespace }}"
          - "Authentication secret '{{ eso_store_name }}-apikey' has been removed from {{ ibm_sm_store_namespace }}"

