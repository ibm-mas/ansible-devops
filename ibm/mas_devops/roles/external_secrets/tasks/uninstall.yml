---
# Uninstall External Secrets Operator
# -----------------------------------------------------------------------------
- name: "uninstall : Display uninstallation parameters"
  ansible.builtin.debug:
    msg:
      - "Uninstalling External Secrets Operator"
      - "Namespace: {{ external_secrets_namespace }}"
      - "Release: {{ external_secrets_release_name }}"
      - "Cleanup CRDs: {{ external_secrets_cleanup_crds }}"
      - "Cleanup Namespace: {{ external_secrets_cleanup_namespace }}"
  tags:
    - uninstall
    - external-secrets

- name: "uninstall : Uninstall External Secrets Operator Helm release"
  kubernetes.core.helm:
    name: "{{ external_secrets_release_name }}"
    release_namespace: "{{ external_secrets_namespace }}"
    state: absent
    wait: yes
    wait_timeout: 10m
  tags:
    - uninstall
    - external-secrets

# Delete CRDs if cleanup flag is set
# -----------------------------------------------------------------------------
- name: "uninstall : Get all External Secrets CRDs"
  when: external_secrets_cleanup_crds | bool
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
  register: all_crds
  tags:
    - uninstall
    - external-secrets

- name: "uninstall : Filter External Secrets CRDs"
  when: external_secrets_cleanup_crds | bool
  ansible.builtin.set_fact:
    external_secrets_crds: "{{ all_crds.resources | selectattr('metadata.name', 'search', 'external-secrets.io$') | map(attribute='metadata.name') | list }}"
  tags:
    - uninstall
    - external-secrets

- name: "uninstall : Display CRDs to be deleted"
  when: external_secrets_cleanup_crds | bool
  ansible.builtin.debug:
    msg: "Deleting {{ external_secrets_crds | length }} External Secrets CRDs: {{ external_secrets_crds | join(', ') }}"
  tags:
    - uninstall
    - external-secrets

- name: "uninstall : Delete External Secrets CRDs"
  when: external_secrets_cleanup_crds | bool
  kubernetes.core.k8s:
    state: absent
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: "{{ item }}"
    wait: yes
    wait_timeout: 300
  loop: "{{ external_secrets_crds }}"
  tags:
    - uninstall
    - external-secrets

# Delete namespace if cleanup flag is set
# -----------------------------------------------------------------------------
- name: "uninstall : Delete {{ external_secrets_namespace }} namespace"
  when: external_secrets_cleanup_namespace | bool
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: "{{ external_secrets_namespace }}"
    wait: yes
    wait_timeout: 600
  tags:
    - uninstall
    - external-secrets

# Display uninstallation summary
# -----------------------------------------------------------------------------
- name: "uninstall : External Secrets Operator uninstallation complete"
  ansible.builtin.debug:
    msg:
      - "External Secrets Operator has been successfully uninstalled"
      - "Helm release removed: {{ external_secrets_release_name }}"
      - "CRDs removed: {{ external_secrets_cleanup_crds }}"
      - "Namespace removed: {{ external_secrets_cleanup_namespace }}"
  tags:
    - uninstall
    - external-secrets

