---
- name: "Create ClusterSecretStore for IBM Secrets Manager"
  block:
    - name: "Validate required variables"
      assert:
        that:
          - ibm_sm_instance_url is defined
          - ibm_sm_instance_url | length > 0
          - ibm_sm_api_key is defined
          - ibm_sm_api_key | length > 0
        fail_msg: "Required variables are missing. ibm_sm_instance_url and ibm_sm_api_key (or IBMCLOUD_APIKEY) must be set."

    - name: "Create IBM Secrets Manager credentials secret"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ eso_store_name }}-apikey"
            namespace: "{{ eso_namespace }}"
          type: Opaque
          stringData:
            apiKey: "{{ ibm_sm_api_key }}"
      no_log: true

    - name: "Create ClusterSecretStore for IBM Secrets Manager"
      kubernetes.core.k8s:
        template: cluster-secret-store.yml.j2
        wait: yes
        wait_timeout: 60

    - name: "Wait for ClusterSecretStore to be ready"
      kubernetes.core.k8s_info:
        api_version: external-secrets.io/v1beta1
        kind: ClusterSecretStore
        name: "{{ eso_store_name }}"
      register: css_status
      retries: 10
      delay: 6
      until:
        - css_status.resources is defined
        - css_status.resources | length > 0
        - css_status.resources[0].status is defined
        - css_status.resources[0].status.conditions is defined
        - css_status.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | list | length > 0
        - (css_status.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | first).status == 'True'

    - name: "ClusterSecretStore creation complete"
      debug:
        msg:
          - "ClusterSecretStore '{{ eso_store_name }}' has been successfully created"
          - "IBM Secrets Manager URL: {{ ibm_sm_instance_url }}"
          - "Authentication secret: {{ eso_store_name }}-apikey in {{ eso_namespace }}"
          - "Status: Ready"
          - ""
          - "You can now create ExternalSecret resources in any namespace that reference this ClusterSecretStore"

