---
- name: "Delete ClusterSecretStore for IBM Secrets Manager"
  block:
    - name: "Check if ClusterSecretStore exists"
      kubernetes.core.k8s_info:
        api_version: external-secrets.io/v1beta1
        kind: ClusterSecretStore
        name: "{{ eso_store_name }}"
      register: css_check

    - name: "Delete ClusterSecretStore"
      when: css_check.resources | length > 0
      kubernetes.core.k8s:
        api_version: external-secrets.io/v1beta1
        kind: ClusterSecretStore
        name: "{{ eso_store_name }}"
        state: absent
        wait: yes
        wait_timeout: 60

    - name: "Delete IBM Secrets Manager credentials secret"
      kubernetes.core.k8s:
        api_version: v1
        kind: Secret
        name: "{{ eso_store_name }}-apikey"
        namespace: "{{ eso_namespace }}"
        state: absent
        wait: yes
        wait_timeout: 60

    - name: "ClusterSecretStore deletion complete"
      debug:
        msg:
          - "ClusterSecretStore '{{ eso_store_name }}' has been deleted"
          - "Authentication secret '{{ eso_store_name }}-apikey' has been removed from {{ eso_namespace }}"

