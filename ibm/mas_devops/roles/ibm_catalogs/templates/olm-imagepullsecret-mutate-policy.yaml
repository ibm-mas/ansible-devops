---
# Policy 1: Mutate NEW service accounts created by OLM in openshift-marketplace
# Triggers on every SA creation with label olm.managed=true and injects wiotp-docker-local
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: olm-inject-artifactory-pull-secret
  annotations:
    policies.kyverno.io/title: Inject Artifactory Pull Secret into OLM Bundle Unpack SAs
    policies.kyverno.io/description: >-
      OLM auto-generates a new ServiceAccount per bundle-unpack job. These SAs only
      get the internal OpenShift registry dockercfg. This policy automatically injects
      the wiotp-docker-local pull secret into every new OLM-managed SA in
      openshift-marketplace so bundle images from docker-na-public.artifactory.swg-devops.com
      can be pulled without manual intervention.
spec:
  rules:
    - name: inject-wiotp-pull-secret
      match:
        any:
          - resources:
              kinds:
                - ServiceAccount
              namespaces:
                - openshift-marketplace
              selector:
                matchLabels:
                  olm.managed: "true"
      mutate:
        patchStrategicMerge:
          imagePullSecrets:
            - name: wiotp-docker-local
