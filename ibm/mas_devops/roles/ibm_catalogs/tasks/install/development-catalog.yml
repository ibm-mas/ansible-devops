---
# Install the operator catalog

# 1. Create an image pull secret for local artifactory so that we can install the development catalog
# ---------------------------------------------------------------------------------------------------------------------
- name: "Create wiotp-docker-local secret"
  vars:
    artifactoryAuthStr: "{{artifactory_username}}:{{artifactory_token}}"
    artifactoryAuth: "{{ artifactoryAuthStr | b64encode }}"
    content:
      - '{"auths":{"docker-na-public.artifactory.swg-devops.com/wiotp-docker-local": {"username":"{{artifactory_username}}","password":"{{artifactory_token}}","auth":"{{artifactoryAuth}}"}'
      - ',"docker-na-proxy-svl.artifactory.swg-devops.com/wiotp-docker-local": {"username":"{{artifactory_username}}","password":"{{artifactory_token}}","auth":"{{artifactoryAuth}}"}'
      - ',"docker-na-proxy-rtp.artifactory.swg-devops.com/wiotp-docker-local": {"username":"{{artifactory_username}}","password":"{{artifactory_token}}","auth":"{{artifactoryAuth}}"}'
      - "}"
      - "}"
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      type: kubernetes.io/dockerconfigjson
      metadata:
        name: wiotp-docker-local
        namespace: openshift-marketplace
      stringData:
        # Only way I could get three consecutive "}" into a string :)
        .dockerconfigjson: "{{ content | join('') | string }}"
  register: result

# 2. Create the service accounts in openshift-marketplace so that it is able to pull from Artifactory
# ---------------------------------------------------------------------------------------------------------------------
# In OCP 4.12+ each catalog source uses its own ServiceAccount
- name: "Create service accounts on openshift-marketplace"
  vars:
    catalog_sa: "{{ item }}"
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        labels:
          # This label is required in OCP 4.15+ otherwise the catalog source doesn't become READY
          olm.managed: "true"
        name: "{{ item }}"
        namespace: openshift-marketplace
      imagePullSecrets:
        - name: wiotp-docker-local
  with_items:
    - default
    - ibm-operator-catalog

# 2.5 Deploy Kyverno policy to auto-inject pull secret into OLM-generated SAs (OCP 4.22+)
# ---------------------------------------------------------------------------------------------------------------------
# In OCP 4.22+, OLM auto-generates a new ServiceAccount per bundle-unpack job. These SAs only
# receive the internal OpenShift registry dockercfg and cannot pull from Artifactory. The Kyverno
# policy intercepts every new SA with olm.managed=true at admission time and injects
# wiotp-docker-local so ALL upcoming bundle-unpack jobs succeed without manual intervention.
- name: "Get OCP cluster version"
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: ClusterVersion
    name: version
  register: ocp_cluster_version

- name: "Set ocp_release_version fact"
  set_fact:
    ocp_release_version: "{{ ocp_cluster_version.resources[0].status.desired.version | regex_search('^[0-9]+\\.[0-9]+') }}"

- name: "Grant Kyverno background controller permission to patch SAs in openshift-marketplace"
  when: ocp_release_version is version('4.22', '>=')
  kubernetes.core.k8s:
    template: templates/kyverno-background-sa-rbac.yaml

- name: "Deploy Kyverno policy to inject Artifactory pull secret into OLM-generated SAs"
  when: ocp_release_version is version('4.22', '>=')
  kubernetes.core.k8s:
    template: templates/olm-imagepullsecret-mutate-policy.yaml

# 3. Install the catalog
# ---------------------------------------------------------------------------------------------------------------------
- name: "Create development catalog"
  kubernetes.core.k8s:
    template: templates/development-catalog.yml.j2
    wait: yes
    wait_timeout: 60
