---
# Run Manage Specific Pre-Uninstall Tasks
# -----------------------------------------------------------------------------

# 1. Delete ManageAccelerators
# -----------------------------------------------------------------------------
- name: "Get all ManageAccelerators"
  kubernetes.core.k8s_info:
    api_version: apps.mas.ibm.com/v1
    kind: ManageAccelerator
    namespace: "mas-{{ mas_instance_id }}-manage"
  register: manage_accelerators_lookup

- name: "Delete all ManageAccelerators"
  kubernetes.core.k8s:
    state: absent
    api_version: "{{ item.apiVersion }}"
    kind: "{{ item.kind }}"
    namespace: "{{ item.metadata.namespace }}"
    name: "{{ item.metadata.name }}"
    wait: true
    wait_timeout: 600 # 10 minutes
  loop: "{{ manage_accelerators_lookup.resources }}"

- name: "Wait for all ManageAccelerators to be deleted"
  kubernetes.core.k8s_info:
    api_version: apps.mas.ibm.com/v1
    kind: ManageAccelerator
    namespace: "mas-{{ mas_instance_id }}-manage"
  register: manage_accelerators_status
  until: manage_accelerators_status.resources == []
  retries: 60 # 10 minutes
  delay: 10
