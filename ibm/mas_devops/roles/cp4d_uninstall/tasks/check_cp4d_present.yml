---
# Check whether CP4D namespaces exist before attempting uninstall
- name: Check CP4D namespaces
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ item }}"
  loop: "{{ cp4d_namespaces }}"
  loop_control:
    label: "{{ item }}"
  register: cp4d_ns_checks
  failed_when: false
  changed_when: false

# Initialize list
- name: Initialize CP4D present namespaces list
  set_fact:
    cp4d_present_namespaces: []
  changed_when: false

# Build list of namespaces that exist
- name: Set CP4D present namespaces
  set_fact:
    cp4d_present_namespaces: "{{ cp4d_present_namespaces + [ item.item ] }}"
  loop: "{{ cp4d_ns_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.resources | default([]) | length > 0
  changed_when: false

# Set CP4D present flag
- name: Set CP4D present flag
  set_fact:
    cp4d_present: "{{ cp4d_present_namespaces | length > 0 }}"
  changed_when: false

# Resolve uninstall confirmation from environment
- name: Resolve uninstall confirmation flag
  set_fact:
    cp4d_uninstall_confirmed: >-
      {{
        lookup('env', 'CP4D_UNINSTALL_CONFIRMED') | default('false', true)
        | lower
        | trim
        in ['true', '1', 'yes']
      }}
  changed_when: false

# Require explicit confirmation before uninstall
- name: Require explicit confirmation before uninstall
  fail:
    msg: >
      CP4D namespaces detected: {{ cp4d_present_namespaces }}.
      To proceed with force uninstall, export CP4D_UNINSTALL_CONFIRMED=true
  when:
    - cp4d_present
    - not cp4d_uninstall_confirmed
