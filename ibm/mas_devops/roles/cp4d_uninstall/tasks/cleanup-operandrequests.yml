---
# Cleanup OperandRequests
# This task file removes OperandRequests from the operators and instance namespaces

# 1. Get all OperandRequests in the operators namespace
# -----------------------------------------------------------------------------
- name: "Get all OperandRequests in {{ cpd_operators_namespace }}"
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v1alpha1
    kind: OperandRequest
    namespace: "{{ cpd_operators_namespace }}"
  register: operandrequests_lookup

- name: "Debug: Found OperandRequests in operators namespace"
  debug:
    msg: "Found {{ operandrequests_lookup.resources | length }} OperandRequest(s) in {{ cpd_operators_namespace }}"

# 2. Delete each OperandRequest from operators namespace
# -----------------------------------------------------------------------------
- name: "Delete OperandRequests in {{ cpd_operators_namespace }}"
  when: operandrequests_lookup.resources | length > 0
  kubernetes.core.k8s:
    state: absent
    api_version: operator.ibm.com/v1alpha1
    kind: OperandRequest
    namespace: "{{ cpd_operators_namespace }}"
    name: "{{ item.metadata.name }}"
    wait: true
    wait_timeout: "{{ cpd_uninstall_wait_timeout }}"
  loop: "{{ operandrequests_lookup.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"

# 3. Wait for all OperandRequests to be deleted from operators namespace
# -----------------------------------------------------------------------------
- name: "Wait for OperandRequests to be deleted from {{ cpd_operators_namespace }}"
  when: operandrequests_lookup.resources | length > 0
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v1alpha1
    kind: OperandRequest
    namespace: "{{ cpd_operators_namespace }}"
  register: operandrequests_status
  until: operandrequests_status.resources | length == 0
  retries: 60  # 10 minutes
  delay: 10

# 4. Get all OperandRequests in the instance namespace
# -----------------------------------------------------------------------------
- name: "Get all OperandRequests in {{ cpd_instance_namespace }}"
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v1alpha1
    kind: OperandRequest
    namespace: "{{ cpd_instance_namespace }}"
  register: instance_operandrequests_lookup

- name: "Debug: Found OperandRequests in instance namespace"
  debug:
    msg: "Found {{ instance_operandrequests_lookup.resources | length }} OperandRequest(s) in {{ cpd_instance_namespace }}"

# 5. Delete each OperandRequest from instance namespace
# -----------------------------------------------------------------------------
- name: "Delete OperandRequests in {{ cpd_instance_namespace }}"
  when: instance_operandrequests_lookup.resources | length > 0
  kubernetes.core.k8s:
    state: absent
    api_version: operator.ibm.com/v1alpha1
    kind: OperandRequest
    namespace: "{{ cpd_instance_namespace }}"
    name: "{{ item.metadata.name }}"
    wait: true
    wait_timeout: "{{ cpd_uninstall_wait_timeout }}"
  loop: "{{ instance_operandrequests_lookup.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"

# 6. Wait for all OperandRequests to be deleted from instance namespace
# -----------------------------------------------------------------------------
- name: "Wait for OperandRequests to be deleted from {{ cpd_instance_namespace }}"
  when: instance_operandrequests_lookup.resources | length > 0
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v1alpha1
    kind: OperandRequest
    namespace: "{{ cpd_instance_namespace }}"
  register: instance_operandrequests_status
  until: instance_operandrequests_status.resources | length == 0
  retries: 60  # 10 minutes
  delay: 10

- name: "OperandRequests cleanup complete"
  debug:
    msg: "All OperandRequests have been removed from {{ cpd_operators_namespace }} and {{ cpd_instance_namespace }}"

