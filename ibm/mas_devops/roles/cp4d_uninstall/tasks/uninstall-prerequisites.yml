---
# Uninstall CP4D Prerequisites
# This task file removes CPFS, NamespaceScope, and IBM Licensing

# 1. Delete IBM Licensing CR
# -----------------------------------------------------------------------------
- name: "Check if IBM Licensing CR exists"
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v1alpha1
    kind: IBMLicensing
    namespace: "{{ cpd_cpfs_namespace }}"
    name: instance
  register: licensing_cr_lookup

- name: "Delete IBM Licensing Custom Resource"
  when: licensing_cr_lookup.resources | length > 0
  kubernetes.core.k8s:
    state: absent
    api_version: operator.ibm.com/v1alpha1
    kind: IBMLicensing
    namespace: "{{ cpd_cpfs_namespace }}"
    name: instance
    wait: true
    wait_timeout: "{{ cpd_uninstall_wait_timeout }}"

- name: "Wait for IBM Licensing CR to be deleted"
  when: licensing_cr_lookup.resources | length > 0
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v1alpha1
    kind: IBMLicensing
    namespace: "{{ cpd_cpfs_namespace }}"
    name: instance
  register: licensing_status
  until: licensing_status.resources | length == 0
  retries: 60  # 10 minutes
  delay: 10

# 2. Delete CommonService CR
# -----------------------------------------------------------------------------
- name: "Check if CommonService CR exists"
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v3
    kind: CommonService
    namespace: "{{ cpd_operators_namespace }}"
    name: common-service
  register: commonservice_cr_lookup

- name: "Delete CommonService Custom Resource"
  when: commonservice_cr_lookup.resources | length > 0
  kubernetes.core.k8s:
    state: absent
    api_version: operator.ibm.com/v3
    kind: CommonService
    namespace: "{{ cpd_operators_namespace }}"
    name: common-service
    wait: true
    wait_timeout: "{{ cpd_uninstall_wait_timeout }}"

- name: "Wait for CommonService CR to be deleted"
  when: commonservice_cr_lookup.resources | length > 0
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v3
    kind: CommonService
    namespace: "{{ cpd_operators_namespace }}"
    name: common-service
  register: commonservice_status
  until: commonservice_status.resources | length == 0
  retries: 60  # 10 minutes
  delay: 10

- name: "CP4D Prerequisites uninstalled successfully"
  debug:
    msg: "CP4D Prerequisites (CPFS, NamespaceScope, Licensing) have been uninstalled"

