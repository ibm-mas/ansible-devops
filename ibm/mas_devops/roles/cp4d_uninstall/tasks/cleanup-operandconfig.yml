---
# Cleanup OperandConfig
# This task file removes OperandConfig resources from the operators namespace

# 1. Get all OperandConfig resources in the operators namespace
# -----------------------------------------------------------------------------
- name: "Get all OperandConfig resources in {{ cpd_operators_namespace }}"
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v1alpha1
    kind: OperandConfig
    namespace: "{{ cpd_operators_namespace }}"
  register: operandconfig_lookup

- name: "Debug: Found OperandConfig resources"
  debug:
    msg: "Found {{ operandconfig_lookup.resources | length }} OperandConfig resource(s) in {{ cpd_operators_namespace }}"

# 2. Delete each OperandConfig
# -----------------------------------------------------------------------------
- name: "Delete OperandConfig resources in {{ cpd_operators_namespace }}"
  when: operandconfig_lookup.resources | length > 0
  kubernetes.core.k8s:
    state: absent
    api_version: operator.ibm.com/v1alpha1
    kind: OperandConfig
    namespace: "{{ cpd_operators_namespace }}"
    name: "{{ item.metadata.name }}"
    wait: true
    wait_timeout: "{{ cpd_uninstall_wait_timeout }}"
  loop: "{{ operandconfig_lookup.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  ignore_errors: true

# 3. Wait for all OperandConfig resources to be deleted
# -----------------------------------------------------------------------------
- name: "Wait for OperandConfig resources to be deleted"
  when: operandconfig_lookup.resources | length > 0
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v1alpha1
    kind: OperandConfig
    namespace: "{{ cpd_operators_namespace }}"
  register: operandconfig_status
  until: operandconfig_status.resources | length == 0
  retries: 60  # 10 minutes
  delay: 10
  ignore_errors: true

- name: "OperandConfig cleanup complete"
  debug:
    msg: "All OperandConfig resources have been removed from {{ cpd_operators_namespace }}"

