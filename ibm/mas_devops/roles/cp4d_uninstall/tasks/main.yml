---

# 1. Validate inputs and provide debug information
# -----------------------------------------------------------------------------
- name: "Debug: CP4D Uninstall Configuration"
  debug:
    msg:
      - "CP4D Operators Namespace .............. {{ cpd_operators_namespace }}"
      - "CP4D Instance Namespace ............... {{ cpd_instance_namespace }}"
      - "CP4D CS Control Namespace ............. {{ cpd_cs_control_namespace }}"
      - "CP4D CPFS Namespace ................... {{ cpd_cpfs_namespace }}"
      - "CP4D Licensing Namespace .............. {{ cpd_ibm_licensing_namespace }}"
      - "Delete PVCs ........................... {{ cpd_uninstall_delete_pvcs }}"
      - "Delete Namespaces ..................... {{ cpd_uninstall_delete_namespaces }}"
      - "Delete Catalog Sources ................ {{ cpd_uninstall_delete_catalog_sources }}"
      - "Wait Timeout .......................... {{ cpd_uninstall_wait_timeout }}s"

- name: "Warning: Destructive operation"
  debug:
    msg:
      - "WARNING: This will uninstall Cloud Pak for Data and all its services"
      - "WARNING: This operation cannot be undone"
      - "WARNING: PVC deletion is {{ cpd_uninstall_delete_pvcs | ternary('ENABLED - All data will be permanently deleted', 'DISABLED - Data will be preserved') }}"

# 2. Check if CP4D instance namespace exists
# -----------------------------------------------------------------------------
- name: "Check if CP4D instance namespace exists"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ cpd_instance_namespace }}"
  register: cpd_instance_ns_info

- name: "Set fact: CP4D is installed"
  set_fact:
    cpd_is_installed: "{{ cpd_instance_ns_info.resources | length > 0 }}"

- name: "Info: CP4D installation status"
  debug:
    msg: "{{ cpd_is_installed | ternary('CP4D is installed - proceeding with uninstall', 'CP4D is not installed - nothing to uninstall') }}"

# 3. Uninstall CP4D (only if installed)
# -----------------------------------------------------------------------------
- name: "Uninstall CP4D"
  when: cpd_is_installed
  block:
    # 3.1. Uninstall CP4D Services
    # ---------------------------------------------------------------------------
    - name: "Uninstall CP4D Services"
      include_tasks: "uninstall-services.yml"

    # 3.2. Uninstall CP4D Platform
    # ---------------------------------------------------------------------------
    - name: "Uninstall CP4D Platform"
      include_tasks: "uninstall-platform.yml"

    # 3.4. Uninstall CP4D Prerequisites
    # ---------------------------------------------------------------------------
    - name: "Uninstall CP4D Prerequisites"
      include_tasks: "uninstall-prerequisites.yml"

    # 3.3. Uninstall ODLM CRs in cpd_operators_namespace
    # ---------------------------------------------------------------------------
    - name: "Uninstall CP4D Services on {{ cpd_instance_namespace }}"
      vars:
        operands_namespace: "{{ cpd_instance_namespace }}"
      include_tasks: "uninstall-operands.yml"
    
    - name: "Uninstall CP4D Services in {{ cpd_operators_namespace }}"
      vars:
        operands_namespace: "{{ cpd_operators_namespace }}"
      include_tasks: "uninstall-operands.yml"

    # 3.4. Delete NamespaceScope CR
    # -----------------------------------------------------------------------------
    - name: "Check if NamespaceScope CR exists"
      kubernetes.core.k8s_info:
        api_version: operator.ibm.com/v1
        kind: NamespaceScope
        namespace: "{{ cpd_operators_namespace }}"
        name: common-service
      register: namespacescope_cr_lookup

    - name: "Delete NamespaceScope Custom Resource"
      when: namespacescope_cr_lookup.resources | length > 0
      kubernetes.core.k8s:
        state: absent
        api_version: operator.ibm.com/v1
        kind: NamespaceScope
        namespace: "{{ cpd_operators_namespace }}"
        name: common-service
        wait: true
        wait_timeout: "{{ cpd_uninstall_wait_timeout }}"

    - name: "Wait for NamespaceScope CR to be deleted"
      when: namespacescope_cr_lookup.resources | length > 0
      kubernetes.core.k8s_info:
        api_version: operator.ibm.com/v1
        kind: NamespaceScope
        namespace: "{{ cpd_operators_namespace }}"
        name: common-service
      register: namespacescope_status
      until: namespacescope_status.resources | length == 0
      retries: 60  # 10 minutes
      delay: 10

    # 3.5. Cleanup Subscriptions
    # ---------------------------------------------------------------------------
    - name: "Cleanup Subscriptions"
      include_tasks: "cleanup-subscriptions.yml"

    # 3.6. Cleanup ClusterServiceVersions (CSVs)
    # ---------------------------------------------------------------------------
    - name: "Cleanup ClusterServiceVersions"
      include_tasks: "cleanup-csvs.yml"

    # 3.7. Cleanup Catalog Sources and ConfigMaps
    # ---------------------------------------------------------------------------
    - name: "Cleanup Catalog Sources and ConfigMaps"
      when: cpd_uninstall_delete_catalog_sources
      include_tasks: "cleanup-catalog-sources.yml"

    # 3.8. Delete PVCs (if requested)
    # ---------------------------------------------------------------------------
    - name: "Delete PVCs"
      when: cpd_uninstall_delete_pvcs
      include_tasks: "cleanup-pvcs.yml"

    # 3.9. Delete Namespaces (if requested)
    # ---------------------------------------------------------------------------
    - name: "Delete Namespaces"
      when: cpd_uninstall_delete_namespaces
      include_tasks: "cleanup-namespaces.yml"

# 4. Final Summary
# -----------------------------------------------------------------------------
- name: "CP4D Uninstall Complete"
  debug:
    msg:
      - "=========================================="
      - "CP4D Uninstall Complete"
      - "=========================================="
      - "Services uninstalled: {{ cpd_is_installed | ternary('Yes', 'N/A - Not installed') }}"
      - "Platform uninstalled: {{ cpd_is_installed | ternary('Yes', 'N/A - Not installed') }}"
      - "Prerequisites uninstalled: {{ cpd_is_installed | ternary('Yes', 'N/A - Not installed') }}"
      - "PVCs deleted: {{ (cpd_is_installed and cpd_uninstall_delete_pvcs) | ternary('Yes', 'No') }}"
      - "Namespaces deleted: {{ (cpd_is_installed and cpd_uninstall_delete_namespaces) | ternary('Yes', 'No') }}"
      - "=========================================="

# Made with Bob
