---
# Cleanup OperandRegistry
# This task file removes OperandRegistry resources from the operators namespace

# 1. Get all OperandRegistry resources in the operators namespace
# -----------------------------------------------------------------------------
- name: "Get all OperandRegistry resources in {{ cpd_operators_namespace }}"
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v1alpha1
    kind: OperandRegistry
    namespace: "{{ cpd_operators_namespace }}"
  register: operandregistry_lookup

- name: "Debug: Found OperandRegistry resources"
  debug:
    msg: "Found {{ operandregistry_lookup.resources | length }} OperandRegistry resource(s) in {{ cpd_operators_namespace }}"

# 2. Delete each OperandRegistry
# -----------------------------------------------------------------------------
- name: "Delete OperandRegistry resources in {{ cpd_operators_namespace }}"
  when: operandregistry_lookup.resources | length > 0
  kubernetes.core.k8s:
    state: absent
    api_version: operator.ibm.com/v1alpha1
    kind: OperandRegistry
    namespace: "{{ cpd_operators_namespace }}"
    name: "{{ item.metadata.name }}"
    wait: true
    wait_timeout: "{{ cpd_uninstall_wait_timeout }}"
  loop: "{{ operandregistry_lookup.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  ignore_errors: true

# 3. Wait for all OperandRegistry resources to be deleted
# -----------------------------------------------------------------------------
- name: "Wait for OperandRegistry resources to be deleted"
  when: operandregistry_lookup.resources | length > 0
  kubernetes.core.k8s_info:
    api_version: operator.ibm.com/v1alpha1
    kind: OperandRegistry
    namespace: "{{ cpd_operators_namespace }}"
  register: operandregistry_status
  until: operandregistry_status.resources | length == 0
  retries: 60  # 10 minutes
  delay: 10
  ignore_errors: true

- name: "OperandRegistry cleanup complete"
  debug:
    msg: "All OperandRegistry resources have been removed from {{ cpd_operators_namespace }}"

