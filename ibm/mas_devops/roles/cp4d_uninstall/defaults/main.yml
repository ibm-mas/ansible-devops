---
# CP4D Namespaces
# -----------------------------------------------------------------------------
cpd_operators_namespace: "{{ lookup('env', 'CPD_OPERATORS_NAMESPACE') | default('ibm-cpd-operators', true) }}"
cpd_instance_namespace: "{{ lookup('env', 'CPD_INSTANCE_NAMESPACE') | default('ibm-cpd', true) }}"
cpd_cs_control_namespace: "{{ lookup('env', 'CPD_CS_CONTROL_NAMESPACE') | default('cs-control', true) }}"
cpd_cpfs_namespace: "{{ lookup('env', 'CPD_CPFS_NAMESPACE') | default('ibm-common-services', true) }}"
cpd_ibm_licensing_namespace: "{{ lookup('env', 'CPD_IBM_LICENSING_NAMESPACE') | default('ibm-licensing', true) }}"

# CP4D Platform CR Names
# -----------------------------------------------------------------------------
cpd_platform_cr_name: "{{ lookup('env', 'CPD_PLATFORM_CR_NAME') | default('ibmcpd-cr', true) }}"
zen_cr_name: "{{ lookup('env', 'ZEN_CR_NAME') | default('lite-cr', true) }}"

# Uninstall Options
# -----------------------------------------------------------------------------
# Delete PVCs - WARNING: This will permanently delete all data
cpd_uninstall_delete_pvcs: "{{ lookup('env', 'CPD_UNINSTALL_DELETE_PVCS') | default('false', true) | bool }}"

# Delete namespaces after uninstall
cpd_uninstall_delete_namespaces: "{{ lookup('env', 'CPD_UNINSTALL_DELETE_NAMESPACES') | default('false', true) | bool }}"

# Delete custom catalog sources
cpd_uninstall_delete_catalog_sources: "{{ lookup('env', 'CPD_UNINSTALL_DELETE_CATALOG_SOURCES') | default('true', true) | bool }}"

# Delete Helm cluster-scoped resources (CRDs, ClusterRole, ClusterRoleBinding)
# These are installed by CPD 5.3.1 Helm cluster-scoped charts (helm template | oc apply)
# Safe to run on any CPD version - silently skips resources that do not exist
# Set to false only if you want to preserve CRDs for manual management
cpd_uninstall_delete_helm_cluster_resources: "{{ lookup('env', 'CPD_UNINSTALL_DELETE_HELM_CLUSTER_RESOURCES') | default('true', true) | bool }}"

# Wait timeout for resource deletion (seconds)
cpd_uninstall_wait_timeout: "{{ lookup('env', 'CPD_UNINSTALL_WAIT_TIMEOUT') | default('1200', true) | int }}"

# Supported CP4D Services
# -----------------------------------------------------------------------------
cpd_supported_services:
  - wsl      # Watson Studio
  - wml      # Watson Machine Learning
  - spark    # Analytics Engine (Apache Spark)
  - ca       # Cognos Analytics

# CP4D Service Information
# -----------------------------------------------------------------------------
cpd_service_info:
  wsl:
    cr_kind: WS
    cr_api_version: ws.cpd.ibm.com/v1beta1
    cr_name: ws-cr
    subscription_name: ibm-cpd-wsl
    dependencies:
      - ibm-cpd-ccs
      - ibm-cpd-datarefinery
      - ibm-cpd-ws-runtimes
  wml:
    cr_kind: WmlBase
    cr_api_version: wml.cpd.ibm.com/v1beta1
    cr_name: wml-cr
    subscription_name: ibm-cpd-wml-operator
    dependencies:
      - ibm-cpd-ccs
  spark:
    cr_kind: AnalyticsEngine
    cr_api_version: ae.cpd.ibm.com/v1
    cr_name: analyticsengine-sample
    subscription_name: analyticsengine-operator
    dependencies: []
  ca:
    cr_kind: CAService
    cr_api_version: ca.cpd.ibm.com/v1
    cr_name: ca-addon-cr
    subscription_name: ibm-ca-operator
    dependencies:
      - ibm-cpd-ccs

