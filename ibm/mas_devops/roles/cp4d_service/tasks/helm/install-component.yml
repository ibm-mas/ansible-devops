---
# Install a single Helm component (cluster-scoped + namespace-scoped charts)
# This task installs both the cluster-scoped chart (CRDs, ClusterRoles) and
# namespace-scoped chart (Operator, CR) for a CPD component

# Parameters expected:
# - component_name: Name of the component (e.g., 'wsl', 'ccs')
# - component_info: Component metadata from cpd_service_info

- name: "Get component metadata"
  set_fact:
    comp_info: "{{ dep_component_info | default(component_info, true) }}"
    comp_assembly: "{{ (dep_component_info | default(component_info, true)).assembly_name }}"
    comp_chart_name: "{{ (dep_component_info | default(component_info, true)).helm_chart_name }}"
    comp_cluster_chart: "{{ (dep_component_info | default(component_info, true)).helm_cluster_chart }}"
    comp_crd_name: "{{ (dep_component_info | default(component_info, true)).crd_name }}"
    comp_case_version: "{{ (dep_component_info | default(component_info, true)).case_version | default('') }}"

# Online: search the named helm repo for the chart version
- name: "Search for {{ component_name }} chart version {{ comp_case_version }}"
  when: not cpd_helm_airgap
  command: >
    helm search repo {{ cpd_helm_repo_name }}/{{ comp_chart_name }}
    {% if comp_case_version != '' %}--version {{ comp_case_version }}{% endif %}
    --output json
  register: chart_search
  changed_when: false

- name: "Extract chart version"
  set_fact:
    chart_version: "{{ (chart_search.stdout | from_json | first).version }}"
  when:
    - not cpd_helm_airgap
    - (chart_search.stdout | from_json | length) > 0

- name: "Fail if chart not found"
  when:
    - not cpd_helm_airgap
    - (chart_search.stdout | from_json | length) == 0
  fail:
    msg: "Chart {{ comp_chart_name }} version {{ comp_case_version }} not found in repository {{ cpd_helm_repo_name }}"

# Airgap: version is known from case metadata, no search needed
- name: "Debug airgap helm configuration"
  debug:
    msg:
      - "--- Computed ---"
      - "cpd_helm_airgap ................... {{ cpd_helm_airgap }}"
      - "cpd_airgap_helm_repo_url .......... {{ cpd_airgap_helm_repo_url }}"
      - "cpd_airgap_helm_repo_url_derived .. {{ cpd_airgap_helm_repo_url_derived }}"
      - "--- Registry Public (used for derivation) ---"
      - "registry_public_host .............. {{ registry_public_host }}"
      - "registry_public_port .............. {{ registry_public_port }}"
      - "registry_public_url ............... {{ registry_public_url }}"
      - "registry_public_url_with_path ..... {{ registry_public_url_with_path }}"
      - "registry_prefix ................... {{ registry_prefix }}"
      - "--- Raw env vars ---"
      - "REGISTRY_PUBLIC_HOST .............. {{ lookup('env', 'REGISTRY_PUBLIC_HOST') }}"
      - "REGISTRY_PUBLIC_PORT .............. {{ lookup('env', 'REGISTRY_PUBLIC_PORT') }}"
      - "REGISTRY_PREFIX ................... {{ lookup('env', 'REGISTRY_PREFIX') }}"
      - "CPD_AIRGAP_HELM_REPO_URL .......... {{ lookup('env', 'CPD_AIRGAP_HELM_REPO_URL') }}"
      - "--- Helm repo (online fallback) ---"
      - "cpd_helm_repo_url ................. {{ cpd_helm_repo_url }}"
      - "cpd_install_method ................ {{ cpd_install_method }}"

- name: "Set chart version from case metadata (airgap)"
  when: cpd_helm_airgap
  set_fact:
    chart_version: "{{ comp_case_version }}"

- name: "Component {{ component_name }} chart version"
  debug:
    msg:
      - "Component: {{ component_name }}"
      - "Assembly: {{ comp_assembly }}"
      - "Chart version: {{ chart_version }}"
      - "Chart name: {{ comp_chart_name }}"
      - "Cluster chart: {{ comp_cluster_chart }}"

- name: "Create Helm values for {{ component_name }}"
  copy:
    content: |
      # Helm values for {{ component_name }} ({{ comp_assembly }})
      global:
        licenseAccept: true
        releaseVersion: {{ cpd_product_version }}
        operatorNamespace: {{ cpd_operators_namespace }}
        instanceNamespace: {{ cpd_instance_namespace }}

        blockStorageClass: {{ cpd_service_block_storage_class }}
        fileStorageClass: {{ cpd_service_storage_class }}

        imagePullSecret: {{ ibm_entitlement_key_secret }}
        imagePullPrefix: cp.icr.io

      {{ comp_assembly }}:
        scaleConfig: {{ cpd_service_scale_config }}
        version: {{ cpd_product_version }}
        non_olm: true
    dest: "/tmp/{{ component_name }}-helm-values.yaml"

# Install cluster-scoped chart (CRDs, ClusterRoles, etc.)
# Use helm template + oc apply for cluster-scoped to avoid Helm state management issues
- name: "Install {{ component_name }} cluster-scoped chart"
  when:
    - not cpd_helm_airgap
    - comp_cluster_chart is defined and comp_cluster_chart != ""
  shell: |
    helm template {{ component_name | replace('_', '-') }}-cluster \
      {{ cpd_helm_repo_name }}/{{ comp_cluster_chart }} \
      --version {{ chart_version }} \
      -f /tmp/{{ component_name }}-helm-values.yaml \
      --namespace {{ cpd_operators_namespace }} | \
    oc apply -f -
  register: cluster_install

- name: "Install {{ component_name }} cluster-scoped chart (airgap)"
  when:
    - cpd_helm_airgap
    - comp_cluster_chart is defined and comp_cluster_chart != ""
  shell: |
    helm template {{ component_name | replace('_', '-') }}-cluster \
      {{ cpd_airgap_helm_repo_url }}/{{ comp_cluster_chart }} \
      --version {{ chart_version }} \
      -f /tmp/{{ component_name }}-helm-values.yaml \
      --namespace {{ cpd_operators_namespace }} \
      --insecure-skip-tls-verify | \
    oc apply -f -
  register: cluster_install_airgap

- name: "Wait for {{ component_name }} CRD to be established"
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: "{{ comp_crd_name }}"
  register: crd_check
  until:
    - crd_check.resources is defined
    - crd_check.resources | length > 0
    - crd_check.resources[0].status.conditions | selectattr('type', 'equalto', 'Established') | list | length > 0
  retries: 30
  delay: 10

# Install namespace-scoped chart (Operator, CR) using helm upgrade --install
# This command is idempotent and handles both new installations and upgrades
# Eliminates race conditions when multiple components share dependencies
# Retries handle transient issues like "another operation in progress"
- name: "Install/Upgrade {{ component_name }} namespace-scoped chart with Helm"
  when: not cpd_helm_airgap
  command: >
    helm upgrade --install {{ component_name | replace('_', '-') }}
    {{ cpd_helm_repo_name }}/{{ comp_chart_name }}
    --version {{ chart_version }}
    -f /tmp/{{ component_name }}-helm-values.yaml
    --namespace {{ cpd_instance_namespace }}
    --create-namespace
    --wait
    --timeout {{ cpd_helm_timeout }}
  register: ns_install
  changed_when: "'has been upgraded' in ns_install.stdout or 'has been installed' in ns_install.stdout"
  retries: 10
  delay: 60
  until: ns_install.rc == 0

- name: "Install/Upgrade {{ component_name }} namespace-scoped chart with Helm (airgap)"
  when: cpd_helm_airgap
  command: >
    helm upgrade --install {{ component_name | replace('_', '-') }}
    {{ cpd_airgap_helm_repo_url }}/{{ comp_chart_name }}
    --version {{ chart_version }}
    -f /tmp/{{ component_name }}-helm-values.yaml
    --namespace {{ cpd_instance_namespace }}
    --create-namespace
    --wait
    --timeout {{ cpd_helm_timeout }}
    --insecure-skip-tls-verify
  register: ns_install
  changed_when: "'has been upgraded' in ns_install.stdout or 'has been installed' in ns_install.stdout"

- name: "{{ component_name }} Helm charts installed"
  debug:
    msg:
      - "✓ Cluster-scoped chart installed"
      - "✓ Namespace-scoped chart installed via Helm"
      - "✓ CRD established: {{ comp_crd_name }}"
      - "✓ CR will be created automatically by Helm"
