---
# Installation Router - Determines whether to use OLM or Helm installation
# Based on component support matrix and user preference

# 1. Load component support matrix
# -----------------------------------------------------------------------------
- name: "Load component support matrix"
  include_vars: "{{ role_path }}/vars/component-support.yml"

# 2. Determine installation method
# -----------------------------------------------------------------------------
- name: "Get component support information"
  set_fact:
    component_support: "{{ component_support_matrix[cpd_service_name] | default({}) }}"

- name: "Determine installation method for {{ cpd_service_name }}"
  set_fact:
    resolved_install_method: >-
      {%- if cpd_install_method == 'helm' -%}
        {%- if component_support.support_helm | default(false) -%}
          helm
        {%- else -%}
          {{ fail('Component ' + cpd_service_name + ' does not support Helm installation') }}
        {%- endif -%}
      {%- elif cpd_install_method == 'olm' -%}
        {%- if component_support.support_olm | default(false) -%}
          olm
        {%- else -%}
          {{ fail('Component ' + cpd_service_name + ' does not support OLM installation') }}
        {%- endif -%}
      {%- else -%}
        {%- if component_support.required_method is defined -%}
          {{ component_support.required_method }}
        {%- elif component_support.support_olm | default(false) -%}
          olm
        {%- elif component_support.support_helm | default(false) -%}
          helm
        {%- else -%}
          {{ fail('Component ' + cpd_service_name + ' has no supported installation method') }}
        {%- endif -%}
      {%- endif -%}

- name: "Installation method selected for {{ cpd_service_name }}"
  debug:
    msg:
      - "Component: {{ cpd_service_name }}"
      - "User preference: {{ cpd_install_method }}"
      - "Selected method: {{ resolved_install_method }}"
      - "Support OLM: {{ component_support.support_olm | default(false) }}"
      - "Support Helm: {{ component_support.support_helm | default(false) }}"

# 3. Route to appropriate installation method
# -----------------------------------------------------------------------------
- name: "Install {{ cpd_service_name }} via OLM"
  when: resolved_install_method == 'olm'
  include_tasks: "olm/install-olm.yml"

- name: "Install {{ cpd_service_name }} via Helm"
  when: resolved_install_method == 'helm'
  include_tasks: "helm/install-helm.yml"

