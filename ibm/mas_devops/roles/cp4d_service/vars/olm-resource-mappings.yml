---
# Component-specific OLM resource mappings
# Used for cleanup when upgrading from CPD 5.2.0 (OLM) to 5.3.1+ (Helm)

# Maps component names to their OLM ServiceAccount names
component_olm_sa_mapping:
  opensearch: "ibm-opensearch-operator-controller-manager"
  ccs: "ibm-cpd-ccs-operator-serviceaccount"
  datarefinery: "ibm-cpd-datarefinery-operator-serviceaccount"
  ws_runtimes: "ibm-cpd-ws-runtimes-operator-sa"
  wsl: "ibm-cpd-ws-operator-serviceaccount"
  wml: "ibm-cpd-wml-operator-serviceaccount"
  spark: "ibm-cpd-ae-operator-serviceaccount"
  ca: "ibm-ca-operator-manager-serviceaccount"
  ibm_redis_cp: "ibm-redis-cp-operator-serviceaccount"

# Maps component names to their OLM Subscription names
component_olm_subscription_mapping:
  opensearch: "ibm-opensearch-operator-subscription"
  ccs: "ibm-cpd-ccs-operator-subscription"
  datarefinery: "ibm-cpd-datarefinery-operator-subscription"
  ws_runtimes: "ibm-cpd-ws-runtimes-operator-subscription"
  wsl: "ibm-cpd-wsl"
  wml: "ibm-cpd-wml-operator"
  spark: "analyticsengine-operator"
  ca: "ibm-ca-operator"
  ibm_redis_cp: "ibm-redis-cp-operator-subscription"

# Maps component names to their OLM package names
component_olm_package_mapping:
  opensearch: "ibm-opensearch-operator"
  ccs: "ibm-cpd-ccs"
  datarefinery: "ibm-cpd-datarefinery"
  ws_runtimes: "ibm-cpd-ws-runtimes"
  wsl: "ibm-cpd-wsl"
  wml: "ibm-cpd-wml-operator"
  spark: "analyticsengine-operator"
  ca: "ibm-ca-operator"
  ibm_redis_cp: "ibm-redis-cp"

# Maps component names to their Deployment names
component_olm_deployment_mapping:
  opensearch: "ibm-opensearch-operator-controller-manager"
  ccs: "ibm-cpd-ccs-operator"
  datarefinery: "ibm-cpd-datarefinery-operator"
  ws_runtimes: "ibm-cpd-ws-runtimes-operator"
  wsl: "ibm-cpd-ws-operator"
  wml: "ibm-cpd-wml-operator"
  spark: "ibm-cpd-ae-operator"
  ca: "ibm-ca-operator-controller-manager"
  ibm_redis_cp: "ibm-redis-cp-operator"

# Maps component names to their CR kinds and names that need Helm labels
# Format: component_name: [{ kind: "CRKind", name: "cr-name" }]
component_cr_mapping:
  ws_runtimes:
    - kind: "notebookruntime"
      name: "all"  # Special value to patch all CRs of this kind
  wsl:
    - kind: "ws"
      name: "ws-cr"
