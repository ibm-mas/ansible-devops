# CPD Component Installation Method Support Matrix
# This file defines which installation methods (OLM/Helm) are supported for each component
# The actual method is selected based on CPD version in install.yml

component_support_matrix:
  # Watson Studio
  wsl:
    support_olm: true
    support_helm: true
    description: "Watson Studio"

  # Cognos Analytics
  ca:
    support_olm: true
    support_helm: true
    description: "Cognos Analytics"

  # Watson Machine Learning
  wml:
    support_olm: true
    support_helm: true
    description: "Watson Machine Learning"

  # Analytics Engine (Spark)
  spark:
    support_olm: true
    support_helm: true
    description: "Analytics Engine (Spark)"
