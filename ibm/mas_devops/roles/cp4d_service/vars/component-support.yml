---
# CPD 5.3.1 Component Installation Method Support Matrix
# This file defines which installation methods (OLM/Helm) are supported for each component

component_support_matrix:
  # HELM ONLY - OLM deprecated in CPD 5.3.1
  # These components MUST use Helm installation
  ws:
    support_olm: false
    support_helm: true
    required_method: helm
    migration_status: "helm_only"
    description: "Watson Studio - Helm required in CPD 5.3.1"
  
  cognos_analytics:
    support_olm: false
    support_helm: true
    required_method: helm
    migration_status: "helm_only"
    description: "Cognos Analytics - Helm required in CPD 5.3.1"
  
  # BOTH SUPPORTED - Using OLM for now (proven, stable)
  # These will migrate to Helm after WSL/Cognos validation
  wml:
    support_olm: true
    support_helm: true
    required_method: olm
    migration_status: "olm_preferred"
    description: "Watson Machine Learning - Using OLM (Helm available)"
  
  spark:
    support_olm: true
    support_helm: true
    required_method: olm
    migration_status: "olm_preferred"
    description: "Analytics Engine (Spark) - Using OLM (Helm available)"
  