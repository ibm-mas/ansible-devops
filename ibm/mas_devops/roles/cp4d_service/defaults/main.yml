---
# Important: Do not confuse this with the operator versions, CP4D operator and
# product versions are completely different

# Important (2): Product/Operand version doesn't actually work in CP4D.  Newer versions of the operators
# can't actually support older product versions being used.  We have reached out to the CP4D team and have
# been told to basically install a fixed version operator catalog for CP4D.  It's unfortunate, but it's out
# of our control -- the only version of CP4D that works with MAS 8.7 is v4.0.7, but we can't install that
# from the IBM operator catalog at present, much more work is needed in this collection to support the operating
# model of the Cloud Pak for Data team :/
cpd_product_version: "{{ lookup('env', 'CPD_PRODUCT_VERSION') }}"

# Installation Method Selection
# -----------------------------------------------------------------------------
# Auto-detect based on component support, or explicitly set
cpd_install_method: "{{ lookup('env', 'CPD_INSTALL_METHOD') | default('auto', true) }}"
# Options: 'auto', 'olm', 'helm'
# - auto: Automatically choose based on component support matrix
# - olm: Force OLM installation (if supported)
# - helm: Force Helm installation (if supported)

# Helm Configuration (only used when install_method = 'helm')
# -----------------------------------------------------------------------------
cpd_helm_repo_url: "{{ lookup('env', 'CPD_HELM_REPO_URL') | default('https://raw.githubusercontent.com/IBM/charts/master/repo/ibm-helm', true) }}"
cpd_helm_repo_name: "ibm-charts"
cpd_helm_timeout: "30m"
cpd_helm_wait_retries: 60
cpd_helm_wait_delay: 30

# Airgap Helm Configuration
# CPD_AIRGAP_HELM_REPO_URL can be set explicitly, e.g. oci://myregistry:32500/cpd531/charts
# If not set, it is auto-derived from REGISTRY_PUBLIC_HOST / REGISTRY_PUBLIC_PORT / REGISTRY_PREFIX
# (the same vars used during mirroring and available during installation).
# When resolved, helm repo add/update is skipped and charts are pulled directly via OCI.
# -----------------------------------------------------------------------------
registry_public_host: "{{ lookup('env', 'REGISTRY_PUBLIC_HOST') | default('', true) }}"
registry_public_port: "{{ lookup('env', 'REGISTRY_PUBLIC_PORT') | default('', true) }}"
registry_public_url: "{{ registry_public_host }}{% if registry_public_port != '' %}:{{ registry_public_port }}{% endif %}"
registry_prefix: "{{ lookup('env', 'REGISTRY_PREFIX') | default('', true) }}"
registry_public_url_with_path: "{{ registry_public_url }}{% if registry_prefix | length > 0 %}/{{ registry_prefix }}{% endif %}"
cpd_airgap_helm_repo_url_derived: "{% if registry_public_host != '' %}oci://{{ registry_public_url_with_path }}/charts{% endif %}"

cpd_airgap_helm_repo_url: "{{ lookup('env', 'CPD_AIRGAP_HELM_REPO_URL') | default(cpd_airgap_helm_repo_url_derived, true) }}"
cpd_helm_airgap: "{{ (cpd_airgap_helm_repo_url | default('', true)) | length > 0 }}"

# CP4D Admin User credential used to call CP4D APIs, if not specified, the script will look these up
cpd_admin_username: "{{ lookup('env', 'CPD_ADMIN_USERNAME') }}"
cpd_admin_password: "{{ lookup('env', 'CPD_ADMIN_PASSWORD') }}"

# IBM Entitlement Key Configuration
# These variables are defined in the parent cp4d role, but we need them here
# to support standalone execution of cp4d_service role (especially for Helm installations)
ibm_entitlement_key: "{{ lookup('env', 'IBM_ENTITLEMENT_KEY') }}"
cpd_entitlement_key: "{{ lookup('env', 'CPD_ENTITLEMENT_KEY') | default(ibm_entitlement_key, true) }}"
ibm_entitlement_key_secret: ibm-entitlement-key
skip_ibm_entitlement_injection: "{{ lookup('env', 'SKIP_IBM_ENTITLEMENT_INJECTION') | default('false', true) | bool }}"

# following list of service accounts needs ibm-entitlement-key in imagePullSecret
cpd_sa_patch_list_zen:
  - default
  - zen-admin-sa
  - zen-editor-sa
  - zen-norbac-sa
  - zen-runtime-sa
  - zen-viewer-sa
  - runtime-assemblies-operator # owned by ccs-cr
  - runtime-manager-api # owned by ccs-cr
  - cognos-analytics-sp-sa # owned by ca-addon-cr (cognos analytics)
  - wd-discovery-etcd-serviceaccount # owned by wd (watson discovery)
  - wd-discovery-cn-postgres # owned by wd (watson discovery)

# ------ CPD namespaces -----------------------------------------------------------------------------------------------

# Specialized installations
# -------------------------
#
# https://www.ibm.com/docs/en/cloud-paks/cp-data/4.0?topic=planning-architecture#architecture__deployment-architecture
#
# A specialized installation allows a user with project administrator permissions to install the software after
# a cluster administrator completes the initial cluster setup.
# A specialized installation also facilitates strict division between Red Hat OpenShift Container Platform
# projects (Kubernetes namespaces).
# In a specialized installation, the IBM Cloud Pak foundational services operators are installed in the
# ibm-common-services project and the Cloud Pak for Data operators are installed in a separate project
# (typically cpd-operators). Each project has a dedicated:
#
# - Operator group, which specifies the OwnNamespace installation mode
# - NamespaceScope Operator, which allows the operators in the project to manage operators
#   and service workloads in specific projects
#
# In this way, you can specify different settings for the IBM Cloud Pak foundational services and
# for the Cloud Pak for Data operators.
cpd_operators_namespace: "{{ lookup('env', 'CPD_OPERATORS_NAMESPACE') | default('ibm-cpd-operators', true) }}"
cpd_instance_namespace: "{{ lookup('env', 'CPD_INSTANCE_NAMESPACE') | default('ibm-cpd', true) }}"
cpd_platform_cr_name: "{{ lookup('env', 'CPD_PLATFORM_CR_NAME') | default('ibmcpd-cr', true) }}"
zen_cr_name: "lite-cr"
cpd_service_name: "{{ lookup('env', 'CPD_SERVICE_NAME') }}"

# The storage class to use for this CP4D service
# Support both standalone execution (CPD_SERVICE_*) and parent role execution (cpd_primary_*)
# When called from cp4d role, cpd_primary_storage_class and cpd_metadata_storage_class are already set as facts
cpd_service_storage_class: "{{ lookup('env', 'CPD_SERVICE_STORAGE_CLASS') | default(lookup('env', 'CPD_PRIMARY_STORAGE_CLASS'), true) }}"
cpd_service_block_storage_class: "{{ lookup('env', 'CPD_SERVICE_BLOCK_STORAGE_CLASS') | default(lookup('env', 'CPD_METADATA_STORAGE_CLASS'), true) }}"

cpd_services_requiring_ccs:
  - "wsl"
  - "wml"
  - "ca"

cpd_service_installplan_approval: Automatic
cpd_service_scale_config: "{{ lookup('env', 'CPD_SERVICE_SCALE_CONFIG') | default('small', true) }}"

# MAS Configuration
# ---------------------------------------------------------------------------------------------------------------------
mas_instance_id: "{{ lookup('env', 'MAS_INSTANCE_ID') }}"
mas_config_dir: "{{ lookup('env', 'MAS_CONFIG_DIR') }}"

# CPD Watson Studio default properties
# ---------------------------------------------------------------------------------------------------------------------
cpd_wsl_project_name: "{{ lookup('env', 'CPD_WSL_PROJECT_NAME') | default('wsl-mas-' + mas_instance_id + '-hputilities', true) }}" # default must be the same expected by suite_app_config role
cpd_wsl_project_description: "{{ lookup('env', 'CPD_WSL_PROJECT_DESCRIPTION') | default('Watson Studio Project for Maximo Application Suite', true) }}"
cpd_wsl_project_storage_guid: "{{ 1000 | random | to_uuid | lower }}"


# CPD Service Information
# ---------------------------------------------------------------------------------------------------------------------
# Shared Helm dependency definitions (used by multiple components)
cpd_helm_common_dependencies:
  opensearch: &opensearch_dependency
    name: opensearch
    assembly_name: opencontent_opensearch
    helm_chart_name: opencontent-opensearch
    helm_cluster_chart: opencontent-opensearch-cluster-scoped
    crd_name: clusters.opensearch.cloudpackopen.ibm.com
    case_version: "1.2.0"

  ccs: &ccs_dependency
    name: ccs
    assembly_name: ccs
    helm_chart_name: ccs
    helm_cluster_chart: ccs-cluster-scoped
    crd_name: ccs.ccs.cpd.ibm.com
    case_version: "12.1.0"

  datarefinery: &datarefinery_dependency
    name: datarefinery
    assembly_name: datarefinery
    helm_chart_name: datarefinery
    helm_cluster_chart: datarefinery-cluster-scoped
    crd_name: datarefinery.datarefinery.cpd.ibm.com
    case_version: "12.1.0"

  ws_runtimes: &ws_runtimes_dependency
    name: ws_runtimes
    assembly_name: ws_runtimes
    helm_chart_name: ws-runtimes
    helm_cluster_chart: ws-runtimes-cluster-scoped
    crd_name: notebookruntimes.ws.cpd.ibm.com
    case_version: "12.1.0"

  ibm_redis_cp: &ibm_redis_cp_dependency
    name: ibm_redis_cp
    assembly_name: ibm_redis_cp
    helm_chart_name: ibm-redis-cp
    helm_cluster_chart: ibm-redis-cp-cluster-scoped
    crd_name: rediscps.redis.ibm.com
    case_version: "1.3.1"

cpd_service_info:
  # Watson Machine Learning
  # https://www.ibm.com/docs/en/cloud-paks/cp-data/4.5.x?topic=learning-installing
  wml:
    assembly_name: wml
    catalog_source: ibm-operator-catalog
    operator_name: ibm-cpd-wml-operator
    package_name: ibm-cpd-wml-operator
    csv_name: ibm-cpd-wml-operator
    api_version: wml.cpd.ibm.com/v1beta1
    crd_kind: WmlBase
    crd_name: wmlbases.wml.cpd.ibm.com
    cr_name: wml-cr
    # Helm-specific metadata (CPD 5.3.1+)
    helm_chart_name: wml
    helm_cluster_chart: wml-cluster-scoped
    case_version: "12.1.0"
    helm_dependencies:
      - *opensearch_dependency
      - *ccs_dependency
      - *ibm_redis_cp_dependency

  # Analytics Engine Powered by Apache Spark
  # https://www.ibm.com/docs/en/cloud-paks/cp-data/4.5.x?topic=spark-installing
  spark:
    assembly_name: analyticsengine
    catalog_source: ibm-operator-catalog
    operator_name: ibm-cpd-ae-operator
    package_name: analyticsengine-operator
    csv_name: ibm-cpd-ae
    api_version: ae.cpd.ibm.com/v1
    crd_kind: AnalyticsEngine
    crd_name: analyticsengines.ae.cpd.ibm.com
    cr_name: analyticsengine-sample
    # Helm-specific metadata (CPD 5.3.1+)
    helm_chart_name: analyticsengine
    helm_cluster_chart: analyticsengine-cluster-scoped
    case_version: "12.1.0"
    helm_dependencies: []  # No dependencies

  # Watson Studio
  # https://www.ibm.com/docs/en/cloud-paks/cp-data/4.5.x?topic=ws-installing
  wsl:
    assembly_name: ws
    catalog_source: ibm-operator-catalog
    operator_name: ibm-cpd-ws-operator
    package_name: ibm-cpd-wsl
    csv_name: ibm-cpd-wsl
    api_version: ws.cpd.ibm.com/v1beta1
    crd_kind: WS
    crd_name: ws.ws.cpd.ibm.com
    cr_name: ws-cr
    # Helm-specific metadata (CPD 5.3.1+)
    helm_chart_name: ws
    helm_cluster_chart: ws-cluster-scoped
    case_version: "12.1.0"
    helm_dependencies:
      - *opensearch_dependency
      - *ccs_dependency
      - *datarefinery_dependency
      - *ws_runtimes_dependency

  # Cognos Analytics
  ca:
    assembly_name: cognos_analytics
    catalog_source: ibm-operator-catalog
    description: "Cognos Analytics"
    operator_name: ibm-ca-operator
    package_name: "ibm-ca-operator"
    cr_name: "ca-addon-cr"
    cr_api: "ca.cpd.ibm.com"
    crd_kind: "CAService"
    crd_name: "caservices.ca.cpd.ibm.com"
    csv_name: "ibm-ca-operator"
    api_version: ca.cpd.ibm.com/v1
    component_dependencies:
      - ccs
    # Helm-specific metadata (CPD 5.3.1+)
    helm_chart_name: cognos-analytics
    helm_cluster_chart: cognos-analytics-cluster-scoped
    case_version: "29.1.0"
    helm_dependencies:
      - *opensearch_dependency
      - *ccs_dependency
