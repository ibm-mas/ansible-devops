#===============================================================================
# TRIRIGAWEB.properties
#
#  This file defines the settings for the TRIRIGA WEB Application. 
#  Please refer to the system administration documentation for tuning advice.
#
#  NOTE: The application server must be restarted for the changes made here to
#        take effect
#===============================================================================


#-------------------------------------------------------------------------------
# Section 2: External Server Settings
#-------------------------------------------------------------------------------

# Enables SMTP SSL server identity (hostname) verification.
# When set to true, the SMTP server certificate's hostname must match the server identity,
# helping prevent man-in-the-middle attacks.
# Default: true
# Set to false only if hostname verification is not required (not recommended).
notification.mail.smtp.ssl.checkserveridentity=true


# This property works in conjunction with notifications.mail.smtp.email.id
# and can be used to assign label to the email id.
# Example: When the recipient receives email it will show
# Workflow Notification<WFNotifications@company.com>
notifications.mail.smtp.email.label=Workflow Notification


# IMAPS for IncomingMailAgent
#
# define the path on the network to where the SSL Keystore is to be loaded for the SSL connection.
# If this property is empty, and IMAPS is used for the Incoming Mail Agent, then it is up to the 
# Application Server to set the keystore accordingly. 
mail.imaps.ssl.key=

# This is the default port setting for the IMAPS usage. 
mail.imaps.ssl.port=993

#
# BRAVA! Server Settings
#
# CONFIG PARAMETER          | REQUIRED | DESCRIPTION
# --------------------------+----------+----------------------------------------
# BRAVA_EXCLUDE_LIST        | NO       | List of file extensions that identify
#                           |          | files that should NOT be viewed using
#                           |          | Brava!. If not specified, then files of
#                           |          | all extensions will be passed to Brava!
#                           |          | File extensions should be separated by
#                           |          | commas (e.g.: "html,htm,svg,zip,rpt").
#                           |          | NOTE: Do NOT include the dot (".") when
#                           |          | specifying the extension(e.g: use "zip"
#                           |          | instead of ".zip").
# --------------------------+----------+----------------------------------------
BRAVA_SERVER_URL=
#BRAVA_EXCLUDE_LIST=html,htm,svg,rpt,zip,exe,doc,xls,ppt,pdf,txt,xml,docx,xlsx,pptx,jar
BRAVA_EXCLUDE_LIST=*

# CMIS Settings
#
# Use these settings to enable the use of an Enterprise Content Management system (ECM) that uses 
# Content Management Interoperability Services (CMIS) to manage documents within TRIRIGA
#
# PROPERTY                  | VALUES        | DESCRIPTION
# -----------------------------------------------------------------------------------------------------------------------------
# ENABLE_CMIS               | Y, N          | Set to Y if the installation uses a CMIS-supported 
#                           |               | ECM to manage documents within TRIRIGA.
#                           |               | 
#                           |               | Set to N if the installation uses TRIRIGA Document Manager to manage documents.
#                           |               | 
#                           |               | The default value is N.
#                           |               | 
# -----------------------------------------------------------------------------------------------------------------------------
# CMIS_URL                  | [URL]         | The URL of the CMIS server for the AtomPub protocol.
#                           |               | Leave this property blank if CMIS is not enabled.
#                           |               | 
# -----------------------------------------------------------------------------------------------------------------------------
# CMIS_USER                 | [string]      | The user name of the CMIS server.
#                           |               | Leave this property blank if CMIS is not enabled.
#                           |               | 
# -----------------------------------------------------------------------------------------------------------------------------
# CMIS_PW                   | [string]      | The password for the CMIS server. The password must be encrypted.
#                           |               | Leave this property blank if CMIS is not enabled.
#                           |               | 
# -----------------------------------------------------------------------------------------------------------------------------
# CMIS_STORE                | [store name]  | The name of the ECM document store that holds the TRIRIGA documents.
#                           |               | Leave this property blank if CMIS is not enabled.
#                           |               | 
# -----------------------------------------------------------------------------------------------------------------------------
# CMIS_ROOT                 | [folder name] | ECM folder that serves as the root for
#                           |               | all TRIRIGA documents
#                           |               | Leave this property blank if CMIS is not enabled.
#                           |               | 
# -----------------------------------------------------------------------------------------------------------------------------

ENABLE_CMIS=N
CMIS_URL=
CMIS_USER=
CMIS_PW=
CMIS_STORE=
CMIS_ROOT=

#-------------------------------------------------------------------------------
# Section 3: Agent Settings
#-------------------------------------------------------------------------------
#
# Manage agent settings specific to this TRIRIGA server instance. To manage 
# agent startup host configuration for this server and all other TRIRIGA 
# servers, use the Agent Manager page in the Admin console.
#
# Reference of all TRIRIGA Agent types:
#   WFAgent, DataImportAgent, WFNotificationAgent, SchedulerAgent,
#   ObjectMigrationAgent, ObjectPublishAgent, MaintenanceAgent, 
#   FormulaRecalcAgent, ReportQueueAgent, IncomingMailAgent,
#   ExtendedFormulaAgent,  DataConnectAgent
#

#
# Specify a comma delimited list of agents that are not allowed to run on
# this host. A blank value will allow any of the agents to potentially
# be started on this host, but will not assume to start any automatically.
# Example:
#   AGENTS_NOT_ALLOWED=MaintenanceAgent,ObjectPublishAgent,ObjectMigrationAgent
#
AGENTS_NOT_ALLOWED=


#
# Agent Thread settings
# For each of the agents above,
#	%AGENT%MaxThreads sets an upper limit (set to 0 if no upper limit)
#	%AGENT%Load  how many threads in proportion to the # of connections
#
CadIntegratorLoad=100.0
CadIntegratorMaxThreads=5
DataImportAgentLoad=100.0
DataImportAgentMaxThreads=6
SchedulerAgentLoad=100.0
SchedulerAgentMaxThreads=3
WFAgentLoad=100.0
WFAgentMaxThreads=80
ReportQueueAgentLoad=100.0
ReportQueueAgentMaxThreads=2
MSExchangeSubscriptionsThreadpoolLoad=100.0

#
# Agent idle time in seconds before it might be considered down and other servers
# might initiate cleanup action on the agent and its server.  
# Default is 60, lowest acceptable value is 60
#
AGENT_STALE_TIME_IN_SECONDS=60

#
# Thread limit per user on active workflows.
# This is to prevent one user from maxing out the system
WF_AGENT_MAX_ACTIVE_PER_USER = 70


#
# Configures when Workflow Instances should be saved.
# Possible values are:
#
#  ERRORS_ONLY         - Only save when an error occurs (default) and best practice in production systems
#  DATA_LOAD		   - It is best practice to use this setting when mass/batch loading many records. 
#                        This will bypass and never save any instances, increasing performance and decreasing database size
#                        This can be used in production environments as well, especially if the production environment
#                        has many workflows that error out or have STOP tasks, and there is no application developers that are able
#                        to correct the problems in the workflows.  
#  PER_WORKFLOW_ALWAYS - Save the instance if the workflow is configured to save, best for dev
#  ALWAYS              - *** NEVER USE IN A PRODUCTION SYSTEM! ***
#                        *** NEVER USE FOR AN EXTENDED PERIOD OF TIME!!***
#                          Setting Workflow Instance Save to ALWAYS should never be used in a production
#                          system, as it will cause performance issues and excessive space consumption. 
#                          It is better to use PER_WORKFLOW_ALWAYS in a dev environment so you can isolate 
#                          issues without causing instances to be saved for other unrelated application processes.
#                          Do not leave WF Instance set to ALWAYS for more than a few hours as you debug though an issue
#                          Serious performance, memory, and database space problems will happen if
#                          you keep this setting on. 
#
# Note that instances that are needed by the system will be saved  
# as necessary regardless of this setting.
# (suspended workflows and workflows with errors are always saved)
#
WF_INSTANCE_SAVE=ERRORS_ONLY

#
# Configures when workflow instances should stop being saved.
# When excessive workflow instances are saved, the platform will stop saving if the number of saved instances exceeds a certain threshold. 
# This feature allows administrators to set an upper bound for how many workflow instances will be saved in a 24-hour period. 
# This setting will prevent the Maintenance Agent (Cleanup Agent) from being impacted by excessive workflow instance data. 
# The default value is 1000. To override the default value, set WF_INSTANCE_SAVE_24HR_THRESHOLD=#### where #### is a positive integer,and restart the server.
# This must be set on each server in the environment. 
# Do not set this value to a number larger than 10000 or the Maintenance Agent (Cleanup Agent)will take a long time to remove the debugging records.
#   
#   Default value - 1000 
#   Maximum value - 10000
#
#   WARNING : The point of workflow instance save is to debug workflows in a development mode, it is not to be used for auditing, 
#             debugging in production, and large number of instances saved have severe performance, storage, and cleanup issues, 
#             as you would expect with collecting such a large volume of meta-data.
#			  Production systems should not have workflow instance saving enabled as it can cause performance and database storage issues.
#
WF_INSTANCE_SAVE_24HR_THRESHOLD=1000

#
# USE_WF_BINARY_LOAD is used to determine if Workflow Templates 
# should be loaded with their stored binary version, if they cannot 
# be found in Workflow Template cache. A value of Y will use the binary 
# load process. A value of N or no value, will skip the binary load process.
#
USE_WF_BINARY_LOAD=Y


#
# The EXTERNAL_FRONT_END_SERVER is the main URL an external user would click in an e-mail notification
# to access the IBM TRIRIGA system. It consists of a protocol, 
# host and port (port is optional). Do not add the context-path. 
#
# TRIRIGA supports split horizon DNS,
# so internal and external users would access TRIRIGA via the same URL
# but the DNS server would deliver an internal IP address for internal people
# and external IP for external people. 
#  
# Exampes:
# 	http://external.tririga.company.com
# 	http://tri-dev-app-01.external.company.com:8001
# 	https://tririga.external.company.com
# 	https://tri-dev-secure.external.company.com:8443
#
EXTERNAL_FRONT_END_SERVER=


#
# The hour at which Maintenance Agent up starts (between 0 and 23 - default midnight: 0)
#
#
# To tune this, find the average records created/modified by hour and set the cleanup start 
# hour to be the 2 hour period of most quiet record creations.
# Use these statements to see what your total created records per hour, and enter that number below.
# Oracle/DB2: select  count(*), to_char(CREATED_DATE, 'hh24')  from ibs_spec group by to_char(CREATED_DATE, 'hh24') order by to_char(CREATED_DATE, 'hh24')
# MSSQL: select  count(*), datepart(hh , CREATED_DATE)  from ibs_spec group by datepart(hh , CREATED_DATE) order by datepart(hh , CREATED_DATE) 
#
CLEAN_HOUR=0


#
# Number of minutes the Maintenance Agent is allowed to run.  
# The default is 240 minutes or 4 hours.  
#
CLEAN_TIMEOUT=240


#
# Indicates if the Scheduler Cleanup tasks should execute
#
CLEANUP_AGENT_SCHEDULER_TASKS=Y


#
# The maximum number of records in a batch of records marked for deletion
# to remove from the tables at one time. 
# The Modulus function will be used on the spec_id to place records in a batch.
# So if there are 35000 records to cleanup, and this setting is at 10000,
# there will be 4 batches of around 10000 each
# If there are 1000 records to clean, at a batch size of 10000, there will be 1 batch
#
# Default: 50000
#
CLEANUP_AGENT_RECORD_BATCH_SIZE=50000


# Validate System Objects
# Background process in the cleanup agent to ensure system metadata/objects have not been modified
# Restores to platform label.  Changing system objects can cause unforeseen issues in the platform
# This process should be run periodically to ensure changes have not been made inadvertently.
#
# Default: 30
CLEANUP_DAYS_TO_REVALIDATE_SYSTEM_OBJECTS=30

#
# Size of the batch when cleaning up workflow instances. 
#
# Default: 200000
#
WF_MAX_BATCH_ENTRIES=200000


#
# WF Waittime to check for additional free threads(in milliseconds, Minimum 100)
# Not to be confused with WF Sleep time.
#
WF_AGENT_WAITTIME=100

#
# WF Sleeptime is the rest period when there are no events to process, how often to check
# the WF_EVENT table for new events to process.  If you are running multiple WF Agent servers
# set this value to a unique value between 4500 and 5500, so that the different agents don't
# get into lock step with each other. 
# by default, TRIRIGA will generate a random value between 4500 and 5500 so you should not need to  
#
# WF_AGENT_SLEEPTIME=4999


#
#  WF Future Agent sleep time (default 5 seconds) in seconds.
#
WF_FUTURE_AGENT_SLEEPTIME=5

#
# Report Data Index Agent Properties
#  This will tell Agent to sleep 5 (Number of) minutes.
#
REPORTDATA_AGENT_SLEEPTIME=5

#
# This will tell Agent to re-index a report for every 100 (Number Of) records
#
REPORTDATA_AGENT_RECORD_COUNT=500


#-------------------------------------------------------------------------------
# Section 4:  System Settings
#-------------------------------------------------------------------------------

#
# Default System User email to use for "forgot password" functionality. If there is no
# email address specified on the System User's My Profile record, this email address will
# be sent the password reset information for the System User. In this scenario, this email 
# address will be saved to the System User's My Profile record.
#
DEFAULT_SYSTEM_USER_EMAIL_FOR_FORGOT_PASSWORD=



# USER DEFINED HTTP RESPONSE HEADERS
# This property will enable an http response header on ALL http responses originating from this server. 
# Each desired header should:
#      1. be placed on a it's own line
#      2. have the header name prefixed with the value: 'httpheader.'
#	   3. have the header name and header value separated by an '='
#
# httpheader.<first_header_name>=<first_header_value>
# httpheader.<second_header_name>=<second_header_value>
#     .			    .			    		    .
#     .			    .			    		    .
#     .			    .			    		    .
# httpheader.<nth_header_name>=<nth_header_value>

#To fix both Clickjacking attack and the "Room Search" functional defect it is recommended to enable both the headers ie "X-Frame-Options: SAMEORIGIN" and 
#"Content-Security-Policy: frame-ancestors 'self' *.office.com *.office365.com *.cloud.microsoft;" explicitly in web property file and add the required current integration domains to the below 
#CSP header as per their need to open TRIRIGA as an iframe.
httpheader.Content-Security-Policy= frame-ancestors 'self' *.office.com *.office365.com *.cloud.microsoft;
httpheader.X-Frame-Options=SAMEORIGIN

#max-age: Time, in seconds, that the browser should remember that a site is only to be accessed using HTTPS.
#includeSubDomains: If this optional parameter is specified, this rule applies to all of the site's subdomains as well.
#preload: To submit domains for inclusion in Chrome's HTTP Strict Transport Security (HSTS) preload list
httpheader.Strict-Transport-Security= max-age=63072000; includeSubDomains; preload

#Set this to nosniff to disable content or MIME sniffing 
httpheader.X-Content-Type-Options= nosniff

#Set X-XSS-Protection: 1; mode=block 
# 1 => enables the XSS Filter in IE8 and above, mode=block => if XSS attack is detected render nothing
httpheader.X-XSS-Protection= 1; mode=block

# Cache-Control settings:
# no-cache: Ensures that the client revalidates the response with the server before using a cached copy.
# private: Specifies that the response is intended for a single user and should not be stored by shared caches (e.g. proxies, CDNs).
httpheader.Cache-Control= no-cache, private

# The HTTP Referrer-Policy response header controls how much referrer information (sent with the Referer header) 
# should be included with requests.
# Possible values: no-referrer, no-referrer-when-downgrade, origin, origin-when-cross-origin, same-origin, strict-origin, strict-origin-when-cross-origin, unsafe-url
# default value: no-referrer
httpheader.Referrer-Policy=no-referrer

# This is a list of static client resources that contain no sensitive customer data. A comma separated list of files or 
# directories. Adding a directory or a file to this list will override the default Cache-Control header values specified 
# above and instead set the header to STATIC_CLIENT_RESOURCE_CACHE_CONTROL_VALUE in order to allow browser caching to speed
# performance. 
# Each entry should be prepended with one of the following strings:
#  - startsWith:
#  - endsWith:
#
# Some examples below assuming the STATIC_CLIENT_RESOURCE_CACHE_CONTROL_VALUE="private, max-age=604800"
#
# Example A: The following list value would result in all css files being served with the cache control response header 
#            value "private, max-age=604800".
#
#            endsWith:.css
# 
# Example B: The following list value would result in all files starting with /html/en/default/js/lib being served with the 
#            cache control response header value "private, max-age=604800".
#
#            startsWith:/html/en/default/js/lib
#
#
STATIC_CLIENT_RESOURCE_LIST=startsWith:/html/en/default/js/lib,endsWith:.css,endsWith:tririgastyle.jsp,endsWith:.js

# Default value for the STATIC_CLIENT_RESOURCE_CACHE_CONTROL_VALUE is "private, max-age=604800" 
# private: this ensures that static resources are only cached locally
# max-age=604800: This allows the client to cache the resource for 604800 seconds (one week) before checking if a fresh copy is available from the sever.
#                 without the max-age value being set the client will fall back to the etag implemetation and check if there is a newer version available
#                 from the server every time it needs the file. Which is fine for some resources but we can avoid that traffic for static files.
STATIC_CLIENT_RESOURCE_CACHE_CONTROL_VALUE=private, max-age=604800
#
# This is the default title for the Tririga application
#
DEFAULT_TITLE=IBM Maximo Real Estate and Facilities

#
# Maximum percentage of available server memory that can be used while running or exporting an End User Report/Query.
# This applies to My Reports, Community Reports, and System Reports.
# Note System Reports that run in a workflow will also apply this restriction.
#
# If that percentage is exceeded, the query will error out due to insufficient resources.  If such an error is encountered 
# for a query, it is likely that the query was the cause of the error, but note that it's not necessarily caused by the 
# query since other concurrent processes could have also consumed memory while the query was assembling its results.
#
# Valid values for this property are between 0 and 100.  Values of 0 and 100 will essentially 
# disable any limit being enforced.  This is not recommended because it means a single query initiated by a single
# user could run the server out of memory.  An empty value or invalid value will be treated as the default value.
#
# The default value is 90, indicating that no executing report can consume more than 90% of available memory.
#  
REPORT_MEMORY_USAGE_LIMIT=50

#
# In a batch, the of records at a time that will be processed to export a report to excel.
# This is not a maximum, but a batch process size.  Care should be taken because
# an export can consume a chunk of memory on the application server. This should
# be tuned to balance the number of batches to run vs the memory/heap
# available on this application server.
#
# Note: Examine the reasoning your your users regularly export large sets to Excel
#       It is typically because they have not been trained on how to use the TRIRIGA tools
#       and are trying to aggregate and manipulate data that could be done within TRIRIGA.
#       Pulling multiple large reports puts a strain on the entire system, so it is 
# 		not a good idea to allow such large reports to be pulled on ad-hoc basis.
#
# Default 75000
#
EXPORT_EXCEL_BATCH_PROCESS_SIZE=75000


#
# This controls whether the validator should be run when upgrading from 8i to the 2.x Platform.
# Valid values are yes or no.
#
RUNVALIDATOR=yes

#
# This controls whether Reserve is enabled.  Valid values are Y and N.
#
Reserve=N

#
#This defines the exchange server path. Default value is "exchange".
#
EXCHANGE_ROOT_PATH=exchange

#
# For Integrating with Exchange and Reserve, a username and password are required
# These values can be in plain text or encrypted.  
# See TRIRIGA Application Platform Administrator Console User Guide for information about the encryption tool.
#
EXTERNAL_MAIL_SERVER_USERNAME=
EXTERNAL_MAIL_SERVER_PASSWORD=

#
# This is the TRIRIGA sub domain and is used in the Exchange setup.  It determines which email is 
# forwarded to TRIRIGA.  The TRIRIGA managed resources need to have a forward to Contact in this 
# sub domain.
# Example:
#     reserve.tririga
#
TRIRIGA_RESERVE_SUB_DOMAIN=

#
# Needs to be set to the domain for the Exchange server.
# Example:
#    tririga.com
#
EXCHANGE_DOMAIN=
#This is the maximum Exchange Domain length 
EXCHANGE_DOMAIN_MAX_LENGTH=255

# When the event consolidation interval is set to a non-zero value. 
# Microsoft subscription events are not immediately dispatched.  
# They are help for at least the consolidation interval seconds, 
# and possible as long as twice the interval. If one or more identical
# events are received while an event is being held, they are consolidated 
# and only a single event is dispatched.
EXCHANGE_GRAPH_EVENT_CONSOLIDATION_INTERVAL=

# By default, Graph Calendar Events are debounced for iCal UID.  
# That means that the system waits to dispatch Graph Calendar Events until 
# all the events for a given iCal UID are received.  It determines that all 
# the events Have been received if no new events for the iCal UID have been 
# received within the debounce interval. It then Dispatches a single event 
# with the latest state of the Graph Calendar Event (meeting).  
# 
# The values is specified in seconds.  The default is 10; A value <= 0 disables 
# this behavior.
#
# Disabling this or setting a value that is too low may cause duplicate meetings 
# to be created in TRIRIGA when Meetings with multiple rooms are created from 
# Outlook. It may also cause performance problems.
EXCHANGE_GRAPH_CALENDAR_EVENT_DEBOUNCE_INTERVAL=


#
# This will be the label displayed when a user connects their outlook client to a TRIRIGA application server.
# For multi-byte support, you must unicode escpae your values, per the java specification.  
#
TRIRIGA_RESERVE_OUTLOOK_TAB_LABEL=IBM TRIRIGA Reserve


#
# Set the CUSTOM_ERROR property to Y to enable your custom error page.  If set to N a 
# default error page will be used.  Set the CUSTOM_ERROR_PAGE_PATH to the path of the 
# custom error page.
#
CUSTOM_ERROR_PAGE=N
CUSTOM_ERROR_PAGE_PATH=


# CSV_INJECTION_EXCLUDE_LIST
# This variable contains a list of characters that should be excluded from the 
# beginning of a record to prevent CSV injection attacks. Characters should 
# be separated by spaces. If the list is empty, all characters are allowed. 
# Adding a character to this property prevents any record from starting with 
# that character. Users are advised to include only characters that should 
# not appear as the first value in a record, as failing to do so may result 
# in an exception.
#
# Examples:
# @
# -
# +
# = 
CSV_INJECTION_EXCLUDE_LIST=

#
# This property is used to check the table size limit of 8K.
# To perform the check for oracle database, set the value to Y. Default is N
#
TABLE_SIZE_CHECK_FOR_ORACLE=N

#
# The time in minutes before clearing the duplicate warning message log collection.
# The collection will be cleared when a log entry is written after this amount of 
# time has expired.
#
# When cleared a log entry will identify any messages with counts greater than 1.
#
ErrorHandlerStrategy.MessageResetMinutes=60

#
# This sets the default time zone. This is used when an user has not set their time zone
# in their My Profile and/or Employee record. 
# Make sure this value matches the database and local App server OS
# Example: America/Los_Angeles
#
SYSTEM_DEFAULT_TIMEZONE=UTC


#
# Overrides the stroke width when exporting a graphic section to PDF. On some large drawings,
# the stroke width will appear very large when zooming into spaces.  Using this setting will
# override the drawing's line/stroke width with this constant value.  
# A value of something very small like 0.0000001 is recommended
# A blank value will make the pdf-export to use whatever stroke was defined to begin with.  
#
PDF_EXPORT_GRAPHIC_STROKE_WIDTH_OVERRIDE=

#
# SVG rendering settings
# It is supporting only native SVG rendering since 2014 browser project.

#


#
# Maximum percentage of available server memory that can be used while assembling a BIRT Report's query results.
# If that percentage is exceeded, the query will error out due to insufficient resources.  If such an error is encountered 
# for a query, it is likely that the query was the cause of the error, but note that it's not necessarily caused by the 
# query since other concurrent processes could have also consumed memory while the query was assembling its results.
#
# Valid values for this property are between 0 and 100.  Values of 0 and 100 will essentially 
# disable any limit being enforced.  Disabling the limit is not recommended because it means a single query initiated by a single
# user could run the server out of memory.  An empty value or invalid value will be treated as the default value.
#
# The default value is 35, indicating that no set of query results can consume more than 35% of available memory.
# If this is a dedicated BIRT server, this can be increased to a much larger number, start with double (70) and tune from there   
#  
BIRT_MEMORY_USAGE_LIMIT=35



#
# List of url or external sites to allow for redirect. Separated by spaces.
#
# An example value would be http://google.com
ALLOWED_URL_FOR_REDIRECT=



# Enables XSS threat validation for uploaded files.
# 
# When set to 'Y', the system will perform MIME type detection, spoofing checks, and scan file content 
# for malicious patterns (e.g., <script>, onload).This validation is triggered only for files that match 
# the configured IMPORT_CONTENT_INCLUDE_EXTENSIONS and are not excluded by IMPORT_CONTENT_EXCLUDE_EXTENSIONS.
# Spoof detection is based solely on file content analysis using Apache Tika, which may occasionally mis-classify
# legitimate files due to format ambiguity.Use with caution: false positives may occur, especially with uncommon 
# or proprietary file formats.
# 
# Performance impact: validation involves reading the full file content and parsing it for threats, which may slightly 
# increase processing time for large or complex files.Recommended for environments where file uploads originate from 
# untrusted or external sources.
#
# Default value: N
ENABLE_UPLOAD_XSS_VALIDATION=N


# This property can be used to enable/disable autocompletion of the 
# password field for the TRIRIGA login and Admin console login screens.
# Auto-complete will only be disabled in cases where no prior value has ever been saved.
# Enter "Y" to enable and "N" to disable
ALLOW_PASSWORD_AUTO_COMPLETE=Y


#
# The port used in the SNMP Agent for incoming SNMP traps.
#
#     Default: 161
#
SNMP_AGENT_PORT=161

#
# The IP protocol to use in the SNMP Agent for incoming SNMP traps.
#
#     Possible values:
#        - UDP
#        - TCP
#
#     Default: UDP
#
SNMP_COMMUNICATION_PROTOCOL=UDP

#
# This property determines how many unsuccessful login attempts are allowed 
# before the account is locked out. The default value is 10.
# Changing this property to a positive number, for example 3, will allow 3 unsuccessful 
# login attempts prior to locking the user out. Once an account is locked, it can only be 
# unlocked by a system administrator via the Administrator Console's User Manager page.
# Setting it to -1 will disable the lockout functionality.
#
UNSUCCESSFUL_LOGIN_ATTEMPT=10


#
# Property to determine if virus scanning need to be performed when file is uploaded into the system 
# 
# Possible values:
#    - TRUE: Virus scan check will be performed.
#    - FALSE: No virus scan check performed. Default behavior.
#
VIRUS_SCAN_ENABLED=FALSE

#
# Virus scan server and port property. If virus scan is enabled then need to set the server and port on which the scanner is running 
# 
VIRUS_SCANNER_IP_ADDRESS=
VIRUS_SCANNER_IP_PORT=

# Name of scanning service configured on the server
# Example : squidclamav
VIRUS_SCAN_SERVICE_NAME=

# Enables scanning behavior for specific no-content (204) responses. 
# Set to Y to allow scanning in such cases. Example: VIRUS_SCAN_ALLOW_204=Y
VIRUS_SCAN_ALLOW_204=

# Timeout in ms for wait for the first server response from the server
# Helps to avoid hanging connections if the server is unresponsive
# Example: VIRUS_SCAN_FIRST_READ_TIMEOUT=5000
VIRUS_SCAN_FIRST_READ_TIMEOUT=

# This property indicates whether the connection should use SSL/TLS for secure communication.
# Set to TRUE to enable SSL. Example: VIRUS_SCAN_SSL_ENABLED=TRUE
VIRUS_SCAN_SSL_ENABLED=FALSE



#
# Setting this to False will disable the use of Reverse Associations across the system.  
# To enable queries to be run with Reverse Associations, set this to TRUE
# Reverse association queries will be removed from a future platform. Make plans now to
# correct any queries you may have with this flag set.  
#
# NOTE: If the server is MLA converted (supporting module level associations), this setting
# is ignored and the platform will NOT support reverse associations
#
# Valid values are:
# - TRUE: Allow the usage of Reverse Associations 
# - FALSE: Do not honor the reverse association flag, even if it is set in a query  (default) 
# - value is ignored if database is MLA enabled
#
ALLOW_REVERSE_ASSOCIATION=FALSE

# This property holds the license key for The Weather Channel API. The property is used by the triplat-weather UX components.
WEATHER_API_KEY=


# Determines whether to process Reserve Queries Concurrently
#
ENABLE_CONCURRENT_AVAILABILITY=true

#
# If ENABLE_CONCURRENT_AVAILABILITY is true, This property determines the maximum number of system wide threads  
# that will be used in processing availability. Default is 200
#
CONCURRENT_AVAILABILITY_POOL_SIZE=200

#
# If ENABLE_CONCURRENT_AVAILABILITY is true, this property determines the maximum number of threads each 
# availability request can use to process availability. Default is 10
#
CONCURRENT_AVAILABILITY_REQUEST_BATCH_SIZE=10


#
# Controls the maximum file size that the Performance Analyzer will allow when processing or uploading log files.
# Default value is 110 MB.
#
# This can be increased in order to have the Performance Analyzer process larger log files, but this will also result
# in slower loading of the logs, and slower rendering of the Performance Analyzer form.  This can be avoided by only processing
# specific user scenarios with the tool, particularly when using the SQL and Extended Formula logging, which generate more data
# than other categories.
#
# Note: This property has a direct correlation with the log file size configured in the log4j2.xml file. Therefore, when 
# modifications are made to the size-based triggering policy (e.g., increasing the file size from 100 MB to a larger value), 
# this property should be updated accordingly to ensure compatibility. 
#
# It is also recommended to add a buffer to account for the additional size generated by log4j2. Typically, log4j2 can increase 
# the log file size by approximately 4-10%. Make sure to factor in this percentage when determining the appropriate value for 
# this property.
#
PERFORMANCE_ANALYZER_MAX_FILE_SIZE_IN_MB=110

#
# Performance logging millisecond threshold
# Default is 100
# if the value is invalid or no value is set then legacy behavior which means there is no THRESHOLD and everything is logged
#
# Operation must take longer than the threshold for performance logging to log the operation
# Only supported for Extended Formula, SQL, Report and State Transition performance log settings
#
PERFORMANCE_LOGGING_THRESHOLD=100



#Bulk Activate User Synchronization process
#Default value Yes
#If there is any issue during bulk activate then you can turn this off by setting No / N

SYNCHRONIZE_ACTIVATE_USER=Yes

#Enhanced Record Render Mode
#Default value TRUE
ENHANCED_RECORD_RENDER_MODE=TRUE

#URL of the server including the context path this will be used when displaying the image in TRIRIGA notifications.
#This URL will be different for each server and is server specific.
#Use this property for displaying image in TRIRIGA notification.
IMAGE_URL =


# Indicates whether the request rate limiting feature is enabled or disabled.
# 
# When set to 'true', the application will enforce rate limiting on incoming
# requests to control the number of requests a client can make in a given time period.
# When set to 'false', rate limiting will be disabled, allowing unlimited requests.
# 
# Example:
# REQUEST_RATE_LIMIT_ENABLED=true
# 
# Default value: false
REQUEST_RATE_LIMIT_ENABLED=false

# Specifies the maximum number of requests allowed within a given time period
# when rate limiting is enabled.
#
# This property defines the limit on the number of requests a client can make
# within the configured time window. It is only applicable if REQUEST_RATE_LIMIT_ENABLED
# is set to 'true'.
#
# Example:
# REQUEST_RATE_LIMIT=200
#
# Default value: 200
REQUEST_RATE_LIMIT=200

# Specifies the number of requests to be added to the limit after the refill period
# when the rate limit has been exceeded.
#
# This property defines how many additional requests are allowed once the rate limit
# has been crossed and the refill period starts. This setting is applicable only if
# REQUEST_RATE_LIMIT_ENABLED is set to 'true' and REQUEST_RATE_LIMIT_REFILL_TIME_WINDOW
# is defined.
#
# Example:
# REQUEST_RATE_LIMIT_REFILL_COUNT=100
#
# Default value: 100
REQUEST_RATE_LIMIT_REFILL_COUNT=100
# Specifies the time window in minutes during which the refill count applies
# after exceeding the request rate limit.
#
# This property defines the duration in minutes during which the requests allowed by
# REQUEST_RATE_LIMIT_REFILL_COUNT will be available. This setting is only applicable if
# REQUEST_RATE_LIMIT_ENABLED is set to 'true' and REQUEST_RATE_LIMIT_REFILL_COUNT is defined.
#
# Example:
# REQUEST_RATE_LIMIT_REFILL_TIME_WINDOW=2
#
# Default value: 2
REQUEST_RATE_LIMIT_REFILL_TIME_WINDOW=2
# Specifies the time interval in minutes for cleaning up expired request buckets.
#
# This property defines how often the application will clean up request buckets
# that have aged beyond the specified interval. Buckets older than the defined
# interval will be removed. This setting helps manage memory usage and ensure
# that stale data is cleared out regularly.
#
# Example:
# REQUEST_BUCKET_CLEANUP_INTERVAL=1
#
# Default value: 1
REQUEST_BUCKET_CLEANUP_INTERVAL=1


# Enables XSS regex validation.
# When set to Y, input values will be validated against
# regular expressions to help detect and block potential
# cross-site scripting (XSS) attempts.
# Otherwise, regex-based validation will be disabled.
#
# Warning:
# This uses regex-based pattern matching, which may cause
# issues if a field/column/parameter contains values that
# resemble XSS payloads. For example, a value like "alert"
# could be flagged even if it is a legitimate string.
#
# Example:
# ENABLE_XSS_REGEX_VALIDATION=Y
#
# Default: N
ENABLE_XSS_REGEX_VALIDATION=N

# Specifies the batch size for reversible encryption operations.
# This property controls how many records are processed in a single batch
# when performing encryption or decryption operations on data fields that
# use reversible encryption (e.g., sensitive data that needs to be encrypted
# but may need to be decrypted for display or processing).
#
# A larger batch size can improve performance for bulk encryption operations
# but may consume more memory. A smaller batch size reduces memory usage
# but may take longer for large-scale encryption tasks.
#
# Example:
# REVERSIBLE_ENCRYPTION_BATCH_SIZE = 5000
#
# Default: 10000
REVERSIBLE_ENCRYPTION_BATCH_SIZE=10000