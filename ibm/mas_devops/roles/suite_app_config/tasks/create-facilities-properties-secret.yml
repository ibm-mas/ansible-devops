---
# This task creates a secret containing the custom FACILITIES.properties file
# If no custom file is provided, the operator will use its default configuration

- name: "Check if custom properties file is provided"
  set_fact:
    use_custom_facilities_properties: "{{ mas_ws_facilities_custom_properties is defined and mas_ws_facilities_custom_properties | bool }}"

- name: "Debug - Properties file"
  debug:
    msg:
      - "Custom properties file provided: {{ use_custom_facilities_properties }}"
      - "Properties file path: {{ mas_ws_facilities_properties_file_local | default('Not provided') }}"
      - "Properties secret name: {{ mas_ws_facilities_properties_secret_name | default('Not set') }}"

- name: "Create secret from custom file"
  when:
    - use_custom_facilities_properties
    - mas_ws_facilities_properties_file_local is defined
    - mas_ws_facilities_properties_file_local != ''
    - mas_ws_facilities_properties_secret_name is defined
    - mas_ws_facilities_properties_secret_name != ''
  block:
    - name: "Check if custom properties file exists in workspace"
      stat:
        path: "{{ mas_ws_facilities_properties_file_local }}"
      register: custom_properties_file_stat

    - name: "Fail if custom file not found"
      fail:
        msg: "Custom FACILITIES.properties file not found at {{ mas_ws_facilities_properties_file_local }}"
      when: not custom_properties_file_stat.stat.exists

    - name: "Read custom properties file content"
      slurp:
        src: "{{ mas_ws_facilities_properties_file_local }}"
      register: custom_properties_content
      no_log: true

    - name: "Create secret from custom file"
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          type: Opaque
          metadata:
            name: "{{ mas_ws_facilities_properties_secret_name }}"
            namespace: "mas-{{ mas_instance_id }}-facilities"
          data:
            FACILITIES.properties: "{{ custom_properties_content.content }}"
      register: custom_secret_result
      no_log: true

    - name: "Debug - Custom secret created"
      debug:
        msg: "Custom FACILITIES.properties secret created: {{ custom_secret_result.changed }}"

- name: "Debug - Using operator defaults"
  when: not use_custom_facilities_properties
  debug:
    msg: "No custom FACILITIES.properties provided. Operator will use default configuration."
