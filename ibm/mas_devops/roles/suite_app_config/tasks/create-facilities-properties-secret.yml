---
# This task creates a secret containing the FACILITIES.properties file

- name: "create-facilities-properties-secret : Check if custom properties file is provided"
  set_fact:
    use_custom_facilities_properties: "{{ mas_ws_facilities_properties_file is defined and mas_ws_facilities_properties_file != '' }}"

- name: "create-facilities-properties-secret : Debug - Properties file configuration"
  debug:
    msg:
      - "Custom properties file provided: {{ use_custom_facilities_properties }}"
      - "Properties file path: {{ mas_ws_facilities_properties_file | default('Not provided') }}"
      - "Properties secret name: {{ mas_ws_facilities_properties_secret | default('Not set') }}"

- name: "create-facilities-properties-secret : Create secret from custom file (if provided via CLI)"
  when:
    - use_custom_facilities_properties
    - mas_ws_facilities_properties_secret is defined
    - mas_ws_facilities_properties_secret != ''
  block:
    - name: "create-facilities-properties-secret : Check if custom properties file exists in workspace"
      stat:
        path: "{{ mas_ws_facilities_properties_file }}"
      register: custom_properties_file_stat

    - name: "create-facilities-properties-secret : Fail if custom file not found"
      fail:
        msg: "Custom FACILITIES.properties file not found at {{ mas_ws_facilities_properties_file }}"
      when: not custom_properties_file_stat.stat.exists

    - name: "create-facilities-properties-secret : Read custom properties file content"
      slurp:
        src: "{{ mas_ws_facilities_properties_file }}"
      register: custom_properties_content
      no_log: true

    - name: "create-facilities-properties-secret : Create secret from custom file"
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          type: Opaque
          metadata:
            name: "{{ mas_ws_facilities_properties_secret }}"
            namespace: "mas-{{ mas_instance_id }}-facilities"
          data:
            FACILITIES.properties: "{{ custom_properties_content.content }}"
      register: custom_secret_result
      no_log: true

    - name: "create-facilities-properties-secret : Debug - Custom secret created"
      debug:
        msg: "Custom FACILITIES.properties secret created: {{ custom_secret_result.changed }}"

- name: "create-facilities-properties-secret : Create secret from default file (if no custom file provided)"
  when:
    - not use_custom_facilities_properties
    - mas_app_id == 'facilities'
  block:
    - name: "create-facilities-properties-secret : Set default secret name"
      set_fact:
        mas_ws_facilities_properties_secret: "{{ mas_instance_id }}-{{ mas_workspace_id }}-facilities-properties-default"

    - name: "create-facilities-properties-secret : Check if default secret already exists"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: "{{ mas_ws_facilities_properties_secret }}"
        namespace: "mas-{{ mas_instance_id }}-facilities"
      register: default_secret_check

    - name: "create-facilities-properties-secret : Create secret from default file"
      when: default_secret_check.resources | length == 0
      block:
        - name: "create-facilities-properties-secret : Read default properties file"
          slurp:
            src: "{{ role_path }}/files/facilities/FACILITIES.properties"
          register: default_properties_content
          no_log: true

        - name: "create-facilities-properties-secret : Create secret from default file"
          kubernetes.core.k8s:
            definition:
              apiVersion: v1
              kind: Secret
              type: Opaque
              metadata:
                name: "{{ mas_ws_facilities_properties_secret }}"
                namespace: "mas-{{ mas_instance_id }}-facilities"
                labels:
                  mas.ibm.com/applicationId: facilities
                  mas.ibm.com/instanceId: "{{ mas_instance_id }}"
                  mas.ibm.com/workspaceId: "{{ mas_workspace_id }}"
              data:
                FACILITIES.properties: "{{ default_properties_content.content }}"
          register: default_secret_result
          no_log: true

        - name: "create-facilities-properties-secret : Debug - Default secret created"
          debug:
            msg: "Default FACILITIES.properties secret created: {{ default_secret_result.changed }}"

    - name: "create-facilities-properties-secret : Debug - Default secret already exists"
      when: default_secret_check.resources | length > 0
      debug:
        msg: "Default FACILITIES.properties secret already exists"
