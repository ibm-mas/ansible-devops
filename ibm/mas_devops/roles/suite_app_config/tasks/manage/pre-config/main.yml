---
# 1. Configure pod templates
# ------------------------------------------------------------------------
- name: "Manage pre-config : Pod Templates"
  include_tasks: "tasks/manage/pre-config/setup-pod-templates.yml"
  when: is_full_manage


# 2. Components
# ------------------------------------------------------------------------
- name: "Manage pre-config : Show Components to be installed"
  debug:
    var: mas_appws_components

# Kafka Image Processor is an optional subsystem of the Civil component,
# it will be installed if the user provides both a kafka binding and
# PVC configuration into the ManageWorkspace spec.
- name: "Manage pre-config : Set up (optional) Kafka Image Processor PVC"
  when:
    - manageWorkspaceComponents is defined
    - manageWorkspaceComponents.civil is defined
    - manageWorkspaceComponents.civil.version is defined
    - mas_appws_bindings_kafka is defined and mas_appws_bindings_kafka != ''
  include_tasks: "tasks/manage/pre-config/setup-kafka-image-processor-pvc.yml"

- name: "Manage pre-config : Debug manageWorkspaceComponents"
  debug:
    msg: "{{ manageWorkspaceComponents | default('<undefined>') }}"

- name: "Manage pre-config : Set Components"
  set_fact:
    "mas_app_components_{{ mas_app_id }}": "{{ lookup('ansible.builtin.template', 'vars/customspecs/' ~ mas_app_id ~ '_components.yml.j2') | from_yaml }}"

- name: "Manage pre-config : Debug Components"
  debug:
    msg: "{{ lookup('vars', 'mas_app_components_' ~ mas_app_id) }}"


# 3. Settings
# ------------------------------------------------------------------------
# 3.1 Manage pre-configuration: JMS setup
- name: "Manage pre-config : Set jms server"
  when: mas_app_settings_server_bundles_size in ['jms','snojms']
  include_tasks: "tasks/manage/pre-config/setup-jms.yml"

# 3.2 Manage pre-configuration: Customization archive setup
- name: "Manage pre-config : Set custom archive credentials"
  when:
    - mas_app_settings_customization_archive_username is defined
    - mas_app_settings_customization_archive_username | length > 0
    - mas_app_settings_customization_archive_password is defined
    - mas_app_settings_customization_archive_password | length > 0
    - mas_app_settings_customization_archive_url is defined
    - mas_app_settings_customization_archive_url | length > 0
  include_tasks: "tasks/manage/pre-config/setup-custom-archive.yml"

# 3.3 Manage pre-configuration: AI Service configuration setup
- name: "Manage pre-config : Set up AI Service integration"
  when:
    - aiservice_instance_id is defined
    - aiservice_instance_id != ""
  include_tasks: "tasks/manage/pre-config/setup-aiservice-config.yml"

# 3.4 Manage pre-configuration: Database encryption and AI Service secrets setup
- name: "Manage pre-config : Set database encryption keys and AI Service secrets"
  when: >
    (mas_manage_encryptionsecret_crypto_key is defined and mas_manage_encryptionsecret_crypto_key != '' and
     mas_manage_encryptionsecret_cryptox_key is defined and mas_manage_encryptionsecret_cryptox_key != '') or
    (mas_manage_encryptionsecret_old_crypto_key is defined and mas_manage_encryptionsecret_old_crypto_key != '' and
     mas_manage_encryptionsecret_old_cryptox_key is defined and mas_manage_encryptionsecret_old_cryptox_key != '') or
    (mas_manage_encryptionsecret_aiservice_apikey is defined and mas_manage_encryptionsecret_aiservice_apikey != '')
  include_tasks: "tasks/manage/pre-config/setup-encryption-secret.yml"


# 4. Bindings
# -----------------------------------------------------------------------------
- name: "Manage pre-config : Set bindings"
  set_fact:
    mas_appws_bindings: "{{ base_bindings | combine(kafka_binding) | combine(wsl_binding) }}"
  vars:
    base_bindings:
      jdbc: "{{ mas_appws_bindings_jdbc }}"
    kafka_binding: "{{ {'kafka': mas_appws_bindings_kafka} if (mas_appws_bindings_kafka is defined and mas_appws_bindings_kafka != '') else {} }}"
    wsl_binding: "{{ {'watsonstudio': 'system'} if mas_appws_bindings_health_wsl_flag else {} }}"
