---
# Restore Single Pod Persistent Volume
# =============================================================================
# This task restores persistent volume data from a tar.gz archive to a single pod.
# It handles both regular pods and helper pods created for restore purposes.

# 1. Extract PVC name from pod spec or use provided pvc_name
# -----------------------------------------------------------------------------
- name: "Set fact: PVC name"
  set_fact:
    pod_pvc_name: "{{ pvc_name | default(pod_item.spec.volumes | selectattr('name', 'equalto', 'userfiles') | map(attribute='persistentVolumeClaim.claimName') | first | default('')) }}"

- name: "Display pod PVC information"
  debug:
    msg:
      - "Processing {{ pod_type }} pod {{ pod_index + 1 }}/{{ total_pods }}"
      - "Pod name: {{ pod_item.metadata.name }}"
      - "PVC name: {{ pod_pvc_name }}"

# 2. Skip if no PVC found
# -----------------------------------------------------------------------------
- name: "Skip pod if no userfiles PVC found"
  debug:
    msg: "Skipping {{ pod_item.metadata.name }} - no userfiles PVC found"
  when: pod_pvc_name == ''

- name: "Process pod PVC restore"
  when: pod_pvc_name != ''
  block:
    # 3. Extract mount path from pod spec
    # -------------------------------------------------------------------------
    - name: "Extract all containers with volumeMounts"
      set_fact:
        containers_with_mounts: "{{ pod_item.spec.containers | selectattr('volumeMounts', 'defined') | list }}"

    - name: "Find container with userfiles volume mount and extract mount path"
      set_fact:
        target_container: "{{ item }}"
        pod_mount_path: "{{ item.volumeMounts | selectattr('name', 'equalto', 'userfiles') | map(attribute='mountPath') | first }}"
      when: item.volumeMounts | selectattr('name', 'equalto', 'userfiles') | list | length > 0
      loop: "{{ containers_with_mounts }}"
      loop_control:
        loop_var: item

    - name: "Display mount path"
      debug:
        msg:
          - "Container name: {{ target_container.name | default(container_name) }}"
          - "Mount path: {{ pod_mount_path }}"

    # 4. Fail if no mount path found
    # -------------------------------------------------------------------------
    - name: "Fail if no mount path found"
      fail:
        msg: "No userfiles mount path found in pod {{ pod_item.metadata.name }}"
      when: pod_mount_path is not defined

    # 5. Set archive details
    # -------------------------------------------------------------------------
    - name: "Set fact: archive details"
      set_fact:
        pod_archive_name: "{{ pod_pvc_name }}.tar.gz"
        pod_archive_path: "{{ facilities_backup_path }}/data/{{ pod_pvc_name }}.tar.gz"

    # 6. Verify backup archive exists
    # -------------------------------------------------------------------------
    - name: "Verify backup archive exists"
      stat:
        path: "{{ pod_archive_path }}"
      register: archive_stat

    - name: "Fail if backup archive not found"
      fail:
        msg: "Backup archive not found: {{ pod_archive_path }}"
      when: not archive_stat.stat.exists

    - name: "Display archive information"
      debug:
        msg:
          - "Archive size: {{ (archive_stat.stat.size / 1024 / 1024) | round(2) }} MB"
          - "Archive location: {{ pod_archive_path }}"

    # 7. Copy tar.gz archive from local backup to pod
    # -------------------------------------------------------------------------
    - name: "Copy tar.gz archive to pod"
      shell: |
        oc cp {{ pod_archive_path }} {{ mas_app_namespace }}/{{ pod_item.metadata.name }}:/tmp/{{ pod_archive_name }} -c {{ target_container.name | default(container_name) }}
      register: copy_result
      failed_when: false

    - name: "Check copy result"
      debug:
        msg:
          - "Copy return code: {{ copy_result.rc }}"
          - "{{ 'Success' if copy_result.rc == 0 else 'Failed' }}"

    - name: "Fail if copy failed"
      fail:
        msg: "Failed to copy tar archive to pod for {{ pod_pvc_name }}: {{ copy_result.stderr | default('Unknown error') }}"
      when: copy_result.rc != 0

    # 8. Clear existing data in mount path
    # -------------------------------------------------------------------------
    - name: "Clear existing data in mount path"
      kubernetes.core.k8s_exec:
        namespace: "{{ mas_app_namespace }}"
        pod: "{{ pod_item.metadata.name }}"
        container: "{{ target_container.name | default(container_name) }}"
        command: >
          sh -c "rm -rf {{ pod_mount_path }}/* {{ pod_mount_path }}/.[!.]* 2>/dev/null || true"
      register: clear_result
      failed_when: false

    - name: "Display clear result"
      debug:
        msg: "Cleared existing data in {{ pod_mount_path }}"

    # 9. Extract tar.gz archive in the pod
    # -------------------------------------------------------------------------
    - name: "Build tar extract command"
      set_fact:
        tar_extract_command: "tar -xzf /tmp/{{ pod_archive_name }} -C /"

    - name: "Display tar extract command"
      debug:
        msg: "Tar extract command: {{ tar_extract_command }}"

    - name: "Extract tar.gz archive in pod"
      kubernetes.core.k8s_exec:
        namespace: "{{ mas_app_namespace }}"
        pod: "{{ pod_item.metadata.name }}"
        container: "{{ target_container.name | default(container_name) }}"
        command: "{{ tar_extract_command }}"
      register: extract_result
      failed_when: false

    - name: "Check extract result"
      debug:
        msg:
          - "Extract return code: {{ extract_result.rc }}"
          - "{{ 'Success' if extract_result.rc == 0 else 'Failed' }}"

    - name: "Fail if extract failed"
      fail:
        msg: "Failed to extract tar archive for {{ pod_pvc_name }}: {{ extract_result.stderr | default('Unknown error') }}"
      when: extract_result.rc != 0

    # 10. Clean up tar.gz archive from pod
    # -------------------------------------------------------------------------
    - name: "Remove tar.gz archive from pod"
      kubernetes.core.k8s_exec:
        namespace: "{{ mas_app_namespace }}"
        pod: "{{ pod_item.metadata.name }}"
        container: "{{ target_container.name | default(container_name) }}"
        command: rm -f /tmp/{{ pod_archive_name }}
      register: cleanup_result
      failed_when: false

    # 11. Verify restore was successful
    # -------------------------------------------------------------------------
    - name: "Verify data was restored"
      kubernetes.core.k8s_exec:
        namespace: "{{ mas_app_namespace }}"
        pod: "{{ pod_item.metadata.name }}"
        container: "{{ target_container.name | default(container_name) }}"
        command: >
          sh -c "ls -la {{ pod_mount_path }} | head -20"
      register: verify_result
      failed_when: false

    - name: "Display restored data verification"
      debug:
        msg:
          - "Restored data in {{ pod_mount_path }}:"
          - "{{ verify_result.stdout_lines | default(['No output']) }}"
      when: verify_result.rc == 0

    - name: "PV restore completed"
      debug:
        msg:
          - "Successfully restored PVC: {{ pod_pvc_name }}"
          - "Mount path: {{ pod_mount_path }}"
          - "Pod: {{ pod_item.metadata.name }}"