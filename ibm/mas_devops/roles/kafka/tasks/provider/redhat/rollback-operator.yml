---
# Rollback AMQ Streams operator from 3.x (KRaft-only) to 2.x (migration-compatible)
# This is necessary when a ZooKeeper cluster exists but the operator has already
# auto-upgraded to 3.x which doesn't support ZooKeeper clusters.

- name: "Operator Rollback: Get current subscription"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ kafka_operator_name }}"
    namespace: "{{ kafka_namespace }}"
  register: current_subscription

- name: "Operator Rollback: Extract current channel"
  set_fact:
    current_channel: "{{ current_subscription.resources[0].spec.channel }}"
    rollback_channel: "amq-streams-2.9.x"  # Last 2.x channel that supports migration

- name: "Operator Rollback: Display rollback plan"
  debug:
    msg:
      - "=========================================="
      - "AUTOMATIC OPERATOR ROLLBACK"
      - "=========================================="
      - ""
      - "Current Operator: {{ current_operator_csv }}"
      - "Current Version: {{ current_operator_version }}"
      - "Current Channel: {{ current_channel }}"
      - ""
      - "Rollback Channel: {{ rollback_channel }}"
      - "Reason: 3.x operators cannot manage ZooKeeper clusters"
      - ""
      - "Process:"
      - "  1. Change subscription channel to {{ rollback_channel }}"
      - "  2. Delete current CSV ({{ current_operator_csv }})"
      - "  3. Wait for 2.x operator to install"
      - "  4. Perform ZooKeeper to KRaft migration"
      - "  5. Upgrade operator back to {{ current_channel }}"
      - ""
      - "This process will take 10-15 minutes..."
      - "=========================================="

- name: "Operator Rollback: Delete current 3.x CSV"
  kubernetes.core.k8s:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    name: "{{ current_operator_csv }}"
    namespace: "{{ kafka_namespace }}"
    state: absent

- name: "Operator Rollback: Delete and recreate subscription to force OLM reconciliation"
  kubernetes.core.k8s:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ kafka_operator_name }}"
    namespace: "{{ kafka_namespace }}"
    state: absent

- name: "Operator Rollback: Wait for subscription deletion (30 seconds)"
  pause:
    seconds: 30

- name: "Operator Rollback: Recreate subscription on {{ rollback_channel }}"
  kubernetes.core.k8s:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ kafka_operator_name }}"
    namespace: "{{ kafka_namespace }}"
    definition:
      metadata:
        name: "{{ kafka_operator_name }}"
        namespace: "{{ kafka_namespace }}"
      spec:
        channel: "{{ rollback_channel }}"
        installPlanApproval: Automatic
        name: "{{ kafka_operator_name }}"
        source: redhat-operators
        sourceNamespace: openshift-marketplace
    state: present

- name: "Operator Rollback: Wait for OLM to create install plan (30 seconds)"
  pause:
    seconds: 30

- name: "Operator Rollback: Wait for 3.x CSV to be fully deleted (up to 5 minutes)"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    name: "{{ current_operator_csv }}"
    namespace: "{{ kafka_namespace }}"
  register: csv_check
  until: csv_check.resources | length == 0
  retries: 30
  delay: 10
  failed_when: false

- name: "Operator Rollback: Wait for 3.x operator pods to terminate (up to 5 minutes)"
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ kafka_namespace }}"
    label_selectors:
      - "name={{ kafka_operator_name }}"
  register: pod_check
  until: pod_check.resources | length == 0
  retries: 30
  delay: 10
  failed_when: false

- name: "Operator Rollback: Pause for OLM to stabilize (60 seconds)"
  pause:
    seconds: 60

- name: "Operator Rollback: Wait for 2.x operator to install (up to 10 minutes)"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: "{{ kafka_namespace }}"
  register: new_csv_check
  until:
    - new_csv_check.resources | length > 0
    - new_csv_check.resources | selectattr('spec.displayName', 'search', 'Streams for Apache Kafka') | list | length > 0
    - (new_csv_check.resources | selectattr('spec.displayName', 'search', 'Streams for Apache Kafka') | map(attribute='status.phase') | first) == 'Succeeded'
  retries: 60
  delay: 10

- name: "Operator Rollback: Get new operator version"
  set_fact:
    rollback_operator_csv: "{{ new_csv_check.resources | selectattr('spec.displayName', 'search', 'Streams for Apache Kafka') | map(attribute='metadata.name') | first }}"
    rollback_operator_version: "{{ new_csv_check.resources | selectattr('spec.displayName', 'search', 'Streams for Apache Kafka') | map(attribute='spec.version') | first }}"

- name: "Operator Rollback: Wait for operator pod to be ready (up to 5 minutes)"
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ kafka_namespace }}"
    label_selectors:
      - "strimzi.io/kind=cluster-operator"
  register: operator_pod_check
  until:
    - operator_pod_check.resources | length > 0
    - operator_pod_check.resources[0].status.phase == 'Running'
    - operator_pod_check.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | map(attribute='status') | first == 'True'
  retries: 30
  delay: 10

- name: "Operator Rollback: Rollback complete"
  debug:
    msg:
      - "=========================================="
      - "OPERATOR ROLLBACK SUCCESSFUL"
      - "=========================================="
      - ""
      - "Previous Operator: {{ current_operator_csv }} ({{ current_operator_version }})"
      - "Current Operator: {{ rollback_operator_csv }} ({{ rollback_operator_version }})"
      - ""
      - "The operator is now on a migration-compatible version."
      - "Proceeding with ZooKeeper to KRaft migration..."
      - "=========================================="

- name: "Operator Rollback: Store original channel for later upgrade"
  set_fact:
    original_operator_channel: "{{ current_channel }}"
    operator_was_rolled_back: true

