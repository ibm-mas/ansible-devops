---
# 1. Load default storage classes (if not provided by the user)
# -----------------------------------------------------------------------------
- include_tasks: tasks/determine-storage-classes.yml

# 2. Lookup Kafka namespace
# -------------------------------------------------------------------------
- name: "Lookup Namespace: {{ kafka_namespace }}"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ kafka_namespace }}"
  register: _kafka_namespace_lookup

- name: Set found_kafka_namespace Fact
  ansible.builtin.set_fact:
    found_kafka_namespace: "{{ _kafka_namespace_lookup.resources | length == 1 | default(false, true) }}"

- name: "Namespace Not Found: {{ kafka_namespace }}"
  ansible.builtin.debug:
    msg: "Done/Success. There was nothing to update for Kafka."
  when:
    - not found_kafka_namespace

# 3. Check operator version and cluster state
# -------------------------------------------------------------------------
- name: "Get current operator CSV"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: "{{ kafka_namespace }}"
  register: csv_list
  when: found_kafka_namespace

- name: "Extract operator version from CSV"
  set_fact:
    current_operator_csv: "{{ csv_list.resources | selectattr('spec.displayName', 'search', 'Streams for Apache Kafka') | map(attribute='metadata.name') | first | default('unknown', true) }}"
    current_operator_version: "{{ csv_list.resources | selectattr('spec.displayName', 'search', 'Streams for Apache Kafka') | map(attribute='spec.version') | first | default('0.0.0', true) }}"
  when:
    - found_kafka_namespace
    - csv_list.resources is defined
    - csv_list.resources | length > 0

- name: "Check if operator is KRaft-only (3.x)"
  set_fact:
    operator_is_kraft_only: "{{ current_operator_version is version('3.0.0', '>=') }}"
  when:
    - found_kafka_namespace
    - current_operator_version is defined

- name: "Get the Kafka CR instance"
  kubernetes.core.k8s_info:
    api_version: kafka.strimzi.io/v1beta2
    kind: Kafka
    namespace: "{{ kafka_namespace }}"
    name: "{{ kafka_cluster_name }}"
  register: kafka_cluster_cr
  when: found_kafka_namespace

- name: "Check Kafka cluster metadata state"
  set_fact:
    kafka_metadata_state: "{{ kafka_cluster_cr.resources[0].status.kafkaMetadataState | default('Unknown', true) }}"
  when:
    - found_kafka_namespace
    - kafka_cluster_cr.resources is defined
    - kafka_cluster_cr.resources | length > 0

- name: "Debug operator and cluster state"
  debug:
    msg:
      - "Operator CSV: {{ current_operator_csv | default('Not found') }}"
      - "Operator Version: {{ current_operator_version | default('Unknown') }}"
      - "Operator is KRaft-only (3.x+): {{ operator_is_kraft_only | default(false) }}"
      - "Kafka cluster metadata state: {{ kafka_metadata_state | default('Not available') }}"
  when: found_kafka_namespace

# 4. Handle KRaft-only operator with ZooKeeper cluster scenario
# -------------------------------------------------------------------------
- name: "Detect incompatible state: KRaft-only operator with ZooKeeper cluster"
  set_fact:
    needs_operator_rollback: true
  when:
    - found_kafka_namespace
    - operator_is_kraft_only is defined
    - operator_is_kraft_only | bool
    - kafka_metadata_state is defined
    - kafka_metadata_state == "ZooKeeper"

- name: "Fail if rollback needed but not allowed"
  fail:
    msg:
      - "=========================================="
      - "INCOMPATIBLE OPERATOR AND CLUSTER STATE"
      - "=========================================="
      - ""
      - "Operator Version: {{ current_operator_version }} (KRaft-only)"
      - "Cluster State: ZooKeeper"
      - ""
      - "AMQ Streams 3.x operators do NOT support ZooKeeper clusters"
      - "and cannot perform ZooKeeper to KRaft migration."
      - ""
      - "SOLUTION: Enable automatic operator rollback:"
      - "  KAFKA_ALLOW_ROLLBACK=true KAFKA_ACTION=upgrade"
      - ""
      - "This will:"
      - "  1. Rollback operator to 2.x (migration-compatible)"
      - "  2. Perform ZooKeeper to KRaft migration"
      - "  3. Upgrade operator back to 3.x"
      - ""
      - "Or manually rollback the operator to amq-streams-2.9.x channel"
      - "before running the upgrade."
      - "=========================================="
  when:
    - needs_operator_rollback is defined
    - needs_operator_rollback | bool
    - not kafka_allow_rollback | bool

- name: "Perform automatic operator rollback"
  include_tasks: tasks/provider/redhat/rollback-operator.yml
  when:
    - needs_operator_rollback is defined
    - needs_operator_rollback | bool
    - kafka_allow_rollback | bool

# 4. Perform ZooKeeper to KRaft migration if needed
# -------------------------------------------------------------------------
- name: "Set migration needed flag"
  set_fact:
    migration_needed: true
  when:
    - found_kafka_namespace
    - kafka_cluster_cr.resources is defined
    - kafka_cluster_cr.resources | length > 0
    - kafka_metadata_state is defined
    - kafka_metadata_state == "ZooKeeper"

- name: "Perform ZooKeeper to KRaft migration"
  include_tasks: tasks/provider/redhat/migrate.yml
  when:
    - migration_needed is defined
    - migration_needed | bool

# 5. Upgrade operator back to original channel if it was rolled back
# -------------------------------------------------------------------------
- name: "Upgrade operator back to original channel after migration"
  include_tasks: tasks/provider/redhat/upgrade-operator-after-rollback.yml
  when:
    - migration_needed is defined
    - migration_needed | bool
    - operator_was_rolled_back is defined
    - operator_was_rolled_back | bool

- name: "Migration complete - operator upgrade handled"
  debug:
    msg: |
      ==========================================
      ZooKeeper to KRaft migration completed!
      ==========================================
      
      {% if operator_was_rolled_back is defined and operator_was_rolled_back | bool %}
      Operator was automatically rolled back and upgraded:
        - Rolled back to: {{ rollback_operator_version }}
        - Performed migration
        - Upgraded back to: {{ original_operator_channel }}
      {% else %}
      IMPORTANT: Operator upgrade was skipped because
      the migration just completed. The current operator
      version supports both ZooKeeper and KRaft modes.
      
      To upgrade the operator to the latest version,
      run the upgrade again:
        KAFKA_ACTION=upgrade
      
      The next run will detect the cluster is already
      in KRaft mode and proceed with operator upgrade.
      {% endif %}
      ==========================================
  when:
    - migration_needed is defined
    - migration_needed | bool

- name: "Skip operator upgrade after migration (unless already upgraded)"
  meta: end_play
  when:
    - migration_needed is defined
    - migration_needed | bool
    - operator_was_rolled_back is not defined or not operator_was_rolled_back | bool

# 5. If Kafka namespace exists and no migration was needed, prepare for operator upgrade
# -------------------------------------------------------------------------
- include_tasks: tasks/provider/redhat/prepare-kafka-upgrade.yml
  when:
    - found_kafka_namespace
    - (migration_needed is not defined or not migration_needed | bool)
