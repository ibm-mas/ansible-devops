---
# Check if there are any cluster scope kafka already installed
# -------------------------------------------------------------------
- include_tasks: tasks/provider/redhat/check-kafka-exists.yml

# Check if Kafka cluster already exists in the target namespace
# -------------------------------------------------------------------
- name: "Check if Kafka cluster already exists"
  kubernetes.core.k8s_info:
    api_version: kafka.strimzi.io/v1beta2
    kind: Kafka
    namespace: "{{ kafka_namespace }}"
    name: "{{ kafka_cluster_name }}"
  register: existing_kafka_cluster

- name: "Check if Kafka subscription already exists"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ kafka_operator_name }}"
    namespace: "{{ kafka_namespace }}"
  register: existing_kafka_subscription

- name: "Check existing cluster mode"
  set_fact:
    existing_cluster_mode: "{{ existing_kafka_cluster.resources[0].status.kafkaMetadataState | default('Unknown') }}"
  when:
    - existing_kafka_cluster.resources is defined
    - existing_kafka_cluster.resources | length > 0
    - existing_kafka_cluster.resources[0].status is defined

- name: "Kafka cluster already exists - check if upgrade needed"
  when:
    - existing_kafka_cluster.resources is defined
    - existing_kafka_cluster.resources | length > 0
  block:
    - name: "Display existing cluster information"
      debug:
        msg:
          - "=========================================="
          - "Kafka cluster already exists!"
          - "=========================================="
          - "Cluster Name: {{ kafka_cluster_name }}"
          - "Namespace: {{ kafka_namespace }}"
          - "Provider: {{ kafka_provider }}"
          - "Mode: {{ existing_cluster_mode | default('Unknown') }}"
          - ""
          - "{% if existing_cluster_mode == 'ZooKeeper' %}Action: Install will FAIL - ZooKeeper cluster detected{% else %}Action: Install will update existing KRaft cluster{% endif %}"
          - "=========================================="

    - name: "Fail - Cannot install on existing ZooKeeper cluster"
      fail:
        msg: |
          Kafka cluster '{{ kafka_cluster_name }}' already exists in ZooKeeper mode.

          The install action uses KRaft-only templates which are incompatible
          with existing ZooKeeper clusters.

          To migrate this cluster from ZooKeeper to KRaft, please run with:
            KAFKA_ACTION=upgrade

          Or set in your playbook:
            kafka_action: upgrade
      when:
        - existing_cluster_mode is defined
        - existing_cluster_mode == "ZooKeeper"

    - name: "Info - Updating existing KRaft cluster"
      debug:
        msg:
          - "ℹ️  Existing KRaft cluster will be updated with current configuration"
          - "This is an idempotent operation - safe to run multiple times"
      when:
        - existing_cluster_mode is defined
        - existing_cluster_mode != "ZooKeeper"

# Run the install if there's no previous cluster scope kafka installed
- include_tasks: tasks/provider/redhat/install-kafka.yml
  when:
    - existing_kafka_cluster.resources is not defined or existing_kafka_cluster.resources | length == 0
