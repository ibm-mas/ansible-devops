---
# aiservice_odh/tasks/uninstall/main.yml
# =============================================================================
# Uninstall Open Data Hub (ODH)
# This removes the ODH operator and related resources

- name: "ODH Uninstall : Display uninstall notice"
  debug:
    msg:
      - "=============================================="
      - "ODH Uninstall Starting"
      - "=============================================="
      - "Removing Open Data Hub (ODH) operator"
      - "and related resources"
      - "=============================================="

# 1. Get ODH CSV name
# -----------------------------------------------------------------------------
- name: "ODH Uninstall : Get ODH CSV"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: openshift-operators
  register: csv_list

- name: "ODH Uninstall : Extract ODH CSV name"
  set_fact:
    odh_csv_name: "{{ csv_list.resources | selectattr('metadata.name', 'match', '^opendatahub-operator\\..*') | map(attribute='metadata.name') | first }}"
  when: csv_list.resources | selectattr('metadata.name', 'match', '^opendatahub-operator\\..*') | list | length > 0

- name: "ODH Uninstall : Debug - ODH CSV name"
  debug:
    msg: "ODH CSV to remove: {{ odh_csv_name | default('Not found') }}"

# 2. Scale down DataScienceCluster
# -----------------------------------------------------------------------------
- name: "ODH Uninstall : Scale down DataScienceCluster"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: datasciencecluster.opendatahub.io/v1
      kind: DataScienceCluster
      metadata:
        name: default-dsc
      spec:
        components:
          kserve:
            managementState: Removed
  ignore_errors: true

- name: "ODH Uninstall : Debug - DataScienceCluster scaled down"
  debug:
    msg: "DataScienceCluster kserve component set to Removed"

- name: "ODH Uninstall : Wait for pods to terminate (60s)"
  pause:
    seconds: 60

# 3. Delete DSCInitialization and DataScienceCluster BEFORE operator
# This allows the operator's finalizer controller to process finalizers
# These must be deleted because the ODH operator has cached
# the opendatahub namespace and won't discover new namespaces.
# RHOAI will recreate them automatically if needed.
# -----------------------------------------------------------------------------
- name: "ODH Uninstall : Delete DataScienceCluster"
  kubernetes.core.k8s:
    api_version: datasciencecluster.opendatahub.io/v1
    kind: DataScienceCluster
    name: default-dsc
    state: absent
  ignore_errors: true

- name: "ODH Uninstall : Delete DSCInitialization"
  kubernetes.core.k8s:
    api_version: dscinitialization.opendatahub.io/v1
    kind: DSCInitialization
    name: default-dsci
    state: absent
  ignore_errors: true

- name: "ODH Uninstall : Debug - DSC resources deletion initiated"
  debug:
    msg: "DSCInitialization and DataScienceCluster deletion initiated"

- name: "ODH Uninstall : Wait for operator to process finalizers (60s)"
  pause:
    seconds: 60

# 4. Platform-specific resource cleanup
# -----------------------------------------------------------------------------
# Note: Network policies and Istio resources are NOT deleted during uninstall
# This matches the migration behavior and supports platform switching scenarios
# - Network policies will be recreated by the new platform if needed
# - Istio resources are shared between ODH and RHOAI

- name: "ODH Uninstall : Debug - Resource cleanup skipped"
  debug:
    msg: "Network policies and Istio resources preserved (will be managed by new platform)"

# 5. Delete ODH operator AFTER DSC resources
# -----------------------------------------------------------------------------
- name: "ODH Uninstall : Delete ODH subscription"
  kubernetes.core.k8s:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: opendatahub-operator
    namespace: openshift-operators
    state: absent
  when: odh_csv_name is defined

- name: "ODH Uninstall : Delete ODH CSV"
  kubernetes.core.k8s:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    name: "{{ odh_csv_name }}"
    namespace: openshift-operators
    state: absent
  when: odh_csv_name is defined

- name: "ODH Uninstall : Debug - ODH operator deleted"
  debug:
    msg: "ODH subscription and CSV deleted from openshift-operators"

- name: "ODH Uninstall : Wait for ODH cleanup (60s)"
  pause:
    seconds: 60

# 6. Delete Authorino operator
# -----------------------------------------------------------------------------
- name: "ODH Uninstall : Get Authorino CSV"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: openshift-operators
  register: authorino_csv_list

- name: "ODH Uninstall : Extract Authorino CSV name"
  set_fact:
    authorino_csv_name: "{{ authorino_csv_list.resources | selectattr('metadata.name', 'match', '^authorino-operator\\..*') | map(attribute='metadata.name') | first }}"
  when: authorino_csv_list.resources | selectattr('metadata.name', 'match', '^authorino-operator\\..*') | list | length > 0

- name: "ODH Uninstall : Delete Authorino subscription"
  kubernetes.core.k8s:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: authorino-operator
    namespace: openshift-operators
    state: absent
  ignore_errors: true

- name: "ODH Uninstall : Delete Authorino CSV"
  kubernetes.core.k8s:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    name: "{{ authorino_csv_name }}"
    namespace: openshift-operators
    state: absent
  when: authorino_csv_name is defined
  ignore_errors: true

- name: "ODH Uninstall : Debug - Authorino operator removed"
  debug:
    msg: "Authorino subscription and CSV deleted"

# 7. Wait for resources to be fully deleted (with finalizer removal if stuck)
# -----------------------------------------------------------------------------
- name: "ODH Uninstall : Wait for DataScienceCluster to be deleted"
  kubernetes.core.k8s_info:
    api_version: datasciencecluster.opendatahub.io/v1
    kind: DataScienceCluster
    name: default-dsc
  register: dsc_check
  until: dsc_check.resources | length == 0
  retries: 20
  delay: 15
  ignore_errors: true

- name: "ODH Uninstall : Force remove DataScienceCluster finalizers if stuck"
  when: dsc_check.resources | length > 0
  kubernetes.core.k8s:
    api_version: datasciencecluster.opendatahub.io/v1
    kind: DataScienceCluster
    name: default-dsc
    definition:
      metadata:
        finalizers: []
  ignore_errors: true

- name: "ODH Uninstall : Wait again for DataScienceCluster deletion after finalizer removal"
  when: dsc_check.resources | length > 0
  kubernetes.core.k8s_info:
    api_version: datasciencecluster.opendatahub.io/v1
    kind: DataScienceCluster
    name: default-dsc
  register: dsc_final_check
  until: dsc_final_check.resources | length == 0
  retries: 10
  delay: 10
  ignore_errors: true

- name: "ODH Uninstall : Wait for DSCInitialization to be deleted"
  kubernetes.core.k8s_info:
    api_version: dscinitialization.opendatahub.io/v1
    kind: DSCInitialization
    name: default-dsci
  register: dsci_check
  until: dsci_check.resources | length == 0
  retries: 20
  delay: 15
  ignore_errors: true

- name: "ODH Uninstall : Force remove DSCInitialization finalizers if stuck"
  when: dsci_check.resources | length > 0
  kubernetes.core.k8s:
    api_version: dscinitialization.opendatahub.io/v1
    kind: DSCInitialization
    name: default-dsci
    definition:
      metadata:
        finalizers: []
  ignore_errors: true

- name: "ODH Uninstall : Wait again for DSCInitialization deletion after finalizer removal"
  when: dsci_check.resources | length > 0
  kubernetes.core.k8s_info:
    api_version: dscinitialization.opendatahub.io/v1
    kind: DSCInitialization
    name: default-dsci
  register: dsci_final_check
  until: dsci_final_check.resources | length == 0
  retries: 10
  delay: 10
  ignore_errors: true

- name: "ODH Uninstall : Debug - Verification complete"
  debug:
    msg:
      - "DataScienceCluster deleted: {{ (dsc_final_check.resources | default(dsc_check.resources)) | length == 0 }}"
      - "DSCInitialization deleted: {{ (dsci_final_check.resources | default(dsci_check.resources)) | length == 0 }}"

- name: "ODH Uninstall : Complete"
  debug:
    msg:
      - "=============================================="
      - "ODH Uninstall Complete"
      - "=============================================="
      - "ODH operator removed successfully"
      - "DSCInitialization and DataScienceCluster deleted"
      - "=============================================="
