---
# Post-Upgrade Instance Verification and Configuration
# =============================================================================
# This file performs DB2COMM verification and configuration for a single
# DB2 instance, including port 50001 listener verification.
# =============================================================================

# 1. Set pod name for the current instance
# -----------------------------------------------------------------------------
- name: "Set DB2 pod name for instance {{ db2_instance_id }}"
  set_fact:
    db2_pod_name: "c-{{ db2_instance_id }}-db2u-0"

- name: "Debug DB2 pod information"
  debug:
    msg:
      - "Instance ID .............................. {{ db2_instance_id }}"
      - "Pod Name ................................. {{ db2_pod_name }}"
      - "Namespace ................................ {{ db2_namespace }}"

# 2. Verify DB2COMM configuration
# -----------------------------------------------------------------------------
- name: "Check DB2COMM configuration in pod {{ db2_pod_name }}"
  shell: "oc exec -n {{ db2_namespace }} {{ db2_pod_name }} -c db2u -- su -lc 'db2set -all | grep DB2COMM' db2inst1"
  register: db2comm_check
  failed_when: false
  changed_when: false

- name: "Debug DB2COMM configuration output"
  debug:
    msg:
      - "DB2COMM check output:"
      - "{{ db2comm_check.stdout_lines }}"
      - "Return code: {{ db2comm_check.rc }}"

# 3. Analyze DB2COMM output and set flags
# -----------------------------------------------------------------------------
- name: "Analyze DB2COMM configuration"
  set_fact:
    has_instance_tcpip_ssl: "{{ '[i] DB2COMM=TCPIP,SSL' in db2comm_check.stdout }}"
    has_instance_tcpip_only: "{{ '[i] DB2COMM=TCPIP' in db2comm_check.stdout and '[i] DB2COMM=TCPIP,SSL' not in db2comm_check.stdout }}"
    has_global_tcpip: "{{ '[g] DB2COMM=TCPIP' in db2comm_check.stdout }}"
    needs_ssl_patch: false
    needs_global_disable: false

- name: "Determine required actions"
  set_fact:
    needs_ssl_patch: "{{ has_instance_tcpip_only }}"
    needs_global_disable: "{{ has_instance_tcpip_ssl and has_global_tcpip }}"

- name: "Debug DB2COMM analysis"
  debug:
    msg:
      - "Has instance-level TCPIP,SSL ............. {{ has_instance_tcpip_ssl }}"
      - "Has instance-level TCPIP only ............ {{ has_instance_tcpip_only }}"
      - "Has global-level TCPIP ................... {{ has_global_tcpip }}"
      - "Needs SSL patch .......................... {{ needs_ssl_patch }}"
      - "Needs global disable ..................... {{ needs_global_disable }}"

# 4. Patch instance-level DB2COMM to add SSL if needed
# -----------------------------------------------------------------------------
- name: "Patch instance-level DB2COMM to add SSL"
  when: needs_ssl_patch
  block:
    - name: "Add SSL to instance-level DB2COMM configuration"
      shell: "oc exec -n {{ db2_namespace }} {{ db2_pod_name }} -c db2u -- su -lc 'db2set DB2COMM=TCPIP,SSL' db2inst1"
      register: db2comm_ssl_patch
      failed_when: db2comm_ssl_patch.rc != 0

    - name: "Debug SSL patch result"
      debug:
        msg:
          - "SSL patch applied successfully"
          - "Output: {{ db2comm_ssl_patch.stdout_lines }}"

# 5. Disable global-level DB2COMM if both instance and global are present
# -----------------------------------------------------------------------------
- name: "Disable global-level DB2COMM configuration"
  when: needs_global_disable
  block:
    - name: "Remove global DB2COMM configuration as root"
      shell: "oc exec -n {{ db2_namespace }} {{ db2_pod_name }} -c db2u -- sudo /opt/ibm/db2/V12.1.0.0/adm/db2set -g DB2COMM="
      register: db2comm_global_disable
      failed_when: db2comm_global_disable.rc != 0

    - name: "Debug global disable result"
      debug:
        msg:
          - "Global DB2COMM disabled successfully"
          - "Output: {{ db2comm_global_disable.stdout_lines }}"

# 6. Verify DB2COMM configuration after changes
# -----------------------------------------------------------------------------
- name: "Verify DB2COMM configuration after changes"
  when: needs_ssl_patch or needs_global_disable
  shell: "oc exec -n {{ db2_namespace }} {{ db2_pod_name }} -c db2u -- su -lc 'db2set -all | grep DB2COMM' db2inst1"
  register: db2comm_verify
  failed_when: false
  changed_when: false

- name: "Debug verified DB2COMM configuration"
  when: needs_ssl_patch or needs_global_disable
  debug:
    msg:
      - "Updated DB2COMM configuration:"
      - "{{ db2comm_verify.stdout_lines }}"

# 7. Restart DB2 instance if any changes were made
# -----------------------------------------------------------------------------
- name: "Restart DB2 instance after configuration changes"
  when: needs_ssl_patch or needs_global_disable
  block:
    - name: "Stop DB2 instance with force"
      shell: "oc exec -n {{ db2_namespace }} {{ db2_pod_name }} -c db2u -- su -lc 'db2stop force' db2inst1"
      register: db2stop_result
      failed_when: false
      changed_when: db2stop_result.rc == 0

    - name: "Debug db2stop result"
      debug:
        msg:
          - "DB2 stop command executed"
          - "Return code: {{ db2stop_result.rc }}"
          - "Output: {{ db2stop_result.stdout_lines }}"

    - name: "Wait 10 seconds before starting DB2"
      pause:
        seconds: 10

    - name: "Start DB2 instance"
      shell: "oc exec -n {{ db2_namespace }} {{ db2_pod_name }} -c db2u -- su -lc 'db2start' db2inst1"
      register: db2start_result
      failed_when: db2start_result.rc != 0
      retries: 3
      delay: 5
      until: db2start_result.rc == 0

    - name: "Debug db2start result"
      debug:
        msg:
          - "DB2 start command executed successfully"
          - "Output: {{ db2start_result.stdout_lines }}"

    - name: "Wait 30 seconds for DB2 to fully initialize"
      pause:
        seconds: 30

# 8. Verify port 50001 listener status
# -----------------------------------------------------------------------------
- name: "Verify port 50001 is listening"
  shell: "oc exec -n {{ db2_namespace }} {{ db2_pod_name }} -c db2u -- su -lc 'netstat -nltp | grep 50001' db2inst1"
  register: port_check
  failed_when: false
  changed_when: false
  retries: 5
  delay: 10
  until: port_check.rc == 0

- name: "Debug port 50001 listener status"
  debug:
    msg:
      - "Port 50001 listener status:"
      - "{{ port_check.stdout_lines }}"
      - "Return code: {{ port_check.rc }}"

- name: "Verify port 50001 is actively listening"
  assert:
    that:
      - port_check.rc == 0
      - port_check.stdout | length > 0
    fail_msg: |
      Port 50001 is not listening on pod {{ db2_pod_name }}.
      This may indicate a problem with the DB2 instance configuration.
      Please check the DB2 logs for more information.
    success_msg: "Port 50001 is actively listening on pod {{ db2_pod_name }}"

# 9. Final status summary
# -----------------------------------------------------------------------------
- name: "Post-upgrade verification summary for {{ db2_instance_id }}"
  debug:
    msg:
      - "=========================================="
      - "Post-Upgrade Verification Complete"
      - "=========================================="
      - "Instance ID: {{ db2_instance_id }}"
      - "Pod Name: {{ db2_pod_name }}"
      - "SSL Patch Applied: {{ needs_ssl_patch }}"
      - "Global DB2COMM Disabled: {{ needs_global_disable }}"
      - "DB2 Instance Restarted: {{ needs_ssl_patch or needs_global_disable }}"
      - "Port 50001 Status: Listening"
      - "=========================================="

# Made with Bob
