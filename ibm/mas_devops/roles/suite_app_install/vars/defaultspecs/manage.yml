---
# Default application spec for Manage
mas_app_spec:
  podTemplates: "{{ ((ibm_mas_manage_manageapp_pod_templates is defined) and (ibm_mas_manage_manageapp_pod_templates is not none) and (ibm_mas_manage_manageapp_pod_templates | length != 0)) | ternary(ibm_mas_manage_manageapp_pod_templates, []) }}"
  settings:
    readOnlyRootFilesystem: "{{ (mas_read_only_root_filesystem is defined and mas_read_only_root_filesystem != '') | ternary(mas_read_only_root_filesystem | bool, omit) }}"
