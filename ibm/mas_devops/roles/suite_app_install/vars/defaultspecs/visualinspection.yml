---
# Default application spec for Visual Inspection
mas_app_spec:
  settings:
    storage:
      size: "{{ mas_app_settings_visualinspection_storage_size }}"
      storageClassName: "{{ mas_app_settings_visualinspection_storage_class }}"
    readOnlyRootFilesystem: "{{ (mas_read_only_root_filesystem is defined and mas_read_only_root_filesystem != '') | ternary(mas_read_only_root_filesystem | bool, omit) }}"
