---
# MAS instance ID
mas_instance_id: "{{ lookup('env', 'MAS_INSTANCE_ID') }}"

# MAS version for RBAC manifests
mas_version: "{{ lookup('env', 'MAS_VERSION') | default('9.0', true) }}"

# Permission mode: minimal, namespaced, or cluster
mas_preinstall_permission_mode: "{{ lookup('env', 'MAS_PREINSTALL_PERMISSION_MODE') | default('namespaced', true) }}"

# Selected apps for RBAC (comma-separated list or array)
# Valid values: core, aiservice, arcgis, facilities, iot, manage, monitor, optimizer, predict, visualinspection
mas_preinstall_selected_apps: "{{ lookup('env', 'MAS_PREINSTALL_SELECTED_APPS') | default('', true) }}"

# RBAC root directory (optional, defaults to /opt/app-root/rbac in Python module)
mas_preinstall_rbac_root_dir: "{{ lookup('env', 'MAS_PREINSTALL_RBAC_ROOT_DIR') | default('', true) }}"

# Whether to perform permission check before applying RBAC
mas_preinstall_check_permissions: "{{ lookup('env', 'MAS_PREINSTALL_CHECK_PERMISSIONS') | default('true', true) | bool }}"

