---
# Currently supported providers are aws,ibm,community
mongodb_provider: "{{ lookup('env','MONGODB_PROVIDER') | default('community', True) }}"

# When these are defined we will generate a MAS MongoCfg template
mas_instance_id: "{{ lookup('env', 'MAS_INSTANCE_ID') }}"
mas_config_dir: "{{ lookup('env', 'MAS_CONFIG_DIR') }}"

# Supported actions: install, uninstall, backup, backup-database, restore, restore-database
mongodb_action: "{{ lookup('env', 'MONGODB_ACTION') | default('install', True) }}"

# Backup mongodb databases for specified MAS application. Backup all mongodb databases if not specify this value.
mas_app_id: "{{ lookup('env', 'MAS_APP_ID') }}"

# mongodb community vars
# -----------------------------------------------------------------------------

# Where to install the operator and create the mongo instance
mongodb_namespace: "{{ lookup('env', 'MONGODB_NAMESPACE') | default('mongoce', True) }}"

# Decide if you want to keep your current spec for Mongo or overwrite it
mongodb_override_spec: "{{ lookup('env','MONGODB_OVERRIDE_SPEC') | default (false, true) | bool }}"

# Storage configuration
mongodb_storage_class: "{{ lookup('env', 'MONGODB_STORAGE_CLASS') }}"
mongodb_storage_capacity_data: "{{ lookup('env', 'MONGODB_STORAGE_CAPACITY_DATA') | default('20Gi', True) }}"
mongodb_storage_capacity_logs: "{{ lookup('env', 'MONGODB_STORAGE_CAPACITY_LOGS') | default('20Gi', True) }}"

# CPU and memory requests/limits configuration on the mongodb container
mongodb_cpu_limits: "{{ lookup('env', 'MONGODB_CPU_LIMITS') | default('1', true) }}"
mongodb_mem_limits: "{{ lookup('env', 'MONGODB_MEM_LIMITS') | default('1Gi', true) }}"
mongodb_cpu_requests: "{{ lookup('env', 'MONGODB_CPU_REQUESTS') | default('500m', true) }}"
mongodb_mem_requests: "{{ lookup('env', 'MONGODB_MEM_REQUESTS') | default('1Gi', true) }}"

# MongoDB Replicas
mongodb_replicas: "{{ lookup('env', 'MONGODB_REPLICAS') | default(3, True) }}"

# Indicates if this is controlled upgrade of both the mongo operator and mongo instance
controlled_upgrade: false

# Indicates if grafana role has been run
supports_grafanav4: false

# Version of Mongo installed when the IBM Catalog does is not installed or the corresponding CaseBundle does not exist
mongo_extras_version: "{{ lookup('env', 'MONGODB_VERSION') }}"

# It appears that between v5 and v6 the shell changed from "mongo" to "mongosh"
# This broke lots of actions supported by this role.  We are defaulting to "mongosh", but this can be overridden if needed
mongodb_shell: "mongosh"

# aws documentdb vars
# -----------------------------------------------------------------------------
aws_access_key_id: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
aws_secret_access_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
aws_region: "{{ lookup('env', 'AWS_REGION') | default('us-east-2', True) }}"

# aws vpc id where subnets and other resources will be created
vpc_id: "{{ lookup('env','VPC_ID') }}"

docdb_cluster_name: "{{ lookup('env', 'DOCDB_CLUSTER_NAME') }}"
docdb_subnet_group_name: "docdb-{{ docdb_cluster_name }}"
docdb_security_group_name: "docdb-{{ docdb_cluster_name }}"
docdb_admin_credentials_secret_name: "{{ docdb_cluster_name }}-admin-credentials"

docdb_instance_identifier_prefix: "{{ lookup('env', 'DOCDB_INSTANCE_IDENTIFIER_PREFIX')}}"
docdb_instance_number: "{{ lookup('env', 'DOCDB_INSTANCE_NUMBER') | default(3, True) }}"
docdb_instance_class: "{{ lookup('env', 'DOCDB_INSTANCE_CLASS') | default('db.t3.medium', True) }}"
docdb_master_username: "{{ lookup('env', 'DOCDB_MASTER_USERNAME') | default('docdbadmin', True) }}" # refere other dbs admin usernames <mas-instance-id>-admin
docdb_engine_version: "{{ lookup('env', 'DOCDB_ENGINE_VERSION') | default('5.0.0', True) }}"

# cidr for subnets in 3 different availabilty zones
docdb_cidr_az1: "{{ lookup('env', 'DOCDB_CIDR_AZ1') }}"
docdb_cidr_az2: "{{ lookup('env', 'DOCDB_CIDR_AZ2') }}"
docdb_cidr_az3: "{{ lookup('env', 'DOCDB_CIDR_AZ3') }}"

# add ipv4 cidr of vpc so that all applications inside that vpc can talk to documentdb
docdb_ingress_cidr: "{{ lookup('env', 'DOCDB_INGRESS_CIDR') }}"
docdb_egress_cidr: "{{ lookup('env', 'DOCDB_EGRESS_CIDR') }}"

# ibmcloud mongodb vars
# -----------------------------------------------------------------------------
ibm_mongo_admin_credentials_secret_name: "{{ ibm_mongo_name }}-admin-credentials"
mongo_service_credentials_secret_name: "{{ ibm_mongo_name }}-service-credentials"

#vars for mongo backup restore
ibm_mongo_backup_id: "{{ lookup('env', 'IBM_MONGO_BACKUP_ID') | default('', True) }}"
restored_mongodb_service_name: "{{ lookup('env', 'RESTORED_MONGO_SERVICE_NAME') }}"
is_restore: "{{ lookup('env', 'IS_RESTORE') | default(false, True) }}"

ibmcloud_resourcegroup: "{{ lookup('env','IBMCLOUD_RESOURCEGROUP') | default('Default', True) }}"
ibm_mongo_resourcegroup: "{{ lookup('env', 'IBM_MONGO_RESOURCEGROUP') | default(ibmcloud_resourcegroup, true) }}"

ibmcloud_region: "{{ lookup('env', 'IBMCLOUD_REGION') | default('us-east', True) }}"
ibm_mongo_region: "{{ lookup('env', 'IBM_MONGO_REGION') | default(ibmcloud_region, True) }}"

ibmcloud_apikey: "{{ lookup('env', 'IBMCLOUD_APIKEY') }}"

ibm_mongo_plan: "{{ lookup('env', 'IBM_MONGO_PLAN') | default('standard', True) }}"
ibm_mongo_location: "{{ ibmcloud_region }}"
ibm_mongo_service: "databases-for-mongodb"
ibm_mongo_service_endpoints: "{{ lookup('env', 'IBM_MONGO_SERVICE_ENDPOINTS') | default('public', True) }}"
ibm_mongo_version: "{{ lookup('env', 'IBM_MONGO_VERSION') | default('4.4', True) }}"

ibm_mongo_memory: "{{ lookup('env', 'IBM_MONGO_MEMORY') | default('3840',True) }}"
ibm_mongo_disk: "{{ lookup('env', 'IBM_MONGO_DISK') | default('30720',True) }}"
ibm_mongo_cpu: "{{ lookup('env', 'IBM_MONGO_CPU') | default(0,True) }}"
ibm_mongo_name_default: "mongo-{{ mas_instance_id }}"
ibm_mongo_name: "{{ lookup('env', 'IBM_MONGO_NAME') | default(ibm_mongo_name_default, True) }}"
ibm_mongo_admin_password: "{{ lookup('env', 'IBM_MONGO_ADMIN_PASSWORD') }}"

# aws docdb_secret_rotate vars
# -----------------------------------------------------------------------------
docdb_mongo_instance_name: "{{ lookup('env', 'DOCDB_MONGO_INSTANCE_NAME') }}"
docdb_host: "{{ lookup('env', 'DOCDB_HOST') }}"
docdb_port: "{{ lookup('env', 'DOCDB_PORT') }}"
docdb_instance_username: "{{ lookup('env', 'DOCDB_INSTANCE_USERNAME') }}"
docdb_instance_password_old: "{{ lookup('env', 'DOCDB_PASSWORD_OLD') }}"
docdb_master_password: "{{ lookup('env', 'DOCDB_MASTER_PASSWORD') }}"
# Custom Labels
custom_labels: "{{ lookup('env', 'CUSTOM_LABELS') | default(None, true) | string | ibm.mas_devops.string2dict() }}"

# MongoCE backup and restore vars
# -----------------------------------------------------------------------------
mongodb_instance_name: "{{ lookup('env', 'MONGODB_INSTANCE_NAME') | default('mas-mongo-ce', true) }}"
mas_backup_dir: "{{ lookup('env', 'MAS_BACKUP_DIR') }}"
mongodb_backup_version: "{{ lookup('env', 'MONGODB_BACKUP_VERSION') }}"

# set flag to true, to override storage class with cluster's default
override_storageclass: "{{ lookup('env', 'OVERRIDE_STORAGECLASS') | default(false, true) }}"
_mongodb_storage: "NO_OVERRIDE"

# -----------------------------------------------------------------------------


# Mongo upgrade flags
# If identified that there's an existing Mongo that might lead to a v5 or v6 upgrade
# the following flags must be set to confirm the upgrades otherwise the role will fail and not proceed with the upgrade.
mongodb_v5_upgrade: "{{ lookup('env', 'MONGODB_V5_UPGRADE') | default(false, true) | bool }}"
mongodb_v6_upgrade: "{{ lookup('env', 'MONGODB_V6_UPGRADE') | default(false, true) | bool }}"
mongodb_v7_upgrade: "{{ lookup('env', 'MONGODB_V7_UPGRADE') | default(false, true) | bool }}"
mongodb_v8_upgrade: "{{ lookup('env', 'MONGODB_V8_UPGRADE') | default(false, true) | bool }}"

# This matrix will define and validate the mongodb upgrade compatibility mapping version.
# Therefore this must be updated whenever a new mongodb version is supported.
# MongoDB Atlas vars
# -----------------------------------------------------------------------------
# Atlas API Configuration
atlas_api_base_url: "{{ lookup('env', 'ATLAS_API_BASE_URL') | default('https://cloud.mongodb.com/api/atlas/v1.0', True) }}"
atlas_api_timeout: "{{ lookup('env', 'ATLAS_API_TIMEOUT') | default(30, True) }}"

# Atlas Organization and Project Configuration
atlas_org_id: "{{ lookup('env', 'ATLAS_ORG_ID') }}"
atlas_project_id: "{{ lookup('env', 'ATLAS_PROJECT_ID') }}"
atlas_project_name: "{{ lookup('env', 'ATLAS_PROJECT_NAME') }}"
atlas_cluster_name: "{{ lookup('env', 'ATLAS_CLUSTER_NAME') }}"
atlas_account_id: "{{ lookup('env', 'ATLAS_ACCOUNT_ID') }}"

# AWS Secrets Manager Configuration (required - for retrieving Atlas credentials)
# Secret name follows the format: <atlas_account_id>/mongodb-atlas
# Atlas API credentials are ONLY retrieved from AWS Secrets Manager
atlas_aws_secret_name: "{{ atlas_account_id }}/mongodb-atlas"
atlas_backup_compliance_enabled: "{{ (lookup('env', 'ATLAS_BACKUP_COMPLIANCE_ENABLED') | default('false', True)) | bool }}"
# Atlas Backup Compliance Policy Configuration
## Authorized user details for compliance policy changes
atlas_compliance_authorized_email: "{{ lookup('env', 'ATLAS_COMPLIANCE_AUTHORIZED_EMAIL') | default('admin@example.com', True) }}"
atlas_compliance_authorized_first_name: "{{ lookup('env', 'ATLAS_COMPLIANCE_AUTHORIZED_FIRST_NAME') | default('Admin', True) }}"
atlas_compliance_authorized_last_name: "{{ lookup('env', 'ATLAS_COMPLIANCE_AUTHORIZED_LAST_NAME') | default('User', True) }}"
## Compliance policy settings
atlas_compliance_copy_protection: "{{ (lookup('env', 'ATLAS_COMPLIANCE_COPY_PROTECTION') | default('false', True)) | bool }}"
atlas_compliance_encryption_at_rest: "{{ (lookup('env', 'ATLAS_COMPLIANCE_ENCRYPTION_AT_REST') | default('false', True)) | bool }}"
atlas_compliance_pit_enabled: "{{ (lookup('env', 'ATLAS_COMPLIANCE_PIT_ENABLED') | default('false', True)) | bool }}"
atlas_compliance_restore_window_days: "{{ lookup('env', 'ATLAS_COMPLIANCE_RESTORE_WINDOW_DAYS') | default(7, True) | int }}"
## Scheduled backup policies - Hourly
atlas_compliance_hourly_frequency_interval: "{{ lookup('env', 'ATLAS_COMPLIANCE_HOURLY_FREQUENCY_INTERVAL') | default(6, True) | int }}"
atlas_compliance_hourly_retention_unit: "{{ lookup('env', 'ATLAS_COMPLIANCE_HOURLY_RETENTION_UNIT') | default('days', True) }}"
atlas_compliance_hourly_retention_value: "{{ lookup('env', 'ATLAS_COMPLIANCE_HOURLY_RETENTION_VALUE') | default(7, True) | int }}"
## Scheduled backup policies - Daily
atlas_compliance_daily_frequency_interval: "{{ lookup('env', 'ATLAS_COMPLIANCE_DAILY_FREQUENCY_INTERVAL') | default(1, True) | int }}"
atlas_compliance_daily_retention_unit: "{{ lookup('env', 'ATLAS_COMPLIANCE_DAILY_RETENTION_UNIT') | default('days', True) }}"
atlas_compliance_daily_retention_value: "{{ lookup('env', 'ATLAS_COMPLIANCE_DAILY_RETENTION_VALUE') | default(7, True) | int }}"
## Scheduled backup policies - Weekly
atlas_compliance_weekly_frequency_interval: "{{ lookup('env', 'ATLAS_COMPLIANCE_WEEKLY_FREQUENCY_INTERVAL') | default(1, True) | int }}"
atlas_compliance_weekly_retention_unit: "{{ lookup('env', 'ATLAS_COMPLIANCE_WEEKLY_RETENTION_UNIT') | default('weeks', True) }}"
atlas_compliance_weekly_retention_value: "{{ lookup('env', 'ATLAS_COMPLIANCE_WEEKLY_RETENTION_VALUE') | default(4, True) | int }}"
## Scheduled backup policies - Monthly
atlas_compliance_monthly_frequency_interval: "{{ lookup('env', 'ATLAS_COMPLIANCE_MONTHLY_FREQUENCY_INTERVAL') | default(1, True) | int }}"
atlas_compliance_monthly_retention_unit: "{{ lookup('env', 'ATLAS_COMPLIANCE_MONTHLY_RETENTION_UNIT') | default('months', True) }}"
atlas_compliance_monthly_retention_value: "{{ lookup('env', 'ATLAS_COMPLIANCE_MONTHLY_RETENTION_VALUE') | default(12, True) | int }}"
## Scheduled backup policies - Yearly
atlas_compliance_yearly_frequency_interval: "{{ lookup('env', 'ATLAS_COMPLIANCE_YEARLY_FREQUENCY_INTERVAL') | default(1, True) | int }}"
atlas_compliance_yearly_retention_unit: "{{ lookup('env', 'ATLAS_COMPLIANCE_YEARLY_RETENTION_UNIT') | default('years', True) }}"
atlas_compliance_yearly_retention_value: "{{ lookup('env', 'ATLAS_COMPLIANCE_YEARLY_RETENTION_VALUE') | default(1, True) | int }}"

# Atlas Audit Logging Configuration
# MongoDB Atlas Auditing captures database operations for compliance and security
# Required for FedRAMP, HIPAA, and other regulatory compliance
atlas_audit_enabled: "{{ (lookup('env', 'ATLAS_AUDIT_ENABLED') | default('false', True)) | bool }}"
atlas_audit_filter: "{{ lookup('env', 'ATLAS_AUDIT_FILTER') | default('{\"$or\":[{\"atype\":\"authenticate\"},{\"atype\":\"logout\"},{\"atype\":\"authCheck\",\"result\":{\"$ne\":0}},{\"atype\":\"authCheck\",\"param.command\":{\"$in\":[\"aggregate\",\"count\",\"distinct\",\"group\",\"mapReduce\",\"geoNear\",\"geoSearch\",\"eval\",\"find\",\"getLastError\",\"getMore\",\"getPrevError\",\"parallelCollectionScan\",\"delete\",\"findAndModify\",\"insert\",\"update\",\"resetError\",\"bulkWrite\"]}},{\"atype\":{\"$in\":[\"createCollection\",\"createDatabase\",\"createIndex\",\"renameCollection\",\"dropCollection\",\"dropDatabase\",\"dropIndex\",\"createUser\",\"dropUser\",\"dropAllUsersFromDatabase\",\"updateUser\",\"grantRolesToUser\",\"revokeRolesFromUser\",\"createRole\",\"updateRole\",\"dropRole\",\"dropAllRolesFromDatabase\",\"grantRolesToRole\",\"revokeRolesFromRole\",\"grantPrivilegesToRole\",\"revokePrivilegesFromRole\",\"directAuthMutation\",\"enableSharding\",\"shardCollection\",\"addShard\",\"removeShard\",\"shutdown\",\"applicationMessage\",\"replSetReconfig\",\"setClusterParameter\",\"fsync\",\"restoreBackup\"]}}]}', True) }}"
atlas_audit_authorization_success: "{{ (lookup('env', 'ATLAS_AUDIT_AUTHORIZATION_SUCCESS') | default('false', True)) | bool }}"

# Atlas Alert Monitoring Configuration
# Provides proactive notifications for cluster health, performance, and security events
atlas_enable_alerts: "{{ (lookup('env', 'ATLAS_ENABLE_ALERTS') | default('false', True)) | bool }}"
atlas_alert_notification_emails: "{{ lookup('env', 'ATLAS_ALERT_NOTIFICATION_EMAILS') | default('[]', True) }}"

# Alert category toggles
atlas_enable_cluster_health_alerts: "{{ (lookup('env', 'ATLAS_ENABLE_CLUSTER_HEALTH_ALERTS') | default('false', True)) | bool }}"
atlas_enable_performance_alerts: "{{ (lookup('env', 'ATLAS_ENABLE_PERFORMANCE_ALERTS') | default('false', True)) | bool }}"

# Performance alert thresholds
# Format: [warning, critical]
atlas_alert_cpu_thresholds: "{{ lookup('env', 'ATLAS_ALERT_CPU_THRESHOLDS') | default('[70, 80]', True) | from_json }}"
atlas_alert_memory_thresholds: "{{ lookup('env', 'ATLAS_ALERT_MEMORY_THRESHOLDS') | default('[70, 80]', True) | from_json }}"
atlas_alert_connection_thresholds: "{{ lookup('env', 'ATLAS_ALERT_CONNECTION_THRESHOLDS') | default('[70, 80]', True) | from_json }}"
atlas_alert_replication_lag_threshold: "{{ lookup('env', 'ATLAS_ALERT_REPLICATION_LAG_THRESHOLD') | default(30, True) | int }}"
atlas_alert_oplog_window_threshold_minutes: "{{ lookup('env', 'ATLAS_ALERT_OPLOG_WINDOW_THRESHOLD_MINUTES') | default(60, True) | int }}"

# Alert interval configuration (in minutes) - applies to all metric threshold alerts
atlas_alert_interval_min: "{{ lookup('env', 'ATLAS_ALERT_INTERVAL_MIN') | default(60, True) | int }}"

# Atlas PrivateLink Configuration
# PrivateLink provides secure, private connectivity between Atlas and AWS VPC
atlas_privatelink_enabled: "{{ (lookup('env', 'ATLAS_PRIVATELINK_ENABLED') | default('false', True)) | bool }}"

# AWS VPC Configuration for PrivateLink
atlas_vpc_id: "{{ lookup('env', 'ATLAS_VPC_ID') }}"
atlas_aws_region: "{{ lookup('env', 'ATLAS_AWS_REGION') }}"

# AWS Subnet IDs for VPC Endpoint placement (private connectivity edge subnets)
# Provide as list or comma-separated string
atlas_subnet_ids: "{{ lookup('env', 'ATLAS_SUBNET_IDS') | default('[]', True) }}"

# ROSA Cluster CIDR ranges for security group ingress rules
# Provide as list or comma-separated string
atlas_rosa_cidr_ranges: "{{ lookup('env', 'ATLAS_ROSA_CIDR_RANGES') | default('[]', True) }}"

# Atlas Cluster Provisioning Configuration (for provision action)
atlas_cluster_provider: "{{ lookup('env', 'ATLAS_CLUSTER_PROVIDER') | default('AWS', True) }}"
atlas_cluster_size: "{{ lookup('env', 'ATLAS_CLUSTER_SIZE') }}"
atlas_mongodb_version: "{{ lookup('env', 'ATLAS_MONGODB_VERSION') | default('7.0', True) }}"
atlas_backup_enabled: "{{ (lookup('env', 'ATLAS_BACKUP_ENABLED') | default('false', True)) | bool }}"
# Atlas Cluster Protection Configuration
atlas_termination_protection_enabled: "{{ (lookup('env', 'ATLAS_TERMINATION_PROTECTION_ENABLED') | default('false', True)) | bool }}"
atlas_retain_backups_enabled: "{{ (lookup('env', 'ATLAS_RETAIN_BACKUPS_ENABLED') | default('false', True)) | bool }}"
atlas_pit_enabled: "{{ (lookup('env', 'ATLAS_PIT_ENABLED') | default('false', True)) | bool }}"

# Atlas Cluster Autoscaling Configuration
atlas_autoscaling_compute_enabled: "{{ (lookup('env', 'ATLAS_AUTOSCALING_COMPUTE_ENABLED') | default('false', True)) | bool }}"
atlas_autoscaling_compute_scale_down_enabled: "{{ (lookup('env', 'ATLAS_AUTOSCALING_COMPUTE_SCALE_DOWN_ENABLED') | default('true', True)) | bool }}"
atlas_autoscaling_compute_min_instance_size: "{{ lookup('env', 'ATLAS_AUTOSCALING_COMPUTE_MIN_INSTANCE_SIZE') }}"
atlas_autoscaling_compute_max_instance_size: "{{ lookup('env', 'ATLAS_AUTOSCALING_COMPUTE_MAX_INSTANCE_SIZE') }}"
atlas_autoscaling_disk_gb_enabled: "{{ (lookup('env', 'ATLAS_AUTOSCALING_DISK_GB_ENABLED') | default('false', True)) | bool }}"

# Atlas MAS Instances Configuration
# List of MAS instance names that will use this cluster
# Each instance will get a dedicated database user with scoped permissions
# Provide as list or comma-separated string
atlas_mas_instances: "{{ lookup('env', 'ATLAS_MAS_INSTANCES') | default('[]', True) }}"

# MongoDB authentication mechanism
atlas_auth_mechanism: "{{ lookup('env', 'ATLAS_AUTH_MECHANISM') | default('DEFAULT', True) }}"

# Atlas Credentials Storage in AWS Secrets Manager
# Store connection information (hosts, port, username, password, CA cert) in AWS Secrets Manager
atlas_store_credentials_in_secret: "{{ (lookup('env', 'ATLAS_STORE_CREDENTIALS_IN_SECRET') | default('false', True)) | bool }}"

# Atlas Deprovision Configuration
atlas_remove_db_users: "{{ (lookup('env', 'ATLAS_REMOVE_DB_USERS') | default('true', True)) | bool }}"
atlas_wait_for_deletion: "{{ (lookup('env', 'ATLAS_WAIT_FOR_DELETION') | default('true', True)) | bool }}"

# Delete AWS Secrets Manager secret during deprovision (default: false for safety)
atlas_delete_secret: "{{ (lookup('env', 'ATLAS_DELETE_SECRET') | default('true', True)) | bool }}"
# Force immediate deletion without recovery window (default: false - uses 7 day recovery window)
atlas_force_delete_secret: "{{ (lookup('env', 'ATLAS_FORCE_DELETE_SECRET') | default('false', True)) | bool }}"

# Only allow Mongo upgrades to be next compatible minor (or patch) version.
# Example:
# If `existing_mongo_version: 4.4.21` then the `target_mongodb_version` must be `5.0.21` or `5.0.23`.
# Otherwise the code will validate there is an incompatibility in the version to be upgraded and it will fail prior starting the upgrade process.
mongo_compatible_target_version:
  "4.2.6":
    - "4.4.21"
  "4.2.23":
    - "4.4.21"
  "4.4.21":
    - "5.0.21"
    - "5.0.23"
  "5.0.21":
    - "5.0.23"
    - "6.0.10"
    - "6.0.12"
  "5.0.23":
    - "6.0.10"
    - "6.0.12"
  "6.0.10":
    - "6.0.12"
    - "7.0.12"
    - "7.0.22"
    - "7.0.23"
  "6.0.12":
    - "6.0.12"
    - "7.0.12"
    - "7.0.22"
    - "7.0.23"
  "7.0.12":
    - "7.0.12"
    - "7.0.22"
    - "7.0.23"
    - "8.0.13"
    - "8.0.17"
    - "8.0.20"
  "7.0.22":
    - "7.0.22"
    - "7.0.23"
    - "8.0.13"
    - "8.0.17"
    - "8.0.20"
  "7.0.23":
    - "7.0.23"
    - "8.0.13"
    - "8.0.17"
    - "8.0.20"
  "8.0.13":
    - "8.0.13"
    - "8.0.17"
    - "8.0.20"
  "8.0.17":
    - "8.0.17"
    - "8.0.20"
  "8.0.20":
    - "8.0.20"
# destroy-data vars
# -----------------------------------------------------------------------------
config: "{{ lookup('env', 'CONFIG') }}"
certificates: "{{ lookup('env', 'CERTIFICATES') }}"
mongo_username: "{{ lookup('env', 'MONGO_USERNAME') }}"
mongo_password: "{{ lookup('env', 'MONGO_PASSWORD') }}"


# Atlas Default configurations
atlas_backup_archive_path: "{{ lookup('env', 'ATLAS_BACKUP_ARCHIVE_PATH') }}"
atlas_index_file_path: "{{ lookup('env', 'ATLAS_INDEX_FILE_PATH') }}"
atlas_mongodb_host: "{{ lookup('env', 'ATLAS_MONGODB_HOST') }}"
atlas_mongodb_username: "{{ lookup('env', 'ATLAS_MONGODB_USERNAME') }}"
atlas_mongodb_password: "{{ lookup('env', 'ATLAS_MONGODB_PASSWORD') }}"
restore_temp_dir: "/tmp/mongodb-restore"

# AWS DocumentDB Backup Configuration
# -----------------------------------------------------------------------------
docdb_backup_dir: "{{ lookup('env', 'DOCDB_BACKUP_DIR') }}"
docdb_ca_cert_url: "{{ lookup('env', 'DOCDB_CA_CERT_URL') | default('https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem', True) }}"
# Number of parallel jobs for backup (default: 4, increase for faster backups on powerful systems)
docdb_parallel_jobs: "{{ lookup('env', 'DOCDB_PARALLEL_JOBS') | default(4, True) }}"

# AWS DocumentDB Restore Configuration
# -----------------------------------------------------------------------------
cleanup_temp_files: "{{ lookup('env', 'CLEANUP_TEMP_FILES') | default(true, True) | bool }}"
mongorestore_options: "--noOptionsRestore --noIndexRestore"
