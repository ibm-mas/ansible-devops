---
# ibm/mas_devops/roles/mongodb/tasks/main.yml

# 1. Check for undefined properties that do not have a default
# -----------------------------------------------------------------------------
- name: "Fail if mongodb_provider is not provided"
  assert:
    that: mongodb_provider is defined and mongodb_provider != ""
    fail_msg: "mongodb_provider property is required"

- name: "Fail if mongodb_action is not provided or invalid"
  assert:
    that:
      - mongodb_action is defined
      - mongodb_action in ["install", "uninstall", "backup", "backup-database", "restore-database", "restore"]
    fail_msg: "mongodb_action property is required and must be one of 'install', 'uninstall', 'backup', 'backup-database','restore-database', 'restore'"

# 2. Rotate mongo provider based on weekday
# -----------------------------------------------------------------------------
- name: "Select Mongo provider based on day of the week"
  when: mongodb_provider == "rotate"
  set_fact:
    mongodb_provider: "{{ rotate_mongodb_provider[ansible_date_time['weekday']] }}"
  vars:
    rotate_mongodb_provider:
      Monday: "community"
      Tuesday: "mck"
      Wednesday: "community"
      Thursday: "mck"
      Friday: "community"
      Saturday: "mck"
      Sunday: "community"

# 3. Run the install / uninstall for specified provider
# -----------------------------------------------------------------------------
- include_tasks: "tasks/providers/{{ mongodb_provider }}/{{ mongodb_action }}.yml"
  when:
    - mongodb_action != "none"
