---
# MongoDB Restore from AWS S3
# =============================================================================
# This playbook restores MongoDB data from S3 backup to MongoDB Atlas
# It downloads backup archive and index files from S3 and uses mongorestore command

# 1. Validate required variables
# -----------------------------------------------------------------------------
- name: Fail if required S3 variables are not provided
  assert:
    that:
      - atlas_s3_bucket_name is defined and atlas_s3_bucket_name != ''
      - atlas_s3_backup_prefix is defined and atlas_s3_backup_prefix != ''
      - atlas_backup_file_name is defined and atlas_backup_file_name != ''
      - atlas_index_backup_file_name is defined and atlas_index_backup_file_name != ''
    fail_msg: "Missing one or more required S3 properties: atlas_s3_bucket_name, atlas_s3_backup_prefix, atlas_backup_file_name, atlas_index_backup_file_name"

- name: Fail if required MongoDB Atlas/DocumentDB connection details are not provided
  assert:
    that:
      - atlas_mongodb_host is defined and atlas_mongodb_host != ''
      - atlas_mongodb_username is defined and atlas_mongodb_username != ''
      - atlas_mongodb_password is defined and atlas_mongodb_password != ''
    fail_msg: "Missing one or more required MongoDB connection properties: atlas_mongodb_host, atlas_mongodb_username, atlas_mongodb_password"

- name: "Debug restore properties"
  debug:
    msg:
      - "S3 Bucket Name ......................... {{ atlas_s3_bucket_name }}"
      - "Backup File Name ....................... {{ atlas_backup_file_name }}.tar.gz"
      - "S3 Prefix .............................. {{ atlas_s3_backup_prefix }}"
      - "Index Backup File Name ................. {{ atlas_index_backup_file_name }}"
      - "MongoDB Host ........................... {{ atlas_mongodb_host }}"
      - "MongoDB Username ....................... {{ atlas_mongodb_username }}"
      - "Restore Temp Directory ................. {{ restore_temp_dir }}"

- name: Download and Restore
  block:
    # 2. Create temporary directory for restore files
    # -----------------------------------------------------------------------------
    - name: Create temporary directory for restore
      file:
        path: "{{ restore_temp_dir }}/{{ atlas_s3_backup_prefix }}"
        state: directory
        mode: '0755'

    # 3. Download backup files from S3 using download_from_s3 utility
    # -----------------------------------------------------------------------------
    - name: Download backup archive from S3
      ibm.mas_devops.download_from_s3:
        aws_access_key_id: "{{ aws_access_key_id }}"
        aws_secret_access_key: "{{ aws_secret_access_key }}"
        bucket_name: "{{ atlas_s3_bucket_name }}"
        object_name: "{{ atlas_s3_backup_prefix }}/{{ atlas_backup_file_name }}.tar.gz"
        local_dir: "{{ restore_temp_dir }}"
        region_name: "{{ aws_region }}"
        endpoint_url: "{{ s3_endpoint_url | default(omit) }}"
      # async: 20
      poll: 10
      register: download_backup_result

    - name: Download index backup file from S3
      ibm.mas_devops.download_from_s3:
        aws_access_key_id: "{{ aws_access_key_id }}"
        aws_secret_access_key: "{{ aws_secret_access_key }}"
        bucket_name: "{{ atlas_s3_bucket_name }}"
        object_name: "{{ atlas_s3_backup_prefix }}/{{ atlas_index_backup_file_name }}"
        local_dir: "{{ restore_temp_dir }}"
        region_name: "{{ aws_region }}"
        endpoint_url: "{{ s3_endpoint_url | default(omit) }}"
      poll: 10
      register: download_index_result

    - name: Verify backup archive was downloaded
      stat:
        path: "{{ restore_temp_dir }}/{{ atlas_s3_backup_prefix }}/{{ atlas_backup_file_name }}.tar.gz"
      register: backup_archive_stat

    - name: Verify index file was downloaded
      stat:
        path: "{{ restore_temp_dir }}/{{ atlas_s3_backup_prefix }}/{{ atlas_index_backup_file_name }}"
      register: index_file_stat

    - name: Debug download results
      debug:
        msg:
          - "Backup archive downloaded successfully - Size: {{ (backup_archive_stat.stat.size / 1024 / 1024) | round(2) }} MB"
          - "Index file downloaded successfully - Size: {{ (index_file_stat.stat.size / 1024) | round(2) }} KB"

    # 4. Build mongorestore connection string
    # -----------------------------------------------------------------------------
    - name: Build MongoDB connection URI
      set_fact:
        mongodb_uri: "mongodb+srv://{{ atlas_mongodb_username }}:{{ atlas_mongodb_password }}@{{ atlas_mongodb_host }}/"
      no_log: true

    # 5. Extract and Restore mongodb databases
    # -----------------------------------------------------------------------------
    - name: "Set backup file paths"
      set_fact:
        backup_archive_path: "{{ restore_temp_dir }}/{{ atlas_s3_backup_prefix }}/{{ atlas_backup_file_name }}.tar.gz"
        backup_extract_dir: "{{ restore_temp_dir }}/{{ atlas_backup_file_name }}"
        index_file_path: "{{ restore_temp_dir }}/{{ atlas_s3_backup_prefix }}/{{ atlas_index_backup_file_name }}"

    - name: Create temporary directory for restore
      file:
        path: "{{ backup_extract_dir }}"
        state: directory
        mode: '0755'

    - name: Extract archive
      unarchive:
        src: "{{ backup_archive_path }}"
        dest: "{{ backup_extract_dir }}"
        extra_opts:
          - --exclude=._*

    - name: "Restore mongodb databases"
      changed_when: true
      shell: |
        mongorestore \
          --uri="{{ mongodb_uri }}" \
          --authenticationDatabase=admin \
          {{ mongorestore_options }} \
          --drop {{ backup_extract_dir }}/
      register: mongorestore_result
      no_log: true

    # 6. Restore indexes from index backup file
    # -----------------------------------------------------------------------------
    - name: Check if index backup file is a valid JSON
      command: >
        python3 -m json.tool {{ index_file_path }}
      register: json_validation
      failed_when: false

    - name: Restore indexes if index file is valid
      when: json_validation.rc == 0
      block:
        - name: Read index backup file
          slurp:
            src: "{{ index_file_path }}"
          register: index_backup_content

        - name: Parse index backup JSON
          set_fact:
            index_data: "{{ index_backup_content.content | b64decode | from_json }}"

        - name: Build list of database and collection combinations
          ansible.builtin.set_fact:
            db_collection_list: |
              {% set result = [] %}
              {% for db in index_data.keys() %}
                {% for coll in index_data[db].keys() %}
                  {% set _ = result.append({'db': db, 'collection': coll}) %}
                {% endfor %}
              {% endfor %}
              {{ result }}

        - name: Restore indexes using mongo shell
          shell: |
            mongosh "{{ mongodb_uri }}" \
              --eval 'db = db.getSiblingDB("{{ item.db }}");
              {% for index in index_data[item.db][item.collection] %}
                {% if index.name != "_id_" %}
                  db.{{ item.collection }}.createIndex(
                    {{ index.key | to_json }},
                    {
                      name: "{{ index.name }}"
                      {% if index.unique is defined and index.unique %}, unique: true{% endif %}
                    }
                  );
                  print("Created index {{ index.name }} on {{ item.db }}.{{ item.collection }}");
                {% endif %}
              {% endfor %}
              '
          loop: "{{ db_collection_list | from_yaml }}"
          register: index_creation_result
          changed_when: "'Created index' in index_creation_result.stdout"

    - name: Display restore completion message
      debug:
        msg:
          - "=========================================="
          - "MongoDB Restore Completed Successfully"
          - "=========================================="
          - "Backup restored from: s3://{{ atlas_s3_bucket_name }}/{{ atlas_backup_file_name }}"
          - "Indexes restored from: s3://{{ atlas_s3_bucket_name }}/{{ atlas_index_backup_file_name }}"
          - "Target MongoDB: {{ atlas_mongodb_host }}"
          - "=========================================="

  rescue:

    - name: Display mongorestore Logs
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Mongo Restore Stdout logs"
          - "=========================================="
          - "{{ mongorestore_result.stdout_lines }}"
          - "------------------------------------------"
          - "=========================================="
          - "Mongo Restore Stderr logs"
          - "=========================================="
          - "{{ mongorestore_result.stderr_lines }}"
          - "------------------------------------------"
          - "Mongo "
      when: mongorestore_result.stderr_lines is defined and mongorestore_result.stderr_lines | length != 0

    - name: Display index restore logs
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Index Restore Stdout logs"
          - "{{ index_creation_result.results | map(attribute='stdout_lines') | select('defined') | list | flatten | map('trim') | join(' ') }}"
          - "------------------------------------------"
          - "=========================================="
          - "Index Restore Stderr logs"
          - "=========================================="
          - "{{ index_creation_result.results | map(attribute='stderr_lines') | select('defined') | list | flatten | map('trim') | join(' ') }}"
          - "------------------------------------------"
      when: index_creation_result is defined

    - name: Restore failed
      ansible.builtin.fail:
        msg: "Restore failed. Please view the logs for more details"

  always:

    # 7. Cleanup temporary files
    # -----------------------------------------------------------------------------
    - name: Clean up temporary restore directory
      when: cleanup_temp_files | default(true) | bool
      file:
        path: "{{ restore_temp_dir }}"
        state: absent
