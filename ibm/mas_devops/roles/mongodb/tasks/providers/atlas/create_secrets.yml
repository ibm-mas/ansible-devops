---
# MongoDB Atlas Provider - Create AWS Secrets Manager Secrets
# Creates cluster-level and instance-level secrets in the format:
# - Cluster: <accountid>/<clustername>/mongo
# - Instance: <accountid>/<clustername>/<instanceid>/mongo

# 1. Validate required variables
# -----------------------------------------------------------------------------
- name: "Validate secret creation requirements"
  assert:
    that:
      - atlas_account_id is defined and atlas_account_id != ""
      - atlas_cluster_name is defined and atlas_cluster_name != ""
      - atlas_aws_region is defined and atlas_aws_region != ""
      - atlas_privatelink_connection_string is defined and atlas_privatelink_connection_string != ""
    fail_msg: "Secret creation requires atlas_account_id, atlas_cluster_name, atlas_aws_region, and atlas_privatelink_connection_string"

# 2. Parse connection string for host information
# -----------------------------------------------------------------------------
- name: "Extract cluster shard nodes from private endpoint connection string"
  set_fact:
    atlas_hosts_with_ports: "{{ atlas_privatelink_connection_string | regex_replace('^mongodb://([^/]+).*$', '\\1') }}"

- name: "Parse cluster nodes with ports"
  set_fact:
    # Split by comma to get list of host:port pairs
    atlas_cluster_nodes_with_ports: "{{ atlas_hosts_with_ports.split(',') }}"

- name: "Parse first node host and port"
  set_fact:
    atlas_first_node_parts: "{{ atlas_cluster_nodes_with_ports[0].split(':') }}"

- name: "Set MongoDB host and port from first node"
  set_fact:
    atlas_mongodb_host: "{{ atlas_first_node_parts[0] }}"
    atlas_mongodb_port: "{{ atlas_first_node_parts[1] if atlas_first_node_parts | length > 1 else '27017' }}"

- name: "Parse cluster nodes into host/port pairs for template"
  set_fact:
    atlas_cluster_nodes: "{{ atlas_cluster_nodes | default([]) + [{'host': item.split(':')[0], 'port': item.split(':')[1] if ':' in item else '27017'}] }}"
  loop: "{{ atlas_cluster_nodes_with_ports }}"
  loop_control:
    label: "{{ item }}"

# 3. Load MongoDB Atlas CA certificates
# -----------------------------------------------------------------------------
- name: "Find all MongoDB Atlas CA certificate files"
  find:
    paths: "{{ role_path }}/files/providers/atlas/ca"
    patterns: "*.pem"
  register: atlas_ca_cert_files

- name: "Load all MongoDB Atlas CA certificates"
  slurp:
    src: "{{ item.path }}"
  register: atlas_ca_certs_content
  loop: "{{ atlas_ca_cert_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: "Build CA certificate pairs list (alias and content)"
  set_fact:
    atlas_ca_cert_pairs: "{{ atlas_ca_cert_pairs | default([]) + [{'alias': item.item.path | basename, 'content': item.content | b64decode}] }}"
  loop: "{{ atlas_ca_certs_content.results }}"
  loop_control:
    label: "{{ item.item.path | basename }}"

# 4. Create cluster-level secret (empty username/password)
# -----------------------------------------------------------------------------
- name: "Set cluster-level secret name"
  set_fact:
    atlas_cluster_secret_name: "{{ atlas_account_id }}/{{ atlas_cluster_name }}/mongo"

- name: "Generate info.yml content for cluster secret"
  set_fact:
    atlas_cluster_info_yml: "{{ lookup('template', 'templates/atlas/atlas_info.yml.j2') }}"

- name: "Prepare cluster-level secret content"
  set_fact:
    atlas_cluster_secret_content:
      info: "{{ atlas_cluster_info_yml }}"
      docdb_username: ""
      docdb_password: ""
      docdb_host: "{{ atlas_mongodb_host }}"
      docdb_port: "{{ atlas_mongodb_port }}"

- name: "Check if cluster secret exists"
  shell: |
    aws secretsmanager describe-secret \
      --secret-id "{{ atlas_cluster_secret_name }}" \
      --region "{{ atlas_aws_region }}" \
      --output json
  register: atlas_cluster_secret_check
  failed_when: false
  changed_when: false

- name: "Create cluster secret if it doesn't exist"
  when: atlas_cluster_secret_check.rc != 0
  shell: |
    aws secretsmanager create-secret \
      --name "{{ atlas_cluster_secret_name }}" \
      --description "MongoDB Atlas cluster-level connection for {{ atlas_cluster_name }}" \
      --region "{{ atlas_aws_region }}" \
      --output json
  register: atlas_cluster_secret_create

- name: "Write cluster secret content to temporary file"
  copy:
    content: "{{ atlas_cluster_secret_content | to_json }}"
    dest: "/tmp/atlas_cluster_secret.json"
    mode: '0600'

- name: "Update cluster secret with connection information"
  shell: |
    aws secretsmanager put-secret-value \
      --secret-id "{{ atlas_cluster_secret_name }}" \
      --secret-string file:///tmp/atlas_cluster_secret.json \
      --region "{{ atlas_aws_region }}" \
      --output json
  register: atlas_cluster_secret_update

- name: "Remove temporary cluster secret file"
  file:
    path: "/tmp/atlas_cluster_secret.json"
    state: absent

- name: "Cluster-level secret created"
  debug:
    msg:
      - "Cluster secret: {{ atlas_cluster_secret_name }}"
      - "Region: {{ atlas_aws_region }}"

# 5. Create instance-level secrets
# -----------------------------------------------------------------------------
- name: "Set instance secret name"
  set_fact:
    atlas_instance_secret_name: "{{ atlas_account_id }}/{{ atlas_cluster_name }}/{{ instance_user.instance_name }}/mongo"
  loop: "{{ atlas_instance_users }}"
  loop_control:
    loop_var: instance_user
    label: "{{ instance_user.instance_name }}"
  when:
    - atlas_instance_users is defined
    - atlas_instance_users | length > 0

- name: "Prepare instance-level secret content"
  set_fact:
    atlas_instance_secret_content:
      info: "{{ atlas_cluster_info_yml }}"
      username: "{{ instance_user.username }}"
      password: "{{ instance_user.password }}"
  loop: "{{ atlas_instance_users }}"
  loop_control:
    loop_var: instance_user
    label: "{{ instance_user.instance_name }}"
  when:
    - atlas_instance_users is defined
    - atlas_instance_users | length > 0
  no_log: true

- name: "Check if instance secret exists"
  shell: |
    aws secretsmanager describe-secret \
      --secret-id "{{ atlas_account_id }}/{{ atlas_cluster_name }}/{{ instance_user.instance_name }}/mongo" \
      --region "{{ atlas_aws_region }}" \
      --output json
  register: atlas_instance_secret_check
  loop: "{{ atlas_instance_users }}"
  loop_control:
    loop_var: instance_user
    label: "{{ instance_user.instance_name }}"
  when:
    - atlas_instance_users is defined
    - atlas_instance_users | length > 0
  failed_when: false
  changed_when: false

- name: "Create instance secret if it doesn't exist"
  when:
    - atlas_instance_users is defined
    - atlas_instance_users | length > 0
    - item.rc != 0
  shell: |
    aws secretsmanager create-secret \
      --name "{{ atlas_account_id }}/{{ atlas_cluster_name }}/{{ item.instance_user.instance_name }}/mongo" \
      --description "MongoDB Atlas instance-level connection for {{ item.instance_user.instance_name }}" \
      --region "{{ atlas_aws_region }}" \
      --output json
  loop: "{{ atlas_instance_secret_check.results }}"
  loop_control:
    label: "{{ item.instance_user.instance_name }}"
  register: atlas_instance_secret_create

- name: "Write instance secret content to temporary file"
  copy:
    content: "{{ {'info': atlas_cluster_info_yml, 'username': instance_user.username, 'password': instance_user.password} | to_json }}"
    dest: "/tmp/atlas_instance_secret_{{ instance_user.instance_name }}.json"
    mode: '0600'
  loop: "{{ atlas_instance_users }}"
  loop_control:
    loop_var: instance_user
    label: "{{ instance_user.instance_name }}"
  when:
    - atlas_instance_users is defined
    - atlas_instance_users | length > 0
  no_log: true

- name: "Update instance secret with connection information"
  shell: |
    aws secretsmanager put-secret-value \
      --secret-id "{{ atlas_account_id }}/{{ atlas_cluster_name }}/{{ instance_user.instance_name }}/mongo" \
      --secret-string file:///tmp/atlas_instance_secret_{{ instance_user.instance_name }}.json \
      --region "{{ atlas_aws_region }}" \
      --output json
  loop: "{{ atlas_instance_users }}"
  loop_control:
    loop_var: instance_user
    label: "{{ instance_user.instance_name }}"
  when:
    - atlas_instance_users is defined
    - atlas_instance_users | length > 0
  register: atlas_instance_secret_update

- name: "Remove temporary instance secret file"
  file:
    path: "/tmp/atlas_instance_secret_{{ instance_user.instance_name }}.json"
    state: absent
  loop: "{{ atlas_instance_users }}"
  loop_control:
    loop_var: instance_user
    label: "{{ instance_user.instance_name }}"
  when:
    - atlas_instance_users is defined
    - atlas_instance_users | length > 0

- name: "Instance-level secrets created"
  debug:
    msg: "Instance secrets created for: {{ atlas_instance_users | map(attribute='instance_name') | list | join(', ') }}"
  when:
    - atlas_instance_users is defined
    - atlas_instance_users | length > 0

- name: "Secrets creation complete"
  debug:
    msg:
      - "=========================================="
      - "MongoDB Atlas Secrets Created"
      - "=========================================="
      - "Cluster secret: {{ atlas_cluster_secret_name }}"
      - "Instance secrets: {{ atlas_instance_users | length if (atlas_instance_users is defined) else 0 }}"
      - "Region: {{ atlas_aws_region }}"
      - "=========================================="
