---
# AWS DocumentDB Backup to S3 (Orchestration)
# =============================================================================
# This playbook orchestrates AWS DocumentDB backup using shell scripts
# It copies scripts to target, executes them, and manages the backup workflow

# 1. Validate required variables
# -----------------------------------------------------------------------------
- name: "Fail if required DocumentDB variables are not provided"
  assert:
    that:
      - docdb_cluster_name is defined and docdb_cluster_name != ''
      - docdb_master_username is defined and docdb_master_username != ''
      - docdb_master_password is defined and docdb_master_password != ''
      - s3_bucket is defined and s3_bucket != ''
      - aws_region is defined and aws_region != ''
    fail_msg: "Missing one or more required properties: docdb_cluster_name, docdb_master_username, docdb_master_password, s3_bucket, aws_region"

- name: "Set default values for optional variables"
  set_fact:
    docdb_port: "{{ docdb_port | default('27017') }}"
    docdb_backup_prefix: "{{ docdb_backup_prefix | default('docdb-backups') }}"
    docdb_temp_dir: "{{ docdb_temp_dir | default('/tmp/docdb-backup') }}"
    docdb_ca_cert_url: "{{ docdb_ca_cert_url | default('https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem') }}"

- name: "Generate backup timestamp"
  set_fact:
    docdb_backup_timestamp: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"

- name: "Set backup file names and paths"
  set_fact:
    docdb_backup_file: "docdb-backup-{{ docdb_backup_timestamp }}"
    docdb_index_file: "docdb-indexes-{{ docdb_backup_timestamp }}.json"
    docdb_log_file: "docdb-backup-{{ docdb_backup_timestamp }}.log"
    docdb_scripts_dir: "{{ docdb_temp_dir }}/scripts"
    docdb_backup_dir: "{{ docdb_temp_dir }}/mongodump"
    docdb_logs_dir: "{{ docdb_temp_dir }}/logs"

- name: "Debug backup properties"
  debug:
    msg:
      - "=========================================="
      - "AWS DocumentDB Backup Configuration"
      - "=========================================="
      - "DocumentDB Cluster ...................... {{ docdb_cluster_name }}"
      - "DocumentDB Port ......................... {{ docdb_port }}"
      - "DocumentDB Username ..................... {{ docdb_master_username }}"
      - "S3 Bucket ............................... {{ s3_bucket }}"
      - "S3 Prefix ............................... {{ docdb_backup_prefix }}"
      - "AWS Region .............................. {{ aws_region }}"
      - "Backup Timestamp ........................ {{ docdb_backup_timestamp }}"
      - "Backup File ............................. {{ docdb_backup_file }}.tar.gz"
      - "Index File .............................. {{ docdb_index_file }}"
      - "Temporary Directory ..................... {{ docdb_temp_dir }}"
      - "=========================================="

- name: "Execute DocumentDB Backup"
  block:
    # 2. Setup directories and scripts
    # -------------------------------------------------------------------------
    - name: "Create temporary directories"
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ docdb_temp_dir }}"
        - "{{ docdb_scripts_dir }}"
        - "{{ docdb_backup_dir }}"
        - "{{ docdb_logs_dir }}"

    - name: "Copy backup scripts to target"
      copy:
        src: "{{ item.src }}"
        dest: "{{ docdb_scripts_dir }}/{{ item.dest }}"
        mode: '0755'
      loop:
        - { src: "providers/aws/docdb-backup.sh", dest: "docdb-backup.sh" }
        - { src: "providers/aws/docdb-extract-indexes.sh", dest: "docdb-extract-indexes.sh" }
        - { src: "providers/aws/docdb-upload-s3.sh", dest: "docdb-upload-s3.sh" }

    # 3. Download DocumentDB CA certificate
    # -------------------------------------------------------------------------
    - name: "Download AWS DocumentDB CA certificate"
      get_url:
        url: "{{ docdb_ca_cert_url }}"
        dest: "{{ docdb_temp_dir }}/global-bundle.pem"
        mode: '0644'
      register: ca_cert_download

    - name: "Verify CA certificate downloaded successfully"
      stat:
        path: "{{ docdb_temp_dir }}/global-bundle.pem"
      register: ca_cert_stat

    - name: "Fail if CA certificate not found"
      fail:
        msg: "Failed to download DocumentDB CA certificate"
      when: not ca_cert_stat.stat.exists

    # 4. Execute backup script
    # -------------------------------------------------------------------------
    - name: "Execute DocumentDB backup script"
      shell: |
        export DOCDB_HOST="{{ docdb_cluster_name }}"
        export DOCDB_PORT="{{ docdb_port }}"
        export DOCDB_USERNAME="{{ docdb_master_username }}"
        export DOCDB_PASSWORD="{{ docdb_master_password }}"
        export DOCDB_CA_CERT="{{ docdb_temp_dir }}/global-bundle.pem"
        export BACKUP_DIR="{{ docdb_backup_dir }}"
        export LOG_FILE="{{ docdb_logs_dir }}/{{ docdb_log_file }}"
        
        {{ docdb_scripts_dir }}/docdb-backup.sh
      register: backup_script_result
      no_log: true
      changed_when: true

    - name: "Display backup script output"
      debug:
        msg: "{{ backup_script_result.stdout_lines }}"

    - name: "Check if backup script was successful"
      fail:
        msg: "Backup script failed. Check logs for details."
      when: backup_script_result.rc != 0

    # 5. Extract collection indexes
    # -------------------------------------------------------------------------
    - name: "Execute index extraction script"
      shell: |
        export DOCDB_HOST="{{ docdb_cluster_name }}"
        export DOCDB_PORT="{{ docdb_port }}"
        export DOCDB_USERNAME="{{ docdb_master_username }}"
        export DOCDB_PASSWORD="{{ docdb_master_password }}"
        export DOCDB_CA_CERT="{{ docdb_temp_dir }}/global-bundle.pem"
        export INDEX_FILE="{{ docdb_temp_dir }}/{{ docdb_index_file }}"
        export LOG_FILE="{{ docdb_logs_dir }}/{{ docdb_log_file }}"
        
        {{ docdb_scripts_dir }}/docdb-extract-indexes.sh
      register: index_script_result
      no_log: true
      changed_when: false
      failed_when: false

    - name: "Display index extraction output"
      debug:
        msg: "{{ index_script_result.stdout_lines }}"
      when: index_script_result.stdout_lines is defined

    - name: "Verify index file created"
      stat:
        path: "{{ docdb_temp_dir }}/{{ docdb_index_file }}"
      register: index_file_stat

    - name: "Debug: Index file size"
      debug:
        msg: "Index file size: {{ index_file_stat.stat.size }} bytes"
      when: index_file_stat.stat.exists

    # 6. Compress backup files
    # -------------------------------------------------------------------------
    - name: "Create compressed tar.gz archive of backup"
      shell: |
        cd {{ docdb_backup_dir }} && \
        tar -czf {{ docdb_temp_dir }}/{{ docdb_backup_file }}.tar.gz . && \
        du -h {{ docdb_temp_dir }}/{{ docdb_backup_file }}.tar.gz
      register: compress_result
      changed_when: true

    - name: "Display backup file size"
      debug:
        msg: "{{ compress_result.stdout_lines }}"

    # 7. Upload backup to S3
    # -------------------------------------------------------------------------
    - name: "Upload compressed backup to S3"
      shell: |
        export S3_BUCKET="{{ s3_bucket }}"
        export S3_PREFIX="{{ docdb_backup_prefix }}"
        export AWS_REGION="{{ aws_region }}"
        export SOURCE_FILE="{{ docdb_temp_dir }}/{{ docdb_backup_file }}.tar.gz"
        export LOG_FILE="{{ docdb_logs_dir }}/{{ docdb_log_file }}"
        
        {{ docdb_scripts_dir }}/docdb-upload-s3.sh
      register: s3_backup_upload
      changed_when: true

    - name: "Display backup upload output"
      debug:
        msg: "{{ s3_backup_upload.stdout_lines }}"

    # 8. Upload index file to S3
    # -------------------------------------------------------------------------
    - name: "Upload index file to S3"
      shell: |
        export S3_BUCKET="{{ s3_bucket }}"
        export S3_PREFIX="{{ docdb_backup_prefix }}"
        export AWS_REGION="{{ aws_region }}"
        export SOURCE_FILE="{{ docdb_temp_dir }}/{{ docdb_index_file }}"
        export LOG_FILE="{{ docdb_logs_dir }}/{{ docdb_log_file }}"
        
        {{ docdb_scripts_dir }}/docdb-upload-s3.sh
      register: s3_index_upload
      changed_when: true

    - name: "Display index upload output"
      debug:
        msg: "{{ s3_index_upload.stdout_lines }}"

    # 9. Upload log file to S3
    # -------------------------------------------------------------------------
    - name: "Compress log file"
      shell: |
        cd {{ docdb_logs_dir }} && \
        tar -czf {{ docdb_log_file }}.tar.gz {{ docdb_log_file }}
      register: compress_log
      changed_when: true

    - name: "Upload log file to S3"
      shell: |
        export S3_BUCKET="{{ s3_bucket }}"
        export S3_PREFIX="{{ docdb_backup_prefix }}/logs"
        export AWS_REGION="{{ aws_region }}"
        export SOURCE_FILE="{{ docdb_logs_dir }}/{{ docdb_log_file }}.tar.gz"
        export LOG_FILE="{{ docdb_logs_dir }}/{{ docdb_log_file }}"
        
        {{ docdb_scripts_dir }}/docdb-upload-s3.sh
      register: s3_log_upload
      changed_when: true
      failed_when: false

    # 10. Display backup completion summary
    # -------------------------------------------------------------------------
    - name: "Display backup completion summary"
      debug:
        msg:
          - "=========================================="
          - "DocumentDB Backup Completed Successfully"
          - "=========================================="
          - "Backup File: s3://{{ s3_bucket }}/{{ docdb_backup_prefix }}/{{ docdb_backup_file }}.tar.gz"
          - "Index File: s3://{{ s3_bucket }}/{{ docdb_backup_prefix }}/{{ docdb_index_file }}"
          - "Log File: s3://{{ s3_bucket }}/{{ docdb_backup_prefix }}/logs/{{ docdb_log_file }}.tar.gz"
          - "Timestamp: {{ docdb_backup_timestamp }}"
          - "=========================================="

  rescue:
    # Error handling
    # -------------------------------------------------------------------------
    - name: "Display error information"
      debug:
        msg:
          - "=========================================="
          - "DocumentDB Backup Failed"
          - "=========================================="
          - "Error occurred during backup process"
          - "Check logs for details"
          - "=========================================="

    - name: "Display backup script errors if available"
      debug:
        msg:
          - "Backup script stdout:"
          - "{{ backup_script_result.stdout_lines | default([]) }}"
          - "Backup script stderr:"
          - "{{ backup_script_result.stderr_lines | default([]) }}"
      when: backup_script_result is defined

    - name: "Display S3 upload errors if available"
      debug:
        msg:
          - "S3 backup upload: {{ s3_backup_upload.stderr | default('N/A') }}"
          - "S3 index upload: {{ s3_index_upload.stderr | default('N/A') }}"
      when: s3_backup_upload is defined or s3_index_upload is defined

    - name: "Upload error log to S3 if possible"
      shell: |
        if [ -f {{ docdb_logs_dir }}/{{ docdb_log_file }} ]; then
          cd {{ docdb_logs_dir }} && \
          tar -czf {{ docdb_log_file }}.tar.gz {{ docdb_log_file }} && \
          
          export S3_BUCKET="{{ s3_bucket }}"
          export S3_PREFIX="{{ docdb_backup_prefix }}/logs"
          export AWS_REGION="{{ aws_region }}"
          export SOURCE_FILE="{{ docdb_logs_dir }}/{{ docdb_log_file }}.tar.gz"
          export LOG_FILE="{{ docdb_logs_dir }}/{{ docdb_log_file }}"
          
          {{ docdb_scripts_dir }}/docdb-upload-s3.sh
        fi
      failed_when: false
      changed_when: false

    - name: "Backup failed"
      fail:
        msg: "DocumentDB backup failed. Please check the logs for more details."

  always:
    # Cleanup temporary files
    # -------------------------------------------------------------------------
    - name: "Get backup directory size before cleanup"
      shell: du -sh {{ docdb_temp_dir }}
      register: dir_size
      failed_when: false
      changed_when: false

    - name: "Display temporary directory size"
      debug:
        msg: "Temporary directory size: {{ dir_size.stdout }}"
      when: dir_size.rc == 0

    - name: "Clean up temporary backup directory"
      file:
        path: "{{ docdb_temp_dir }}"
        state: absent
      when: cleanup_temp_files | default(true) | bool

    - name: "Cleanup completed"
      debug:
        msg: "Temporary files cleaned up from {{ docdb_temp_dir }}"
      when: cleanup_temp_files | default(true) | bool

