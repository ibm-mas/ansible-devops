---
- hosts: localhost
  vars:
    cluster_type: rosa_hcp
    ocp_update_allowed_registries: True
    ocp_update_additional_trusted_ca: True
  pre_tasks:
    # For the full set of supported environment variables refer to the playbook documentation
    - name: Check for required environment variables
      assert:
        that:
          - lookup('env', 'ROSA_TOKEN') != ""
          - lookup('env', 'CLUSTER_NAME') != ""
          - lookup('env', 'REGISTRY_PRIVATE_HOST') != ""
          - lookup('env', 'REGISTRY_USERNAME') != ""
          - lookup('env', 'REGISTRY_PASSWORD') != ""
        fail_msg: "One or more required environment variables are not defined"

  roles:
    - ibm.mas_devops.ocp_config
    - ibm.mas_devops.ocp_idms
