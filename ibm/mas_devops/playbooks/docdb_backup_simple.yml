---
# AWS DocumentDB Backup Playbook
# =============================================================================
# This playbook performs a backup of AWS DocumentDB to S3
#
# Usage:
#   ansible-playbook ibm/mas_devops/playbooks/docdb_backup_simple.yml \
#     -e "docdb_cluster_name=<cluster-endpoint>" \
#     -e "docdb_master_username=<username>" \
#     -e "docdb_master_password=<password>" \
#     -e "aws_region=<region>" \
#     -e "s3_bucket=<bucket-name>" \
#     -e "mongodb_provider=aws" \
#     -e "mongodb_action=backup-database" \
#     -e "docdb_port=27017"
#
# Optional parameters:
#   -e "docdb_backup_prefix=docdb-backups"  # S3 prefix for organizing backups
#   -e "cleanup_temp_files=true"            # Clean up temporary files after backup
#
# Example:
#   ansible-playbook ibm/mas_devops/playbooks/docdb_backup_simple.yml \
#     -e "docdb_cluster_name=massre-mas-cluster-8-mongo.cluster-cvwxreialrtj.us-east-1.docdb.amazonaws.com" \
#     -e "docdb_master_username=masinst_inst04" \
#     -e "docdb_master_password=fn9Uh5wZ4KsZy4OZ0OXx" \
#     -e "aws_region=us-east-1" \
#     -e "s3_bucket=massre-mas-cluster-8-mongo-test" \
#     -e "mongodb_provider=aws" \
#     -e "mongodb_action=backup-database" \
#     -e "docdb_port=27017"

- hosts: localhost
  any_errors_fatal: true
  
  vars:
    # Set default values for optional parameters if not provided
    _docdb_port: "{{ docdb_port | default('27017') }}"
    _docdb_backup_prefix: "{{ docdb_backup_prefix | default('docdb-backups') }}"
    _cleanup_temp_files: "{{ cleanup_temp_files | default(true) }}"

  pre_tasks:
    - name: "Validate required variables"
      assert:
        that:
          - docdb_cluster_name is defined and docdb_cluster_name != ''
          - docdb_master_username is defined and docdb_master_username != ''
          - docdb_master_password is defined and docdb_master_password != ''
          - s3_bucket is defined and s3_bucket != ''
          - aws_region is defined and aws_region != ''
          - mongodb_provider is defined and mongodb_provider == 'aws'
          - mongodb_action is defined and mongodb_action == 'backup-database'
        fail_msg: |
          Missing required variables. Please provide:
          - docdb_cluster_name
          - docdb_master_username
          - docdb_master_password
          - s3_bucket
          - aws_region
          - mongodb_provider=aws
          - mongodb_action=backup-database

    - name: "Display playbook information"
      debug:
        msg:
          - "=========================================="
          - "AWS DocumentDB Backup Playbook"
          - "=========================================="
          - "This playbook will:"
          - "  1. Connect to DocumentDB cluster"
          - "  2. Create a full backup using mongodump"
          - "  3. Extract collection indexes"
          - "  4. Compress backup files"
          - "  5. Upload to S3 bucket"
          - "=========================================="
          - "Configuration:"
          - "  Cluster: {{ docdb_cluster_name }}"
          - "  Port: {{ _docdb_port }}"
          - "  S3 Bucket: {{ s3_bucket }}"
          - "  S3 Prefix: {{ _docdb_backup_prefix }}"
          - "  AWS Region: {{ aws_region }}"
          - "=========================================="

    - name: "Check for required tools"
      command: "which {{ item }}"
      register: tool_check
      failed_when: false
      changed_when: false
      loop:
        - mongodump
        - mongosh
        - aws
        - tar

    - name: "Verify all required tools are installed"
      assert:
        that: item.rc == 0
        fail_msg: "Required tool '{{ item.item }}' is not installed or not in PATH"
      loop: "{{ tool_check.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Verify AWS credentials are configured"
      shell: aws sts get-caller-identity --region {{ aws_region }}
      register: aws_identity
      changed_when: false
      failed_when: aws_identity.rc != 0

    - name: "Display AWS identity"
      debug:
        msg: "AWS Identity: {{ aws_identity.stdout | from_json }}"

    - name: "Verify S3 bucket access"
      shell: aws s3 ls s3://{{ s3_bucket }} --region {{ aws_region }}
      register: s3_access
      changed_when: false
      failed_when: s3_access.rc != 0

    - name: "S3 bucket access verified"
      debug:
        msg: "Successfully verified access to S3 bucket: {{ s3_bucket }}"

  roles:
    - ibm.mas_devops.mongodb

  post_tasks:
    - name: "Backup process completed"
      debug:
        msg:
          - "=========================================="
          - "AWS DocumentDB Backup Process Completed"
          - "=========================================="
          - "Your backup has been successfully created and uploaded to S3."
          - ""
          - "Backup Location:"
          - "  s3://{{ s3_bucket }}/{{ _docdb_backup_prefix }}/"
          - ""
          - "Files created:"
          - "  - docdb-backup-<timestamp>.tar.gz (compressed database backup)"
          - "  - docdb-indexes-<timestamp>.json (collection indexes)"
          - "  - logs/docdb-backup-<timestamp>.log.tar.gz (backup logs)"
          - ""
          - "To restore this backup, use the restore playbook with the"
          - "backup file name and index file name as parameters."
          - "=========================================="

# Made with Bob
