---
# Simple AWS DocumentDB backup to S3
# No MAS framework, no OpenShift dependency - just backup and upload

- hosts: localhost
  connection: local
  gather_facts: true

  vars:
    # Required variables
    docdb_cluster_name: "{{ lookup('env', 'DOCDB_CLUSTER_NAME') }}"
    docdb_master_username: "{{ lookup('env', 'DOCDB_MASTER_USERNAME') }}"
    docdb_master_password: "{{ lookup('env', 'DOCDB_MASTER_PASSWORD') }}"
    aws_region: "{{ lookup('env', 'AWS_REGION') | default('us-east-1', True) }}"
    s3_bucket: "{{ lookup('env', 'S3_BUCKET') }}"

    # Optional variables
    s3_prefix: "{{ lookup('env', 'S3_PREFIX') | default('docdb-backups', True) }}"
    local_backup_dir: "{{ lookup('env', 'LOCAL_BACKUP_DIR') | default('/tmp/docdb-backup', True) }}"
    backup_timestamp: "{{ ansible_date_time.iso8601_basic_short }}"
    ca_cert_file_custom: "{{ lookup('env', 'CA_CERT_FILE') | default('', True) }}"
    ca_cert_file_region: "{{ playbook_dir }}/../roles/mongodb/files/providers/aws/ca/root-ca-rsa2048-{{ aws_region }}.pem"
    docdb_port: "{{ lookup('env', 'DOCDB_PORT') | default('27017', True) }}"

  tasks:
    # Check required tools
    # -------------------------------------------------------------------------
    - name: "Check if mongosh is installed"
      command: which mongosh
      register: _mongosh_check
      failed_when: false
      changed_when: false

    - name: "Check if mongodump is installed"
      command: which mongodump
      register: _mongodump_check
      failed_when: false
      changed_when: false

    - name: "Show tool availability"
      debug:
        msg:
          - "mongosh: {{ 'FOUND' if _mongosh_check.rc == 0 else 'NOT FOUND' }}"
          - "mongodump: {{ 'FOUND' if _mongodump_check.rc == 0 else 'NOT FOUND' }}"

    - name: "Fail if required tools are missing"
      fail:
        msg: |
          Required MongoDB tools are not installed.

          Missing tools:
          {% if _mongosh_check.rc != 0 %}
          - mongosh (MongoDB Shell)
          {% endif %}
          {% if _mongodump_check.rc != 0 %}
          - mongodump (MongoDB Database Tools)
          {% endif %}

          To install on macOS:
            brew tap mongodb/brew
            brew install mongodb-community-shell
            brew install mongodb-database-tools

          To install on Linux:
            # Follow instructions at https://www.mongodb.com/docs/database-tools/installation/
      when: _mongosh_check.rc != 0 or _mongodump_check.rc != 0

    # Validate AWS authentication
    # -------------------------------------------------------------------------
    - name: "Verify AWS authentication"
      command: aws sts get-caller-identity --region '{{ aws_region }}'
      register: _aws_auth
      failed_when: false
      changed_when: false

    - name: "Fail if AWS authentication failed"
      fail:
        msg: |
          AWS authentication failed.
          {{ _aws_auth.stderr | default('') }}
          If using AWS SSO, run: aws sso login
      when: _aws_auth.rc != 0

    # Get DocumentDB cluster info
    # -------------------------------------------------------------------------
    - name: "Get DocumentDB cluster endpoint"
      command: >
        aws docdb describe-db-clusters
        --db-cluster-identifier '{{ docdb_cluster_name }}'
        --region '{{ aws_region }}'
        --query 'DBClusters[0].[Endpoint,Port]'
        --output text
      register: _docdb_info
      changed_when: false
      when: docdb_port == '27017'

    - name: "Set DocumentDB connection details from AWS"
      set_fact:
        docdb_endpoint: "{{ _docdb_info.stdout.split()[0] }}"
        docdb_port: "{{ _docdb_info.stdout.split()[1] }}"
        docdb_host: "{{ _docdb_info.stdout.split()[0] }}:{{ _docdb_info.stdout.split()[1] }}"
      when: docdb_port == '27017'

    - name: "Set DocumentDB connection details from manual input"
      set_fact:
        docdb_endpoint: "{{ docdb_cluster_name }}"
        docdb_host: "{{ docdb_cluster_name }}:{{ docdb_port }}"
      when: docdb_port != '27017'

    # Verify CA certificate exists
    # -------------------------------------------------------------------------
    - name: "Check if custom CA certificate exists"
      stat:
        path: "{{ ca_cert_file_custom }}"
      register: _ca_cert_custom_stat
      when: ca_cert_file_custom != ''

    - name: "Check if region-specific CA certificate exists"
      stat:
        path: "{{ ca_cert_file_region }}"
      register: _ca_cert_region_stat
      when: ca_cert_file_custom == ''

    - name: "Set CA certificate file to use"
      set_fact:
        ca_cert_file: "{{ ca_cert_file_custom if ca_cert_file_custom != '' else ca_cert_file_region }}"

    - name: "Fail if CA certificate not found"
      fail:
        msg: |
          CA certificate not found: {{ ca_cert_file }}

          Options:
          1. Provide custom certificate: -e "ca_cert_file=/path/to/global-bundle.pem"
          2. Use region-specific certificate (available for these regions):
             - us-east-1, us-east-2, us-west-2
             - eu-west-1, eu-west-2, eu-west-3, eu-central-1, eu-south-1
             - ap-northeast-1, ap-northeast-2, ap-south-1, ap-south-2
             - ap-southeast-1, ap-southeast-2, ap-east-1
             - ca-central-1, sa-east-1

          Download global bundle:
          wget https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem
      when: >
        (ca_cert_file_custom != '' and not _ca_cert_custom_stat.stat.exists) or
        (ca_cert_file_custom == '' and not _ca_cert_region_stat.stat.exists)

    # Test network connectivity
    # -------------------------------------------------------------------------
    - name: "Test network connectivity to DocumentDB endpoint"
      shell: |
        nc -zv {{ docdb_endpoint }} {{ docdb_port }} 2>&1 || \
        timeout 5 bash -c "cat < /dev/null > /dev/tcp/{{ docdb_endpoint }}/{{ docdb_port }}" 2>&1
      register: _connectivity_test
      failed_when: false
      changed_when: false

    - name: "Show connectivity test result"
      debug:
        msg: |
          Testing connection to {{ docdb_endpoint }}:{{ docdb_port }}
          Result: {{ _connectivity_test.stdout }}
          Return code: {{ _connectivity_test.rc }}

    - name: "Fail if DocumentDB endpoint is not reachable"
      fail:
        msg: |
          Cannot reach DocumentDB endpoint {{ docdb_endpoint }}:{{ docdb_port }}

          Possible causes:
          1. Security group does not allow connections from your IP
          2. DocumentDB is in a private subnet without VPN/bastion access
          3. Network connectivity issue

          To fix:
          - Ensure you're connected to the VPN if DocumentDB is in a private subnet
          - Check security group rules allow your IP on port {{ docdb_port }}
          - Verify the cluster endpoint is correct
      when: _connectivity_test.rc != 0

    - name: "Test DocumentDB authentication"
      shell: |
        mongosh '{{ docdb_host }}' \
          --tls \
          --tlsCAFile '{{ ca_cert_file }}' \
          --username '{{ docdb_master_username }}' \
          --password '{{ docdb_master_password }}' \
          --retryWrites=false \
          --eval 'db.adminCommand({ ping: 1 })' \
          --quiet
      register: _auth_test
      failed_when: false
      changed_when: false
      async: 30
      poll: 1

    - name: "Fail if DocumentDB authentication failed"
      fail:
        msg: |
          DocumentDB authentication failed.
          Error: {{ _auth_test.stderr }}

          Please verify:
          - Username: {{ docdb_master_username }}
          - Password is correct
          - User has necessary permissions
      when: _auth_test.rc != 0

    # Create backup directory
    # -------------------------------------------------------------------------
    - name: "Create local backup directory"
      file:
        path: "{{ local_backup_dir }}/{{ backup_timestamp }}"
        state: directory
        mode: '0755'

    # Get list of databases
    # -------------------------------------------------------------------------
    - name: "Get list of databases"
      shell: >
        mongosh --tls
        --host '{{ docdb_host }}'
        --tlsCAFile '{{ ca_cert_file }}'
        --username '{{ docdb_master_username }}'
        --password '{{ docdb_master_password }}'
        --quiet
        --eval "JSON.stringify(db.adminCommand({ listDatabases: 1, nameOnly: true }))"
      register: _db_list
      changed_when: false
      failed_when: false

    - name: "Show error if database list failed"
      debug:
        msg: |
          Failed to get database list.
          Return code: {{ _db_list.rc }}
          Error: {{ _db_list.stderr }}
      when: _db_list.rc != 0

    - name: "Fail if cannot connect to DocumentDB"
      fail:
        msg: "Cannot connect to DocumentDB cluster. Check credentials and network connectivity."
      when: _db_list.rc != 0

    - name: "Parse database list"
      set_fact:
        databases: "{{ (_db_list.stdout | from_json).databases | map(attribute='name') | list }}"

    - name: "Show databases to backup"
      debug:
        msg: "Backing up {{ databases | length }} databases: {{ databases | join(', ') }}"

    # Backup entire DocumentDB cluster (all databases in one dump)
    # -------------------------------------------------------------------------
    - name: "Run mongodump for entire DocumentDB cluster"
      shell: |
        mongodump \
          --host='{{ docdb_host }}' \
          --ssl \
          --sslCAFile='{{ ca_cert_file }}' \
          --username='{{ docdb_master_username }}' \
          --password='{{ docdb_master_password }}' \
          --authenticationDatabase=admin \
          --out='{{ local_backup_dir }}/{{ backup_timestamp }}/dump'
      no_log: false
      changed_when: true
      register: _mongodump_result

    - name: "Show mongodump output"
      debug:
        msg: |
          Mongodump completed
          Return code: {{ _mongodump_result.rc }}
          Output: {{ _mongodump_result.stdout }}

    - name: "Fail if mongodump failed"
      fail:
        msg: |
          Mongodump failed!
          Error: {{ _mongodump_result.stderr }}
      when: _mongodump_result.rc != 0

    # Extract indexes for all databases
    # -------------------------------------------------------------------------
    - name: "Extract indexes for all databases and collections"
      shell: |
        mongosh '{{ docdb_host }}' \
          --tls \
          --tlsCAFile '{{ ca_cert_file }}' \
          --username '{{ docdb_master_username }}' \
          --password '{{ docdb_master_password }}' \
          --quiet \
          --eval "
            var allIndexes = {};
            db.adminCommand({ listDatabases: 1 }).databases.forEach(function(dbInfo) {
              var dbName = dbInfo.name;
              if (dbName !== 'admin' && dbName !== 'local') {
                var currentDb = db.getSiblingDB(dbName);
                allIndexes[dbName] = {};
                currentDb.getCollectionNames().forEach(function(collectionName) {
                  allIndexes[dbName][collectionName] = currentDb.getCollection(collectionName).getIndexes();
                });
              }
            });
            print(JSON.stringify(allIndexes, null, 2));
          " > '{{ local_backup_dir }}/{{ backup_timestamp }}/all-indexes.json'
      changed_when: true
      register: _index_extract

    - name: "Show index extraction result"
      debug:
        msg: "Index extraction completed. File: {{ local_backup_dir }}/{{ backup_timestamp }}/all-indexes.json"

    - name: "Get index file size"
      stat:
        path: "{{ local_backup_dir }}/{{ backup_timestamp }}/all-indexes.json"
      register: _index_stat

    - name: "Show index file info"
      debug:
        msg: "Index file size: {{ (_index_stat.stat.size / 1024) | round(2) }} KB"

    # Create tar archive
    # -------------------------------------------------------------------------
    - name: "Create backup archive"
      shell: >
        tar -czf '{{ local_backup_dir }}/{{ backup_timestamp }}/backup.tar.gz'
        -C '{{ local_backup_dir }}/{{ backup_timestamp }}/dump' .
      changed_when: true

    - name: "Get backup size"
      stat:
        path: "{{ local_backup_dir }}/{{ backup_timestamp }}/backup.tar.gz"
      register: _backup_stat

    - name: "Show backup size"
      debug:
        msg: "Backup size: {{ (_backup_stat.stat.size / 1024 / 1024) | round(2) }} MB"

    # Upload to S3
    # -------------------------------------------------------------------------
    - name: "Upload backup archive to S3"
      shell: >
        aws s3 cp
        '{{ local_backup_dir }}/{{ backup_timestamp }}/backup.tar.gz'
        's3://{{ s3_bucket }}/{{ s3_prefix }}/{{ docdb_cluster_name }}/{{ backup_timestamp }}/backup.tar.gz'
        --region '{{ aws_region }}'
      register: _s3_upload_backup
      changed_when: true

    - name: "Upload index file to S3"
      shell: >
        aws s3 cp
        '{{ local_backup_dir }}/{{ backup_timestamp }}/all-indexes.json'
        's3://{{ s3_bucket }}/{{ s3_prefix }}/{{ docdb_cluster_name }}/{{ backup_timestamp }}/all-indexes.json'
        --region '{{ aws_region }}'
      register: _s3_upload_indexes
      changed_when: true

    - name: "Create backup metadata"
      copy:
        dest: "{{ local_backup_dir }}/{{ backup_timestamp }}/metadata.json"
        content: |
          {
            "cluster": "{{ docdb_cluster_name }}",
            "timestamp": "{{ backup_timestamp }}",
            "databases": {{ databases | to_json }},
            "backup_size_bytes": {{ _backup_stat.stat.size }},
            "index_size_bytes": {{ _index_stat.stat.size }},
            "region": "{{ aws_region }}",
            "files": {
              "backup_archive": "backup.tar.gz",
              "indexes": "all-indexes.json",
              "metadata": "metadata.json"
            }
          }
        mode: '0644'

    - name: "Upload metadata to S3"
      shell: >
        aws s3 cp
        '{{ local_backup_dir }}/{{ backup_timestamp }}/metadata.json'
        's3://{{ s3_bucket }}/{{ s3_prefix }}/{{ docdb_cluster_name }}/{{ backup_timestamp }}/metadata.json'
        --region '{{ aws_region }}'
      changed_when: true

    # Cleanup
    # -------------------------------------------------------------------------
    - name: "Clean up local backup files"
      file:
        path: "{{ local_backup_dir }}/{{ backup_timestamp }}"
        state: absent

    # Summary
    # -------------------------------------------------------------------------
    - name: "Backup completed"
      debug:
        msg:
          - "=========================================="
          - "DocumentDB Backup Completed"
          - "=========================================="
          - "Cluster: {{ docdb_cluster_name }}"
          - "Timestamp: {{ backup_timestamp }}"
          - "Databases: {{ databases | length }}"
          - "Backup Size: {{ (_backup_stat.stat.size / 1024 / 1024) | round(2) }} MB"
          - "Index Size: {{ (_index_stat.stat.size / 1024) | round(2) }} KB"
          - "S3 Location: s3://{{ s3_bucket }}/{{ s3_prefix }}/{{ docdb_cluster_name }}/{{ backup_timestamp }}/"
          - "Files:"
          - "  - backup.tar.gz (mongodump of all databases)"
          - "  - all-indexes.json (indexes for all collections)"
          - "  - metadata.json (backup metadata)"
          - "=========================================="
