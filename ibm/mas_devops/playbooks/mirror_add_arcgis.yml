---
# Mirrors the following content which is REQUIRED to add Maximo Location Service for Esri (ArcGIS) to an existing
# Maximo Application Suite Core Services installation:
# 1. IBM Maximo Location Service for Esri (ArcGIS)
#
# This playbook aligns with the ibm.mas_devops.mas_add_arcgis playbook

- hosts: localhost
  any_errors_fatal: true

  vars:
    catalog_tag: "{{ lookup('env', 'MAS_CATALOG_VERSION') | default ('@@MAS_LATEST_CATALOG@@', True) }}"
    mas_channel: "{{ lookup('env', 'MAS_CHANNEL') | default ('9.1.x', True) }}"
    mirror_mode: "{{ lookup('env', 'MIRROR_MODE') | default ('direct', True) }}"

  pre_tasks:
    - name: "Load Catalog Metadata"
      ibm.mas_devops.get_catalog_info:
        mas_catalog_version: "{{ catalog_tag }}"
      register: mas_catalog_metadata

    - name: "Check that the catalog is a know catalog"
      assert:
        that: mas_catalog_metadata.failed == false

  roles:
    # 1. IBM Maximo Location Service for Esri (ArcGIS)
    # -------------------------------------------------------------------------
    - role: ibm.mas_devops.mirror_case_prepare
      when: mirror_mode != "from-filesystem"
      vars:
        case_name: ibm-mas-arcgis
        case_version: "{{ lookup('env', 'MAS_ARCGIS_VERSION') | default (mas_catalog_metadata.mas_arcgis_version[mas_channel], True) | replace('_', '.') }}"
        exclude_images: []

    - role: ibm.mas_devops.mirror_images
      vars:
        manifest_name: ibm-mas-arcgis
        manifest_version: "{{ lookup('env', 'MAS_ARCGIS_VERSION') | default (mas_catalog_metadata.mas_arcgis_version[mas_channel], True) | replace('_', '.') }}"

