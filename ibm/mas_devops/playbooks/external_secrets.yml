---
# This playbook demonstrates how to install External Secrets Operator
# and configure it to connect to IBM Secrets Manager
#
# Usage:
#   export IBM_SM_INSTANCE_URL="https://your-instance.us-south.secrets-manager.appdomain.cloud"
#   export IBMCLOUD_APIKEY="your-api-key"  # or IBM_SM_API_KEY
#   ansible-playbook ibm.mas_devops.external_secrets
#
# Or with explicit variables:
#   ansible-playbook ibm.mas_devops.external_secrets \
#     -e eso_action=install \
#     -e ibm_sm_instance_url="https://..." \
#     -e ibm_sm_api_key="..."

- hosts: localhost
  any_errors_fatal: true

  vars:
    # Action to perform (install, create-clustersecretstore, create-secretstore,
    # delete-clustersecretstore, delete-secretstore, uninstall, none)
    eso_action: "{{ lookup('env', 'ESO_ACTION') | default('install', true) }}"

    # IBM Secrets Manager configuration (required for create-* actions)
    ibm_sm_instance_url: "{{ lookup('env', 'IBM_SM_INSTANCE_URL') }}"
    # ibm_sm_api_key will automatically fall back to IBMCLOUD_APIKEY

    # For create-secretstore or delete-secretstore actions
    ibm_sm_store_namespace: "{{ lookup('env', 'IBM_SM_STORE_NAMESPACE') }}"

  roles:
    - ibm.mas_devops.external_secrets

