---
- hosts: localhost
  any_errors_fatal: true

  vars:
    catalog_tag: "{{ lookup('env', 'MAS_CATALOG_VERSION') | default ('@@MAS_LATEST_CATALOG@@', True) }}"
    mas_channel: "{{ lookup('env', 'MAS_CHANNEL') | default ('9.1.x', True) }}"
    mirror_mode: "{{ lookup('env', 'MIRROR_MODE') | default ('direct', True) }}"
    aiservice_cases:
      - ibm-aiservice
      - ibm-aiservice-tenant

  pre_tasks:
    - name: "Load Catalog Metadata"
      ibm.mas_devops.get_catalog_info:
        mas_catalog_version: "{{ catalog_tag }}"
      register: mas_catalog_metadata

    - name: "Check that the catalog is a know catalog"
      assert:
        that: mas_catalog_metadata.failed == false

  tasks:
    - name: Prepare CASE
      include_role:
        name: ibm.mas_devops.mirror_case_prepare
      loop: "{{ aiservice_cases }}"
      vars:
        case_name: "{{ item }}"
        case_version: "{{ lookup('env', 'AISERVICE_VERSION') | default (mas_catalog_metadata.aiservice_version[mas_channel], True)  | replace('_', '.') }}"
        exclude_images: []
      when: mirror_mode != "from-filesystem"

    - name: Mirror images
      include_role:
        name: ibm.mas_devops.mirror_images
      loop: "{{ aiservice_cases }}"
      vars:
        manifest_name: "{{ item }}"
        manifest_version: "{{ lookup('env', 'AISERVICE_VERSION') | default (mas_catalog_metadata.aiservice_version[mas_channel], True)  | replace('_', '.') }}"
